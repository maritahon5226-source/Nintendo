<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>DUAL//SOUL NDS · Premium Portrait Edition</title>
<style>
:root{--shell:#e8e4de;--shell2:#cac6c0;--edge:#7d7c78;--ink:#28322c;--screenDark:#121a15;--screenLight:#edf2e8;--ui:#d7ddd2;--ui2:#bcc5b9;--accent:#6f8470;--accent2:#58705b;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:#171c18;color:var(--ink)}body{min-height:100svh;display:grid;place-items:center;padding:calc(8px + var(--safe-top)) 8px calc(10px + var(--safe-bottom));overflow-x:hidden}
button,input,textarea,select{font:inherit}button{border:0;background:none}.hidden{display:none!important}
.machine{width:min(95vw,680px);display:grid;grid-template-rows:auto 20px auto;filter:drop-shadow(0 25px 36px rgba(0,0,0,.42))}
.lid,.base{position:relative;background:linear-gradient(145deg,#f7f4ee 0%,var(--shell) 45%,var(--shell2) 100%);border:2px solid var(--edge);box-shadow:inset 0 2px 0 rgba(255,255,255,.9),inset 0 -3px 0 rgba(0,0,0,.08)}
.lid{border-radius:28px 28px 10px 10px;padding:20px 26px 22px}.base{border-radius:10px 10px 32px 32px;padding:18px 18px 14px}
.hinge{height:20px;background:linear-gradient(#8f918d,#c9cac5 48%,#7e807c);border-left:2px solid var(--edge);border-right:2px solid var(--edge);position:relative}.hinge:before,.hinge:after{content:"";position:absolute;top:3px;width:28%;height:13px;border-radius:8px;background:#767874;box-shadow:inset 0 2px 3px #50524f}.hinge:before{left:6%}.hinge:after{right:6%}
.brand{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.18em;font-weight:900;color:#666760}.speaker{display:grid;grid-template-columns:repeat(6,4px);gap:6px;position:absolute;top:13px}.speaker.left{left:24px}.speaker.right{right:24px}.speaker i{width:4px;height:4px;border-radius:50%;background:#8f908a;box-shadow:inset 0 1px 1px #555651}
.screen-frame{position:relative;width:min(100%,530px);margin:auto;background:#505651;border-radius:8px;padding:9px;box-shadow:inset 0 0 0 2px #373b38,0 1px 0 rgba(255,255,255,.6)}
.screen{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;border:2px solid #1c221e;border-radius:2px;box-shadow:inset 0 0 24px rgba(0,0,0,.45)}
.top-screen{background:#6b7a72}
.top-bg{position:absolute;inset:0;background:linear-gradient(180deg,#95a89a 0 58%,#697062 58%);background-size:cover;background-position:center;filter:saturate(.95) contrast(1.02)}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 36%,rgba(22,28,24,.16) 100%)}
.parallax{position:absolute;inset:-8% -6%;background:radial-gradient(ellipse at 20% 25%,rgba(255,255,255,.08),transparent 34%),radial-gradient(ellipse at 82% 18%,rgba(255,217,181,.09),transparent 28%),radial-gradient(ellipse at 60% 110%,rgba(0,0,0,.18),transparent 38%);animation:float 9s ease-in-out infinite alternate;pointer-events:none}
@keyframes float{from{transform:translateY(-3px)}to{transform:translateY(3px)}}
.vignette{position:absolute;inset:0;box-shadow:inset 0 0 70px rgba(0,0,0,.26);pointer-events:none}
.portrait-wrap{position:absolute;inset:0;display:grid;align-items:end;justify-items:center;padding:0 2% 0}
.portrait{position:relative;width:min(74%,315px);height:86%;display:flex;align-items:flex-end;justify-content:center;animation:breathe 3.6s ease-in-out infinite;filter:drop-shadow(0 8px 18px rgba(0,0,0,.28))}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(2px) scale(1.006)}}
.portrait img{max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;display:block}
.portrait.talk{animation:talkBob .35s ease-in-out infinite alternate}.portrait.excited{animation:talkBob .26s ease-in-out infinite alternate}.portrait.sad{animation:sad .9s ease-in-out infinite alternate}
@keyframes talkBob{from{transform:translateY(0)}to{transform:translateY(2px)}}@keyframes sad{from{transform:translateY(1px)}to{transform:translateY(3px)}}
.nameplate{position:absolute;left:10px;bottom:72px;z-index:9;background:rgba(20,27,23,.76);color:#f4f6ef;border:1px solid rgba(255,255,255,.24);padding:6px 8px;font-size:11px;min-width:92px}
.statuschips{position:absolute;left:10px;right:10px;top:8px;display:flex;justify-content:space-between;gap:6px;z-index:9}.chip{background:rgba(20,27,23,.6);color:#eff3eb;border:1px solid rgba(255,255,255,.22);padding:4px 6px;font-size:9px;max-width:56%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dialogue{position:absolute;left:4.5%;right:4.5%;bottom:4.5%;min-height:25%;max-height:42%;overflow:auto;z-index:10;background:rgba(240,243,236,.98);color:#1f2722;border:4px double #263129;padding:8px 10px 8px;box-shadow:4px 4px 0 rgba(0,0,0,.22);display:none;white-space:pre-wrap;font-size:clamp(11px,2.5vw,15px);line-height:1.48}
.dialogue.show{display:block}.dialogue b{display:block;margin-bottom:3px}.cursor{display:inline-block;animation:blink .7s steps(1) infinite}@keyframes blink{50%{opacity:0}}
.scan:after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.14;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.08) 0 1px,transparent 1px 3px);mix-blend-mode:soft-light}
.bottom-grid{display:grid;grid-template-columns:116px minmax(0,1fr) 124px;gap:12px;align-items:center}
.touch-frame{background:#56605a;border-radius:8px;padding:8px;box-shadow:inset 0 0 0 2px #3b433d}
.touch-screen{background:var(--screenLight);border:2px solid #222b25;border-radius:3px;overflow:hidden;position:relative;aspect-ratio:4/3}
.touch-head{display:grid;grid-template-columns:32px 1fr auto;align-items:center;height:31px;border-bottom:2px solid #788276;background:#d1d9cf;padding:0 6px;font-size:10px}.touch-head b{text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.touch-head button{width:24px;height:22px;background:#eff3ea;border:1px solid #748072;color:#223026;font-weight:900;cursor:pointer}
.touch-body{position:absolute;inset:31px 0 0;overflow:auto;padding:8px;background:#e6ece1;-webkit-overflow-scrolling:touch}.panel{background:#f2f5ed;border:2px solid #6c776d;padding:8px;box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 #c2cbc0;margin-bottom:8px}.panel-title{font-size:11px;font-weight:900;margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}.muted{font-size:8px;line-height:1.5;color:#677267}.tiny{font-size:8px}.stack{display:grid;gap:6px}.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}.pixel-btn{cursor:pointer;background:#edf2ea;border:2px solid #5a655b;box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 #bac4b8,2px 2px 0 rgba(0,0,0,.08);padding:7px 8px;min-height:34px;color:#223026;font-size:9px}.pixel-btn.primary{background:#d9e6d8}.pixel-btn.danger{background:#ecd5d5}.pixel-btn:active{transform:translate(1px,1px);box-shadow:none}.menu-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.cardbtn{padding:8px;text-align:left}.cardbtn b{display:block;font-size:10px}.cardbtn small{display:block;margin-top:3px;color:#667267;font-size:7px;line-height:1.45}
.chatlog{display:grid;gap:6px;max-height:220px;overflow:auto;padding-right:2px}.bubble{max-width:84%;padding:7px 8px;border:2px solid #5c665d;background:#f3f6ef;font-size:9px;line-height:1.5;white-space:pre-wrap;word-break:break-word;box-shadow:2px 2px 0 rgba(0,0,0,.1)}.bubble.user{justify-self:end;background:#d0ddcf}.bubble.char{justify-self:start}.bubble.sys{justify-self:center;max-width:94%;font-size:8px;background:#dde4d8;color:#627062}.bubble time{display:block;font-size:7px;color:#748075;margin-top:3px;text-align:right}
.compose{margin-top:8px;display:grid;grid-template-columns:1fr auto;gap:6px}.compose textarea,.field,textarea,select,input[type=text],input[type=password],input[type=number],input[type=url]{width:100%;border:2px solid #5b675d;background:#f7faf4;color:#223026;padding:7px 8px;font-size:10px;outline:none;border-radius:0}.compose textarea{resize:none;min-height:46px;max-height:80px}
.quick{display:flex;gap:4px;overflow:auto;padding-bottom:2px}.quick button{white-space:nowrap;font-size:8px;padding:5px 6px;background:#edf1e8;border:1px solid #6b776c;cursor:pointer}
.pill{display:inline-block;padding:2px 5px;border:1px solid #607062;background:#dfe7db;font-size:8px}.meter{height:9px;background:#d8dfd4;border:1px solid #667267;padding:1px}.meter i{display:block;height:100%;background:linear-gradient(90deg,#7f9980,#627962)}
.form label{display:block;font-size:8px;color:#677267;margin-bottom:2px}.form .fieldrow{margin-bottom:8px}.imp-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.thumb{aspect-ratio:3/4;background:#dce4d8;border:2px solid #6a756b;display:grid;place-items:center;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}.bgthumb{aspect-ratio:4/3}.toast{position:fixed;left:50%;bottom:calc(14px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);background:#161b17;color:#fff;border:1px solid #808a80;padding:8px 12px;font-size:10px;opacity:0;pointer-events:none;transition:.2s;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.dpad{position:relative;width:104px;height:104px;margin:auto}.dpad button{position:absolute;background:#3c3e3b;color:#cfd1cd;box-shadow:inset 2px 2px 2px rgba(255,255,255,.08),inset -3px -3px 4px rgba(0,0,0,.4);cursor:pointer}.dpad .up,.dpad .down{width:36px;height:42px;left:34px}.dpad .left,.dpad .right{width:42px;height:36px;top:34px}.dpad .up{top:0;border-radius:6px 6px 0 0}.dpad .down{bottom:0;border-radius:0 0 6px 6px}.dpad .left{left:0;border-radius:6px 0 0 6px}.dpad .right{right:0;border-radius:0 6px 6px 0}.dpad .center{width:36px;height:36px;left:34px;top:34px}.dpad button:active{filter:brightness(.75)}
.action-pad{position:relative;width:120px;height:112px;margin:auto}.action{position:absolute;width:43px;height:43px;border-radius:50%;background:#59615c;color:#f0f1ee;font-weight:900;box-shadow:inset 2px 2px 3px rgba(255,255,255,.18),inset -3px -3px 5px rgba(0,0,0,.4),0 2px 0 #888;cursor:pointer}.action.y{left:0;top:34px}.action.x{left:39px;top:0}.action.b{left:39px;bottom:0}.action.a{right:0;top:34px}.action:active{transform:translateY(2px);box-shadow:inset 2px 2px 5px rgba(0,0,0,.45)}
.system-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-top:10px}.system-buttons{display:flex;gap:12px;justify-self:center}.pillbtn{width:55px;height:13px;border-radius:8px;background:#8e908b;box-shadow:inset 0 2px 2px #676965;color:#393a37;font-size:7px;line-height:13px;text-align:center;cursor:pointer}.mic{justify-self:start;font-size:8px;color:#686966;letter-spacing:.15em}.power{justify-self:end;width:9px;height:9px;border-radius:50%;background:#70a071;box-shadow:0 0 7px rgba(97,193,107,.8)}
@media(max-width:660px){.machine{width:min(96vw,435px);grid-template-rows:auto 15px auto}.hinge{height:15px}.lid{padding:16px 14px 14px}.base{padding:10px 10px 12px}.screen-frame{max-width:360px}.bottom-grid{grid-template-columns:77px minmax(0,1fr) 82px;gap:6px}.dpad{transform:scale(.65)}.action-pad{transform:scale(.65)}.system-row{margin-top:2px}.touch-head{height:27px}.touch-body{inset:27px 0 0}.portrait{width:min(80%,260px)}.nameplate{bottom:66px}}
</style>
</head>
<body>
<div class="machine">
  <section class="lid">
    <div class="speaker left"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="speaker right"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="brand">DUAL//SOUL · PORTRAIT EDITION</div>
    <div class="screen-frame">
      <div class="screen top-screen scan" id="topScreen">
        <div class="top-bg" id="topBg"></div>
        <div class="parallax"></div>
        <div class="bg-overlay"></div>
        <div class="statuschips"><div class="chip" id="chipLeft">未导入角色卡</div><div class="chip" id="chipRight">00:00</div></div>
        <div class="nameplate" id="namePlate">NO CARD</div>
        <div class="portrait-wrap"><div class="portrait" id="portraitWrap"><img id="portraitImg" alt="portrait"></div></div>
        <div class="dialogue" id="dialogueBox"><b id="dialogueName">SYSTEM</b><span id="dialogueText"></span><span class="cursor" id="cursor">▋</span></div>
        <div class="vignette"></div>
      </div>
    </div>
  </section>
  <div class="hinge"></div>
  <section class="base">
    <div class="bottom-grid">
      <div class="dpad">
        <button class="up" data-dpad="up">▲</button><button class="down" data-dpad="down">▼</button><button class="left" data-dpad="left">◀</button><button class="right" data-dpad="right">▶</button><button class="center">■</button>
      </div>
      <div class="touch-frame"><div class="touch-screen"><div class="touch-head"><button id="backBtn">◀</button><b id="screenTitle">欢迎</b><div class="tiny">Wi‑Fi ▂▄▆</div></div><div class="touch-body" id="touchBody"></div></div></div>
      <div class="action-pad">
        <button class="action y" data-act="menu">Y</button><button class="action x" data-act="profile">X</button><button class="action b" data-act="back">B</button><button class="action a" data-act="confirm">A</button>
      </div>
    </div>
    <div class="system-row"><div class="mic">MIC</div><div class="system-buttons"><div class="pillbtn" data-act="select">SELECT</div><div class="pillbtn" data-act="start">START</div></div><div class="power"></div></div>
  </section>
</div>
<input type="file" id="importFile" class="hidden" accept="application/json,.json">
<div class="toast" id="toast"></div>
<script>
const STORAGE='dualSoulPremiumPortraitSave_v1';
const DEFAULT_CARD={
  type:'dual-soul-character-card-v1',
  meta:{packName:'示例角色包',version:'1.0',createdAt:new Date().toISOString()},
  character:{name:'未命名角色',relationship:'熟悉但保持边界',world:'现代都市',personality:'安静、克制、细心，不会默认暧昧或迎合用户。',speech:'说话自然、简洁、真诚。',lore:'',userName:'玩家',notes:''},
  assets:{
    portraits:[
      {id:'neutral',label:'平静',image:''},
      {id:'happy',label:'开心',image:''},
      {id:'shy',label:'害羞',image:''},
      {id:'sad',label:'难过',image:''},
      {id:'surprised',label:'惊讶',image:''}
    ],
    backgrounds:[
      {id:'room',label:'房间',image:''},
      {id:'street',label:'街道',image:''},
      {id:'special',label:'特别场景',image:''}
    ]
  },
  display:{defaultPortrait:'neutral',defaultBackground:'room'},
  prompts:{}
};
const app={view:'home',history:[],typingTimer:null,saveTimer:null};
let state=load();
const $=s=>document.querySelector(s);const body=$('#touchBody');
const portraitOrder=['neutral','happy','shy','sad','surprised'];
const bgOrder=['room','street','special'];
function clone(o){return JSON.parse(JSON.stringify(o))}
function load(){try{return {...{card:null,settings:{scan:true,api:{enabled:false,base:'',key:'',model:'gpt-4.1-mini',temperature:.8,maxTokens:220}},relationship:{trust:10,closeness:8,familiarity:6},currentExpression:'neutral',currentBackground:'room',messages:[{role:'system',text:'欢迎使用 Portrait Edition。导入角色包后即可开始。',time:ts()}]},...JSON.parse(localStorage.getItem(STORAGE)||'{}')}}catch(e){return {card:null,settings:{scan:true,api:{enabled:false,base:'',key:'',model:'gpt-4.1-mini',temperature:.8,maxTokens:220}},relationship:{trust:10,closeness:8,familiarity:6},currentExpression:'neutral',currentBackground:'room',messages:[{role:'system',text:'欢迎使用 Portrait Edition。导入角色包后即可开始。',time:ts()}]}}}
function save(toast){localStorage.setItem(STORAGE,JSON.stringify(state)); if(toast)notify('已保存')}
function ts(){const d=new Date();return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
function notify(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(app.saveTimer);app.saveTimer=setTimeout(()=>el.classList.remove('show'),1800)}
function esc(s=''){return s.replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function currentCard(){return state.card||clone(DEFAULT_CARD)}
function getPortrait(id){return (currentCard().assets.portraits||[]).find(x=>x.id===id)||currentCard().assets.portraits[0]||{}}
function getBg(id){return (currentCard().assets.backgrounds||[]).find(x=>x.id===id)||currentCard().assets.backgrounds[0]||{}}
function setDialogue(name,text){$('#dialogueName').textContent=name; $('#dialogueText').textContent=text||''; $('#dialogueBox').classList.toggle('show',!!text)}
function autoScene(){const h=new Date().getHours(); if(h<6||h>=21)return 'special'; if(h<17)return 'room'; return 'street'}
function renderTop(){const card=currentCard(); const p=getPortrait(state.currentExpression)||{}; const b=getBg(state.currentBackground||autoScene())||{}; $('#namePlate').textContent=card.character.name||'NO CARD'; $('#chipLeft').textContent=state.card ? `${card.character.world||'世界'} · ${card.character.relationship||'关系未定义'}`:'未导入角色卡'; $('#chipRight').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}); const pImg=$('#portraitImg'); if(p.image){pImg.src=p.image; pImg.style.display='block'} else {pImg.removeAttribute('src'); pImg.style.display='none'} const bg=$('#topBg'); if(b.image){bg.style.backgroundImage=`url(${JSON.stringify(b.image).slice(1,-1)})`; bg.style.backgroundColor='#6f8178'} else {bg.style.backgroundImage='linear-gradient(180deg,#95a89a 0 58%,#697062 58%)'} const wrap=$('#portraitWrap'); wrap.className='portrait'; if(state.currentExpression==='happy'||state.currentExpression==='surprised')wrap.classList.add('excited'); else if(state.currentExpression==='sad')wrap.classList.add('sad'); if(app.history[app.history.length-1]?.talking)wrap.classList.add('talk'); }
function header(t){$('#screenTitle').textContent=t}
function homeView(){header('主菜单'); const card=currentCard(); body.innerHTML=`<div class="panel"><div class="panel-title"><span>角色卡状态</span><span class="pill">${state.card?'已载入':'未导入'}</span></div><div class="muted">${state.card?`当前角色：<b>${esc(card.character.name)}</b><br>关系：${esc(card.character.relationship)}<br>世界观：${esc(card.character.world)}`:'先从角色生成器导出角色包，再在这里导入。导入后客户就可以直接开袋即食。'}</div></div><div class="menu-grid"><button class="pixel-btn cardbtn" data-go="chat"><b>聊天</b><small>像乙女游戏一样和角色对话</small></button><button class="pixel-btn cardbtn" data-go="scene"><b>场景</b><small>切换表情与背景，预览动态</small></button><button class="pixel-btn cardbtn" data-go="profile"><b>档案</b><small>查看角色人设与世界观</small></button><button class="pixel-btn cardbtn" data-go="import"><b>导入</b><small>导入角色包或更换角色</small></button><button class="pixel-btn cardbtn" data-go="settings"><b>AI 接口</b><small>连接在线角色回复</small></button><button class="pixel-btn cardbtn" data-go="data"><b>数据</b><small>导出/重置本机存档</small></button></div><div class="panel"><div class="panel-title"><span>关系状态</span><span class="pill">会慢慢变化</span></div><div class="tiny">信任</div><div class="meter"><i style="width:${Math.min(100,state.relationship.trust)}%"></i></div><div class="tiny" style="margin-top:5px">自在</div><div class="meter"><i style="width:${Math.min(100,state.relationship.closeness)}%"></i></div><div class="tiny" style="margin-top:5px">熟悉</div><div class="meter"><i style="width:${Math.min(100,state.relationship.familiarity)}%"></i></div></div>`; }
function sceneView(){header('场景预览'); const ps=(currentCard().assets.portraits||[]).map(p=>`<button class="pixel-btn" data-expression="${p.id}">${esc(p.label||p.id)}</button>`).join(''); const bs=(currentCard().assets.backgrounds||[]).map(b=>`<button class="pixel-btn" data-bg="${b.id}">${esc(b.label||b.id)}</button>`).join(''); body.innerHTML=`<div class="panel"><div class="panel-title">表情切换</div><div class="row">${ps||'<div class="muted">暂无表情图。</div>'}</div></div><div class="panel"><div class="panel-title">背景切换</div><div class="row">${bs||'<div class="muted">暂无背景图。</div>'}</div></div><div class="panel"><div class="panel-title">快捷互动</div><div class="row"><button class="pixel-btn" data-line="今天一直在想你说过的话。" data-autoexp="shy">轻声回应</button><button class="pixel-btn" data-line="这样看着你，好像也不错。" data-autoexp="happy">微笑</button><button class="pixel-btn" data-line="……我刚刚有一点走神。" data-autoexp="surprised">惊讶</button><button class="pixel-btn" data-line="我现在想安静待一会儿。" data-autoexp="sad">低落</button></div></div>`}
function chatView(){header('聊天'); const logs=state.messages.map(m=>`<div class="bubble ${m.role==='user'?'user':m.role==='character'?'char':'sys'}">${esc(m.text)}<time>${m.time}</time></div>`).join(''); body.innerHTML=`<div class="panel"><div class="quick"><button data-quick="今天过得怎么样？">今天过得怎么样？</button><button data-quick="你现在在做什么？">你现在在做什么？</button><button data-quick="我想看看你今天的表情。">我想看看你今天的表情。</button><button data-quick="陪我待一会儿。">陪我待一会儿。</button></div></div><div class="panel"><div class="chatlog" id="chatlog">${logs}</div><div class="compose"><textarea id="chatInput" placeholder="输入想说的话……"></textarea><button class="pixel-btn primary" id="sendBtn">发送</button></div></div>`; $('#sendBtn').onclick=()=>sendMessage(); $('#chatInput').addEventListener('keydown',e=>{if(!e.shiftKey&&e.key==='Enter'){e.preventDefault();sendMessage()}}); body.querySelectorAll('[data-quick]').forEach(b=>b.onclick=()=>sendMessage(b.dataset.quick)); scrollLog(); }
function scrollLog(){const el=$('#chatlog'); if(el) el.scrollTop=el.scrollHeight}
function profileView(){header('角色档案'); const c=currentCard().character; body.innerHTML=`<div class="panel"><div class="panel-title"><span>${esc(c.name)}</span><span class="pill">${esc(c.relationship||'关系未设定')}</span></div><div class="muted"><b>世界观：</b>${esc(c.world||'')}<br><br><b>性格：</b>${esc(c.personality||'')}<br><br><b>说话风格：</b>${esc(c.speech||'')}<br><br><b>背景设定：</b>${esc(c.lore||c.notes||'暂无')}</div></div><div class="panel"><div class="panel-title">立绘与背景</div><div class="imp-preview">${(currentCard().assets.portraits||[]).slice(0,3).map(p=>`<div class="thumb">${p.image?`<img src="${p.image}">`:'-'}</div>`).join('')}</div><div class="imp-preview" style="margin-top:6px">${(currentCard().assets.backgrounds||[]).map(b=>`<div class="thumb bgthumb">${b.image?`<img src="${b.image}">`:'-'}</div>`).join('')}</div></div>`}
function importView(){header('导入角色包'); const c=currentCard(); body.innerHTML=`<div class="panel"><div class="panel-title"><span>角色包导入</span><span class="pill">JSON</span></div><div class="muted">把生成器导出的角色包 JSON 导入这里，客户就能直接开始使用。角色包会包含：5 张上半身像素表情图、3 张背景图、角色设定、人设、世界观与默认显示配置。</div><div class="row" style="margin-top:8px"><button class="pixel-btn primary" id="importBtn">选择 JSON 角色包</button><button class="pixel-btn" id="loadDemoBtn">载入当前角色</button></div></div><div class="panel"><div class="panel-title">当前预览</div><div class="muted"><b>${esc(c.character.name)}</b> · ${esc(c.character.world||'世界未设定')}<br>${esc(c.character.relationship||'关系未设定')}</div><div class="imp-preview" style="margin-top:8px">${(c.assets.portraits||[]).slice(0,3).map(p=>`<div class="thumb">${p.image?`<img src="${p.image}">`:'-'}</div>`).join('')}</div></div>`; $('#importBtn').onclick=()=>$('#importFile').click(); $('#loadDemoBtn').onclick=()=>notify(state.card?'当前角色已载入':'还没有角色包')}
function settingsView(){header('AI 接口'); const a=state.settings.api; body.innerHTML=`<div class="panel form"><div class="fieldrow"><label><input id="apiEnabled" type="checkbox" ${a.enabled?'checked':''}> 启用在线角色回复</label></div><div class="fieldrow"><label>Base URL</label><input class="field" id="apiBase" type="url" value="${esc(a.base||'')}" placeholder="https://api.openai.com/v1/chat/completions"></div><div class="fieldrow"><label>API Key</label><input class="field" id="apiKey" type="password" value="${esc(a.key||'')}" autocomplete="off"></div><div class="fieldrow"><label>模型</label><input class="field" id="apiModel" type="text" value="${esc(a.model||'gpt-4.1-mini')}"></div><div class="fieldrow"><label>Temperature</label><input class="field" id="apiTemp" type="number" step="0.05" min="0" max="2" value="${a.temperature}"></div><div class="fieldrow"><label>Max Tokens</label><input class="field" id="apiMax" type="number" min="80" max="2000" value="${a.maxTokens}"></div><div class="row"><button class="pixel-btn primary" id="saveApiBtn">保存设置</button><button class="pixel-btn" id="testApiBtn">测试接口</button></div><div class="muted" style="margin-top:8px">默认支持 OpenAI 兼容聊天接口。若服务商不允许浏览器跨域（CORS），需要你自己的后端代理。</div><div class="panel" style="margin-top:8px"><div class="panel-title">测试结果</div><div class="muted" id="apiResult">尚未测试。</div></div></div>`; $('#saveApiBtn').onclick=saveApi; $('#testApiBtn').onclick=testApi }
function dataView(){header('数据'); body.innerHTML=`<div class="panel"><div class="panel-title">本机数据</div><div class="stack"><button class="pixel-btn primary" id="saveNow">立即保存</button><button class="pixel-btn" id="exportSave">导出整机存档</button><button class="pixel-btn danger" id="resetSave">删除整机存档</button></div></div>`; $('#saveNow').onclick=()=>save(true); $('#exportSave').onclick=exportSave; $('#resetSave').onclick=()=>{if(confirm('确认删除本机存档？')){localStorage.removeItem(STORAGE); state=load(); setDialogue('SYSTEM','本机存档已清空。'); navigate('home'); renderTop(); notify('已重置')}} }
function navigate(v){app.view=v; ({home:homeView,chat:chatView,scene:sceneView,profile:profileView,import:importView,settings:settingsView,data:dataView}[v]||homeView)(); }
async function sendMessage(text){if(!state.card){notify('请先导入角色包'); navigate('import'); return} const input=$('#chatInput'); const msg=(text||input?.value||'').trim(); if(!msg)return; state.messages.push({role:'user',text:msg,time:ts()}); if(input)input.value=''; state.currentExpression='neutral'; navigate('chat'); save(false); app.history.push({talking:true}); renderTop(); setDialogue(currentCard().character.name,'……'); setTimeout(async()=>{let reply=''; try{reply=state.settings.api.enabled?await apiReply(msg):localReply(msg)}catch(e){reply=localReply(msg)} state.messages.push({role:'character',text:reply,time:ts()}); state.relationship.trust=Math.min(100,state.relationship.trust+1.1); state.relationship.familiarity=Math.min(100,state.relationship.familiarity+1.4); state.relationship.closeness=Math.min(100,state.relationship.closeness + (/陪|想你|喜欢|在意|谢谢/.test(msg)?1.7:.8)); chooseExpression(msg,reply); setDialogue(currentCard().character.name,reply); navigate('chat'); save(false); app.history.push({talking:false}); renderTop(); },450)}
function chooseExpression(user,reply){const t=(user+' '+reply); let e='neutral'; if(/开心|高兴|笑|喜欢|很好|想你|谢谢/.test(t))e='happy'; else if(/脸红|害羞|不好意思/.test(t))e='shy'; else if(/惊|诶|真的吗|突然/.test(t))e='surprised'; else if(/难过|抱歉|累|安静|失落/.test(t))e='sad'; state.currentExpression=e; const cards=currentCard().assets.portraits||[]; if(!cards.find(x=>x.id===e && x.image)) state.currentExpression=currentCard().display.defaultPortrait||'neutral'; }
function localReply(msg){const c=currentCard().character; const name=c.name||'角色'; const lower=msg.toLowerCase(); if(/怎么样|在做什么|忙吗/.test(msg)) return `${name}抬眼看向你。\n“我刚刚还在想一点自己的事，现在可以陪你。”`; if(/陪我|待一会/.test(msg)) return `“好。”${name}的语气放轻了些。\n“你不用一直说话，我在这里。”`; if(/表情|看看你/.test(msg)) return `“那你要看清一点。”\n${name}像是忍不住笑了一下。`; if(/早安/.test(msg)) return `“早安。”\n${name}把声音放得很轻。\n“今天想从哪件事开始？”`; if(/晚安/.test(msg)) return `“晚安。”\n“如果你愿意，明天也可以继续来找我。”`; if(/喜欢|想你/.test(msg)) return `${name}安静了两秒。\n“我听见了。”\n“这种话，对我来说是重要的。”`; if(/谢谢/.test(msg)) return `“不用谢。”\n${name}看着你，神情柔和了一些。`; return `${name}没有立刻回答，而是像认真想了想。\n“${msg.slice(0,18)}……”\n“我记住了。你还想继续说下去吗？”` }
async function apiReply(msg){const a=state.settings.api; const card=currentCard(); const payload={model:a.model,messages:[{role:'system',content:`你在扮演一个乙女游戏风的单一 AI 角色。\n角色名：${card.character.name}\n与用户关系：${card.character.relationship}\n世界观：${card.character.world}\n性格：${card.character.personality}\n说话风格：${card.character.speech}\n补充设定：${card.character.lore||card.character.notes||''}\n规则：1. 不默认暧昧或过度迎合。2. 保持自然、细腻、像精致游戏中的角色对话。3. 回复以简洁的两到四小段为主。4. 不要露出系统身份。`},{role:'user',content:msg}],temperature:Number(a.temperature||.8),max_tokens:Number(a.maxTokens||220)}; const res=await fetch(a.base,{method:'POST',headers:{'Content-Type':'application/json','Authorization':a.key?`Bearer ${a.key}`:''},body:JSON.stringify(payload)}); if(!res.ok) throw new Error('HTTP '+res.status); const j=await res.json(); return j.choices?.[0]?.message?.content?.trim()||localReply(msg)}
function saveApi(){const a=state.settings.api; a.enabled=$('#apiEnabled').checked; a.base=$('#apiBase').value.trim(); a.key=$('#apiKey').value.trim(); a.model=$('#apiModel').value.trim()||'gpt-4.1-mini'; a.temperature=Number($('#apiTemp').value||.8); a.maxTokens=Number($('#apiMax').value||220); save(true)}
async function testApi(){saveApi(); const out=$('#apiResult'); out.textContent='测试中…'; try{const r=await apiReply('请只回复“接口连接成功”。'); out.textContent='成功：'+r}catch(e){out.textContent='失败：'+(e.message||e)}}
function exportSave(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dual-soul-premium-machine-save.json'; a.click(); URL.revokeObjectURL(a.href)}
function importCharacterCard(obj){if(!obj||obj.type!=='dual-soul-character-card-v1') throw new Error('不是支持的角色包格式'); state.card=obj; state.currentExpression=obj.display?.defaultPortrait||'neutral'; state.currentBackground=obj.display?.defaultBackground||'room'; state.messages=[{role:'system',text:`已载入角色包：${obj.character?.name||'未命名角色'}`,time:ts()}]; save(false); setDialogue('SYSTEM',`角色卡已导入。\n现在可以直接开袋即食。`); renderTop(); navigate('home'); notify('角色包导入成功')}
$('#importFile').addEventListener('change',async e=>{const f=e.target.files[0]; if(!f)return; try{importCharacterCard(JSON.parse(await f.text()))}catch(err){notify(err.message||'导入失败')} e.target.value=''})
$('#backBtn').onclick=()=>navigate('home'); document.body.addEventListener('click',e=>{const t=e.target.closest('[data-go],[data-expression],[data-bg],[data-line],[data-autoexp],[data-act]'); if(!t)return; if(t.dataset.go){navigate(t.dataset.go); return} if(t.dataset.expression){state.currentExpression=t.dataset.expression; renderTop(); return} if(t.dataset.bg){state.currentBackground=t.dataset.bg; renderTop(); return} if(t.dataset.line){state.currentExpression=t.dataset.autoexp||state.currentExpression; renderTop(); setDialogue(currentCard().character.name,t.dataset.line); return} if(t.dataset.act){({menu:()=>navigate('home'),profile:()=>navigate('profile'),back:()=>navigate('home'),confirm:()=>app.view==='chat'?sendMessage():navigate('chat'),select:()=>navigate('scene'),start:()=>navigate('chat')}[t.dataset.act]||(()=>{}))()}})
document.body.addEventListener('click',e=>{const q=e.target.closest('[data-quick]'); if(q){sendMessage(q.dataset.quick)}})
document.body.addEventListener('click',e=>{const d=e.target.closest('[data-dpad]'); if(!d)return; const seq={up:['happy','neutral'],down:['sad','neutral'],left:['room','street','special'],right:['street','special','room']}; if(d.dataset.dpad==='up') state.currentExpression=(state.currentExpression==='happy'?'shy':'happy'); else if(d.dataset.dpad==='down') state.currentExpression=(state.currentExpression==='sad'?'neutral':'sad'); else if(d.dataset.dpad==='left'){const idx=Math.max(0,bgOrder.indexOf(state.currentBackground)); state.currentBackground=bgOrder[(idx+2)%bgOrder.length]} else if(d.dataset.dpad==='right'){const idx=Math.max(0,bgOrder.indexOf(state.currentBackground)); state.currentBackground=bgOrder[(idx+1)%bgOrder.length]} renderTop()})
if(state.settings.scan) $('#topScreen').classList.add('scan');
setInterval(renderTop,30000); renderTop(); navigate('home'); setDialogue('SYSTEM', state.card?`已载入角色：${currentCard().character.name}`:'请先导入角色包。');
</script>
</body></html>
