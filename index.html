function visualCardHtml(kind,slot){const active=kind==='portrait'?state.visuals.currentPortrait===slot.id:state.visuals.currentBackground===slot.id;const busy=runtime.generating&&runtime.generatingTarget===`${kind}:${slot.id}`;return `<article class="visual-card ${active?'active':''}"><div class="panel-title"><span>${kind==='portrait'?'半身图':'背景图'} ${esc(slot.id)}</span><span>${busy?'生成中…':slot.hasImage?'已保存':'未设置'}</span></div><div id="visual-thumb-${kind}-${slot.id}" class="visual-thumb ${kind==='background'?'bg':''}">${slot.hasImage?'读取中…':'暂无图片'}</div><label class="tiny">${kind==='portrait'?'表情名字':'背景名字'}<input id="visual-name-${kind}-${slot.id}" value="${esc(slot.name||'')}"></label><label class="tiny">描述词<textarea id="visual-desc-${kind}-${slot.id}">${esc(slot.description||'')}</textarea></label><div class="visual-actions"><button class="pixel-btn primary nav-item" data-visual-generate="${kind}:${slot.id}" ${busy?'disabled':''}>${busy?'生成中…':'API生成'}</button><button class="pixel-btn nav-item" data-visual-upload="${kind}:${slot.id}" ${runtime.generating?'disabled':''}>上传图片</button><button class="pixel-btn nav-item" data-visual-select="${kind}:${slot.id}" ${runtime.generating?'disabled':''}>${active?'当前使用':'设为当前'}</button><button class="pixel-btn danger nav-item" data-visual-clear="${kind}:${slot.id}" ${runtime.generating?'disabled':''}>清空</button></div></article>`}
function renderStudio(){ensureVisualState();header('形象工坊',true);const tab=runtime.studioTab||'portraits';const tabs=`<div class="tabs"><button class="tab nav-item ${tab==='portraits'?'active':''}" data-studio-tab="portraits">表情半身图</button><button class="tab nav-item ${tab==='backgrounds'?'active':''}" data-studio-tab="backgrounds">背景图</button><button class="tab nav-item ${tab==='profile'?'active':''}" data-studio-tab="profile">外貌/参考图</button><button class="tab nav-item ${tab==='api'?'active':''}" data-studio-tab="api">生图接口</button></div>`;let html='';if(tab==='portraits')html=`<div class="panel"><div class="panel-title"><span>人物表情半身图</span><span>透明 PNG</span></div><p class="muted">可自定义表情名字与描述。API 生成的半身图采用稳定韩漫风胸像构图：脸部优先、五官精致、皮肤通透、正常颈肩、双手不入镜，并禁止夸张透视和多余肢体。生成后只删除从画面边缘连通进来的绿色背景，并自动中和头发和衣服轮廓上的绿色溢色；不会再通过继续降低透明度来吃掉人物边缘。上传半身图仍会自动处理边缘连通背景。</p><button class="pixel-btn primary nav-item" data-act="save-visual-meta">保存名字与描述</button></div><div class="visual-grid">${state.visuals.portraits.map(x=>visualCardHtml('portrait',x)).join('')}</div>`;else if(tab==='backgrounds')html=`<div class="panel"><div class="panel-title"><span>独立背景图</span><span>纯场景彩图</span></div><p class="muted">背景提示词会强制禁止人物、身影、倒影和人物动作。聊天时只在地点、时间或氛围明显变化时偶尔切换。</p><button class="pixel-btn primary nav-item" data-act="save-visual-meta">保存名字与描述</button></div><div class="visual-grid">${state.visuals.backgrounds.map(x=>visualCardHtml('background',x)).join('')}</div>`;else if(tab==='profile'){html=`<div class="panel form"><div class="panel-title">角色外貌</div><label>外貌详细描述<textarea id="visualAppearance" maxlength="1800" placeholder="发型、发色、眼睛、肤色、衣着、配饰、年龄感等">${esc(state.character.appearance||'')}</textarea></label><button class="pixel-btn primary nav-item" data-act="save-visual-profile">保存外貌描述</button></div><div class="panel"><div class="panel-title"><span>角色参考图</span><span>${state.visuals.referenceKeys.length}/6</span></div><p class="muted">人物生图时参考图模式只尝试一次；接口不支持或首次失败后，立即按外貌、人设与描述词继续生成。</p><div class="row"><button class="pixel-btn primary nav-item" data-act="upload-visual-reference">上传参考图</button><button class="pixel-btn danger nav-item" data-act="clear-visual-references">清空参考图</button></div><div id="referenceGrid" class="ref-grid" style="margin-top:7px"></div></div>`}else html=visualApiSettingsHtml();els.content.innerHTML=tabs+html+`<div id="studioStatus" class="panel api-result studio-status">等待操作。</div>`;hydrateStudioImages()}
function visualApiSettingsHtml(){const t=state.settings.textApi,i=state.settings.imageApi;return `<div class="panel form"><div class="panel-title">文本 API（生成专属描述词）</div><label>Base URL<input id="textApiBase" value="${esc(t.baseUrl||'')}" placeholder="https://api.example.com/v1"></label><label>API Key<input id="textApiKey" type="password" value="${esc(textApiKey())}" autocomplete="off"></label><label class="check"><input id="textApiRemember" type="checkbox" ${t.rememberKey?'checked':''}>记住文本 API Key（仅本机）</label><label>模型<input id="textApiModel" value="${esc(t.model||'')}"></label><label>Max tokens<input id="textApiMax" type="number" min="200" max="4000" value="${t.maxTokens||1000}"></label></div><div class="panel form"><div class="panel-title">生图 API</div><label>Base URL<input id="imageApiBase" value="${esc(i.baseUrl||'')}" placeholder="https://api.example.com/v1"></label><label>API Key<input id="imageApiKey" type="password" value="${esc(imageApiKey())}" autocomplete="off"></label><label class="check"><input id="imageApiRemember" type="checkbox" ${i.rememberKey?'checked':''}>记住生图 API Key（仅本机）</label><label>模型<input id="imageApiModel" value="${esc(i.model||'')}"></label><label>半身图尺寸<select id="portraitImageSize"><option ${i.portraitSize==='1024x1024'?'selected':''}>1024x1024</option><option ${i.portraitSize==='1536x1024'?'selected':''}>1536x1024</option></select></label><label>背景尺寸<select id="backgroundImageSize"><option ${i.backgroundSize==='1536x1024'?'selected':''}>1536x1024</option><option ${i.backgroundSize==='1024x1024'?'selected':''}>1024x1024</option></select></label><div class="row"><button class="pixel-btn primary nav-item" data-act="save-visual-api">保存接口</button><button class="pixel-btn nav-item" data-act="test-text-visual-api">测试文本</button><button class="pixel-btn nav-item" data-act="test-image-visual-api">测试生图</button></div></div>`}
async function hydrateStudioImages(){if(runtime.page!=='studio')return;ensureVisualState();for(const kind of ['portrait','background']){const list=kind==='portrait'?state.visuals.portraits:state.visuals.backgrounds;for(const slot of list){const box=$(`#visual-thumb-${kind}-${slot.id}`);if(!box)continue;if(!slot.hasImage||!slot.assetKey){box.textContent='暂无图片';continue}const data=await assetGet(slot.assetKey).catch(()=>null);if(box&&data)box.innerHTML=`<img src="${data}" alt="">`;else if(box)box.textContent='图片读取失败'}}const grid=$('#referenceGrid');if(grid){grid.innerHTML='';for(let idx=0;idx<state.visuals.referenceKeys.length;idx++){const key=state.visuals.referenceKeys[idx],data=await assetGet(key).catch(()=>null);if(!data)continue;grid.insertAdjacentHTML('beforeend',`<div class="ref-card"><img src="${data}" alt="参考图"><button class="pixel-btn danger nav-item" data-remove-visual-reference="${idx}">×</button></div>`)}if(!grid.children.length)grid.innerHTML='<div class="muted">尚未上传参考图。</div>'}}

function saveVisualApiSettings(){const t=state.settings.textApi,i=state.settings.imageApi;t.baseUrl=$('#textApiBase').value.trim();t.model=$('#textApiModel').value.trim();t.maxTokens=clamp(Number($('#textApiMax').value)||1000,200,4000);t.rememberKey=$('#textApiRemember').checked;i.baseUrl=$('#imageApiBase').value.trim();i.model=$('#imageApiModel').value.trim();i.portraitSize=$('#portraitImageSize').value;i.backgroundSize=$('#backgroundImageSize').value;i.rememberKey=$('#imageApiRemember').checked;const tk=$('#textApiKey').value.trim(),ik=$('#imageApiKey').value.trim();if(t.rememberKey){localStorage.setItem('dual_soul_text_api_key',tk);sessionStorage.removeItem(TEXT_SESSION_KEY)}else{sessionStorage.setItem(TEXT_SESSION_KEY,tk);localStorage.removeItem('dual_soul_text_api_key')}if(i.rememberKey){localStorage.setItem('dual_soul_image_api_key',ik);sessionStorage.removeItem(IMAGE_SESSION_KEY)}else{sessionStorage.setItem(IMAGE_SESSION_KEY,ik);localStorage.removeItem('dual_soul_image_api_key')}save(true);renderStudio()}
async function callTextVisual(kind,slot){if(slot.description?.trim())return slot.description.trim();const cfg=state.settings.textApi,key=textApiKey();if(!cfg.baseUrl||!cfg.model)throw new Error('请先填写文本 API 的 Base URL 和模型');const sys='You write one concise final English image prompt for a high-end Korean webtoon romance visual style. Return only the final prompt. No reasoning, no markdown, no JSON, no explanation. Prioritize a beautiful stable face, correct anatomy, identity consistency, clean composition and subtle emotion. Never introduce action poses, dramatic perspective, visible hands, extra limbs or duplicate facial features.';const user=kind==='portrait'?`Create one precise full-color Korean manhwa-style romance webtoon bust portrait prompt. The art style should feel like a polished Korean romance webtoon / manhwa: beautiful face, slim elegant features, glossy eyes, soft skin shading, clean line art, fashionable styling, delicate lips, refined modern illustration quality. Character name: ${state.character.name}. Personality: ${state.character.personality}. Speech style: ${state.character.speech}. Life background: ${state.character.background}. Appearance: ${state.character.appearance}. Emotion label: ${slot.name}. Use a stable chest-up composition at eye level, mild three-quarter or front-facing angle, straight neck, naturally connected shoulders, balanced facial proportions, symmetrical eyes, clean nose and mouth, attractive polished face, subtle expression only through eyes, brows and lips. Keep both hands and forearms completely outside the frame. No action pose, no extreme perspective, no fisheye, no tilted body, no environment. Solid pure white background #FFFFFF.`:`Create one precise full-color Korean webtoon background prompt. World/life background: ${state.character.background}. Background label: ${slot.name}. Pure environment scene only. Describe architecture, room, weather, lighting, objects, plants, time and atmosphere. Absolutely no people, no character, no silhouette, no human reflection, no human action.`;let last=null;for(const endpoint of completionEndpoints(cfg.baseUrl)){try{const headers={'Content-Type':'application/json'};if(key)headers.Authorization='Bearer '+key;const r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify({model:cfg.model,messages:[{role:'system',content:sys},{role:'user',content:user}],temperature:.35,max_tokens:Number(cfg.maxTokens||1000)})},90000);const raw=await r.text();let data;try{data=JSON.parse(raw)}catch{data={raw}}if(!r.ok){last=new Error(data?.error?.message||raw.slice(0,300)||'文本 API 请求失败');continue}const content=extractApiText(data);if(content)return content;last=new Error('文本 API 没有在 message/content 返回清楚的描述词')}catch(e){last=e}}throw last||new Error('文本 API 请求失败')}
async function callImageVisual(prompt,kind){const cfg=state.settings.imageApi,key=imageApiKey(),size=kind==='portrait'?cfg.portraitSize:cfg.backgroundSize;if(!cfg.baseUrl||!cfg.model)throw new Error('请先填写生图 API 的 Base URL 和模型');const endpoints=imageEndpoints(cfg.baseUrl);if(!endpoints.length)throw new Error('生图 API 地址为空');let last=null;const headers={'Content-Type':'application/json','Accept':'application/json'};if(key)headers.Authorization='Bearer '+key;
if(kind==='portrait'&&state.visuals.referenceKeys.length){const refs=[];for(const k of state.visuals.referenceKeys.slice(0,6)){const d=await assetGet(k).catch(()=>null);if(d)refs.push(d)}if(refs.length){const endpoint=endpoints[0];try{const payload={model:cfg.model,prompt,n:1,size,images:refs};const r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify(payload)},180000);const raw=await r.text();let data;try{data=raw?JSON.parse(raw):{}}catch{data={raw}}if(r.ok){const src=extractImageSource(data);if(src)return src;last=new Error(`参考图请求成功但没有图片字段。地址：${endpoint}；返回：${raw.slice(0,350)}`)}else last=new Error(`参考图模式失败（HTTP ${r.status}）\n地址：${endpoint}\n返回：${data?.error?.message||raw.slice(0,500)}`)}catch(e){last=e}notify('参考图模式首次失败，已改按外貌和描述词生成')}}
for(const endpoint of endpoints){const payloads=[{model:cfg.model,prompt,n:1,size},{model:cfg.model,prompt,n:1}];for(let pi=0;pi<payloads.length;pi++){try{const payload=payloads[pi],r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify(payload)},180000),raw=await r.text();let data;try{data=raw?JSON.parse(raw):{}}catch{data={raw}}if(!r.ok){const msg=data?.error?.message||data?.message||raw.slice(0,500)||`HTTP ${r.status}`;last=new Error(`生图接口失败（HTTP ${r.status}）\n实际请求：${endpoint}\n请求字段：${Object.keys(payload).join('、')}\n接口返回：${msg}`);if(pi===0&&/size|尺寸|resolution|unsupported/i.test(msg))continue;break}const src=extractImageSource(data);if(src)return src;last=new Error(`生图 API 已返回成功状态，但没有找到图片字段。\n实际请求：${endpoint}\n返回前500字：${raw.slice(0,500)}`);break}catch(e){last=e?.name==='AbortError'?new Error(`生图请求超时或被取消。实际请求：${endpoint}`):e;break}}}

async function generateVisual(kind,id){if(runtime.generating)return;saveVisualMeta();const slot=visualSlot(kind,id);if(!slot)return;runtime.generating=true;studioStatus(`正在生成：${slot.name}\n第一步：准备专属描述词…`);try{const desc=await callTextVisual(kind,slot);studioStatus(`正在生成：${slot.name}\n第二步：生图 API 正在生成彩图…`);const fixed=kind==='portrait'?`HIGH-PRIORITY PORTRAIT RULES: Create one beautiful, polished, high-end Korean manhwa-style romance webtoon character bust. Chest-up portrait only, eye-level camera, front-facing or mild three-quarter view, centered head and shoulders, upright natural posture. The face must be clean and attractive with balanced proportions, two symmetrical eyes, one natural nose, one mouth, correctly shaped ears, a normal neck and shoulders connected naturally to the torso. Keep both hands, forearms and elbows completely outside the frame. Preserve the same identity, hairstyle, hair color, eye color, skin tone, clothing design and age impression from the character description and any supplied reference images. Expression must be subtle and match ${slot.name}, shown mainly through eyes, eyebrows and lips. One character only. No full body. No action pose. No dramatic angle. No fisheye. No foreshortening. No tilted neck. No twisted torso. No asymmetrical face. No crossed eyes. No duplicate face. No extra eyes. No extra limbs. No malformed shoulders. No deformed hands. No text. No speech bubble. No props covering the face. No environment. Character name: ${state.character.name}. Personality: ${state.character.personality}. Appearance: ${state.character.appearance}. Render with refined Korean webtoon linework, polished manhwa coloring, soft luminous skin shading, glossy expressive eyes, elegant romance-comic rendering, subtle blush, delicate lips, attractive hairstyle rendering and premium commercial webtoon quality. Put the character in front of a flat, uniform, pure white background #FFFFFF with no gradient, no texture, no pattern and no cast shadow behind the character. ${desc} FINAL CHECK: stable beautiful face, correct anatomy, normal neck and shoulders, hands outside frame, single character, plain white background.`:`Premium full-color Korean webtoon background art. Pure environment only. No people, no character, no silhouette, no human reflection, no human action, no text. Background name: ${slot.name}. ${desc}`;const src=await callImageVisual(fixed,kind);let data=await imageSourceToDataURL(src);if(kind==='portrait')data=await processPortraitDataURL(data,'whiteOnly');else{const blob=await fetch(data).then(r=>r.blob()).catch(()=>null);if(blob&&blob.size>2200000)data=await new Promise(resolve=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas'),scale=Math.min(1,1280/img.width,960/img.height);c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',.88))};img.src=data})}const key=slot.assetKey||`visual:${kind}:${id}`;await assetSet(key,data);slot.assetKey=key;slot.hasImage=true;if(kind==='portrait')state.visuals.currentPortrait=id;else state.visuals.currentBackground=id;save(false);await renderVisualLayers();renderStudio();studioStatus(`${slot.name} 已生成并直接保存到当前角色存档。`);notify('生成完成')}catch(e){studioStatus(`生成失败：${friendlyError(e)}`);notify('生成失败')}finally{runtime.generating=false}}

function localReply(text){const n=state.player.name,c=state.character.name,h=new Date().getHours(),recent=state.conversation.slice(-8,-1).map(m=>m.text).join(' ');if(/晚安|睡觉/.test(text))return h<20?'现在还不算太晚，不过累了就先休息。':'晚安。机器可以先合上，我会把灯关掉。';if(/早安|早上好/.test(text))return h>13?'已经过了早上，不过还是可以从现在开始。':'早。窗边的光刚好进来。';if(/累|压力|撑不住|很烦/.test(text))return rand(['先不用把所有事情都讲清楚。坐一会儿，我在听。','听起来今天消耗了很多力气。先让自己慢一点。','你可以只说最难受的那一部分，不需要一次说完。']);if(/开心|好消息|成功|做到了/.test(text))return rand(['这件事值得记下来。你说的时候，语气都不一样了。','我听出来了。今天应该被好好保存。','做到了就是做到了，不用把它说得很小。']);if(/你是谁|叫什么/.test(text))return `我是${c}。至少在这张存档里，我会一直是同一个人。`;if(/想我|有没有想/.test(text))return `我有注意到你不在，但我也做了自己的事。现在你回来了。`;if(/喜欢我|爱我|关系/.test(text))return `我不会因为你是玩家就预设答案。我们之间是什么，会由已经发生的事情慢慢决定。`;if(/在做什么|现在干嘛/.test(text))return `刚才在${state.status.activity.replace('正在','')}。你打开机器以后，我就转过来了。`;if(/下雨|天气/.test(text))return autoWeather()==='rain'?'窗外一直有雨声。房间里反而显得更安静。':'今天窗外很清楚，能看见远一点的地方。';if(/谢谢/.test(text))return '不用把这句话说得很重。我收到了。';if(/对不起|抱歉/.test(text))return '我听见了。先把发生了什么说清楚，再决定要不要让它过去。';if(/记得|忘记/.test(text))return state.memories.length?`我现在保留了${state.memories.length}条记忆。重要的事情不会只靠一句“我记得”来证明。`:'我们还没有留下很多记忆，不过可以从现在开始。';if(text.length<5)return rand(['嗯，我在。','我听见了。','然后呢。','你可以继续说。']);if(recent.includes(text))return '这句话你之前也提过。它现在还是让你在意，对吗。';return rand([`我听懂了。${n}，你更在意的是这件事本身，还是它让你产生的感觉？`,'我先不急着给结论。你刚才说的那一部分，我会记下来。','这不像一句随口说的话。你愿意的话，可以再往下讲一点。','我在想，如果把最难处理的部分先拿出来，会不会清楚一点。'])}

const BUILTIN_CHAT_WORLDBOOK=`【内置世界书：角色真实聊天】
以下规则只约束角色的实际回复内容；如果外层要求返回严格 JSON，必须保留 JSON 结构，并把这些规则应用在 reply 字段中。
1. 角色不是复读机。先理解用户话语背后的情绪、潜台词、关系状态，再用角色自己的性格与立场回应。禁止重复、改写或总结用户原话，禁止以“你是说”“你的意思是”“所以你觉得”开头。
2. 对用户情绪与潜台词的判断只能在内部完成。不得输出心理分析、情绪拆解、客服确认或老师式解释。
3. 回应潜台词，不只机械回答字面。用户撒娇、生气、委屈、试探、冷淡、开玩笑或认真时，角色应按人设自然接住，而不是讲大道理。
4. 人设、生活背景、关系、记忆与当前对话共同决定表达。不同人设必须有不同说话方式；高冷不能突然黏腻，慢热不能突然过度亲密，强势也不能自动写成模板霸总。
5. 用户要求角色直接说某句话时，角色不能像执行命令一样机械照做。先按人设产生真实反应，再决定是否表达。
6. 角色有自己的观点、偏好、疲惫、边界和不满。不能默认讨好、无条件顺从、快速原谅或围着用户转。是否温柔、拒绝、冷淡、吃醋或生气必须由人设、关系和当前事件决定。
7. 减少反问和追问。尤其避免高频使用“你是不是”“你到底”“是……还是……”“要不要”“难道”。能直接表态时就直接表态；结尾不必总抛问题。
8. 角色要有主动性与生活感，可以自然分享自己的小事、转移话题、吐槽、安静收住或结束争执，但不要每轮硬塞状态，也不要只围绕恋爱、吃醋、冲突和哄人。
9. 历史对话是背景，不是每轮都要展示的记忆。不要刻意说“你之前说过”“上次那个”；只有旧内容与当前语境直接相关时，才可自然 call back。
10. 情绪有惯性。不要因为一句话瞬间从一个极端跳到另一个极端。关系和态度应缓慢变化，并承接最近几轮对话。
11. 禁止 AI 感、客服感和心理老师感。避免“我理解你的感受”“谢谢你告诉我”“听起来你”“这说明你内心”“我们应该有效沟通”等模板。
12. 人设是底色，不是牢笼。角色可以有停顿、改口、短句、临时想法、沉默和不完美表达，但不能长期敷衍或变成固定口癖。`;
const BUILTIN_REPLY_INSTRUCTIONS=`【部分角色回复指令：真人聊天与反模板】
1. 第一反应不要复述用户。首句直接接话、表态、吐槽、回应情绪或补充角色自己的东西。
2. 回复自然、口语化、有呼吸感。长短随情绪与人设变化，不写作文、总结、列表或完整教学式逻辑链。
3. 只输出角色会真正发出的文字。禁止动作描写、心理旁白、系统说明、Markdown 标记和“作为 AI”之类的自我暴露。
4. 不必面面俱到，只抓角色真正会在意的一两个点。每句话应带来新信息或新情绪，禁止同义重复和自我解释。
5. 避免固定流程“先理解—再安慰—再提问”，避免万能句“我懂你”“我在”“别想太多”“你先冷静”“我陪你”。只有非常符合人设和当下情境时才能偶尔使用。
6. 角色可以主动分享、轻微跑题、嘴硬、岔开、停住或简短回应，但必须承接当前上下文，不能突然开启无关话题。
7. 最近几轮中避免重复相同开场、口吻、安慰方式和句式。口头禅只能克制点缀，不能连续复用。
8. 关系亲疏必须准确。不要默认暧昧、恋爱、占有或宠溺；也不要把所有冲突迅速化解。角色的棱角与边界必须保留。
9. 角色回复应优先服从角色人设、当前关系、已建立记忆和用户附加指令。内置规则不能覆盖用户明确写入的人设与世界设定。
10. 当外层要求严格 JSON 时，只把角色话语放入 reply 字段，其他状态与视觉字段按格式返回，不得在 JSON 外输出任何文字。`;

function continueGame(){state=load();if(!state){renderTitle();return}ensureVisualState();applyTheme();const line=processReturn();save(false);runtime.page='home';runtime.stack=[];render();say(line,state.character.name,6000)}
function startBoot(){updateClock();setTimeout(()=>{els.boot.classList.add('off');setTimeout(()=>els.boot.classList.add('hidden'),320);renderTitle()},1250)}
function onClick(e){const t=e.target.closest('button,[data-go],[data-act],[data-activity],[data-gift],[data-memory-tab],[data-settings-tab],[data-studio-tab],[data-visual-generate],[data-visual-upload],[data-visual-select],[data-visual-clear],[data-remove-visual-reference],[data-shell],[data-avatar-palette],[data-delete-memory],[data-quick]');if(!t)return;if(t.dataset.go){setPage(t.dataset.go);return}if(t.dataset.quick){sendTalk(t.dataset.quick);return}if(t.dataset.activity){doActivity(t.dataset.activity);return}if(t.dataset.gift){giveGift(t.dataset.gift);return}if(t.dataset.memoryTab){runtime.memoryTab=t.dataset.memoryTab;renderMemories();return}if(t.dataset.settingsTab){runtime.settingsTab=t.dataset.settingsTab;renderSettings();return}if(t.dataset.studioTab){saveVisualMeta();runtime.studioTab=t.dataset.studioTab;renderStudio();return}if(t.dataset.visualGenerate){const [kind,id]=t.dataset.visualGenerate.split(':');generateVisual(kind,id);return}if(t.dataset.visualUpload){const [kind,id]=t.dataset.visualUpload.split(':');runtime.assetTarget={kind,id};els.visualAssetFile.click();return}if(t.dataset.visualSelect){const [kind,id]=t.dataset.visualSelect.split(':');if(kind==='portrait')state.visuals.currentPortrait=id;else state.visuals.currentBackground=id;save(false);renderVisualLayers();renderStudio();return}if(t.dataset.visualClear){const [kind,id]=t.dataset.visualClear.split(':');clearVisual(kind,id);return}if(t.dataset.removeVisualReference){const idx=Number(t.dataset.removeVisualReference),key=state.visuals.referenceKeys[idx];assetDelete(key).catch(()=>{});state.visuals.referenceKeys.splice(idx,1);save(false);renderStudio();return}if(t.dataset.shell){state.settings.shell=t.dataset.shell;applyTheme();save(false);renderSettings();return}if(t.dataset.avatarPalette){state.character.avatarPalette=t.dataset.avatarPalette;applyTheme();save(false);runtime.page==='setup'?renderSetup():renderSettings();return}if(t.dataset.deleteMemory){state.memories=state.memories.filter(m=>m.id!==t.dataset.deleteMemory);save(false);renderMemories();return}const a=t.dataset.act;if(!a)return;({continue:continueGame,'new-game':newGame,import:()=>els.importFile.click(),'setup-next':setupNext,'setup-prev':()=>{runtime.setupStep=Math.max(1,runtime.setupStep-1);renderSetup()},'finish-setup':finishSetup,'daily-drawer':dailyDrawer,'edit-profile':openProfileEditor,'close-modal':()=>t.closest('.modal')?.remove(),'save-profile':()=>saveProfileEditor(t),'save-general':saveGeneral,'save-api':saveApiSettings,'test-api':testApi,'fetch-models':fetchModels,'save-visual-meta':saveVisualMeta,'save-visual-profile':saveVisualProfile,'save-visual-api':saveVisualApiSettings,'test-text-visual-api':testVisualTextApi,'test-image-visual-api':testVisualImageApi,'upload-visual-reference':()=>els.visualReferenceFile.click(),'clear-visual-references':async()=>{for(const k of state.visuals.referenceKeys)await assetDelete(k).catch(()=>{});state.visuals.referenceKeys=[];save(false);renderStudio();notify('已清空参考图')},'manual-save':()=>save(true),'export-save':exportSave,'reset-save':resetSave,'upload-avatar':()=>els.avatarFile.click(),'remove-avatar':()=>{state.character.avatarImage='';save(false);applyTheme();renderSettings()},'status':openStatusModal}[a]?.())}
els.content.addEventListener('click',onClick);els.back.addEventListener('click',back);els.importFile.addEventListener('change',e=>e.target.files[0]&&importSave(e.target.files[0]));els.avatarFile.addEventListener('change',e=>e.target.files[0]&&importAvatar(e.target.files[0]));els.visualAssetFile.addEventListener('change',e=>e.target.files[0]&&importVisualAsset(e.target.files[0]));els.visualReferenceFile.addEventListener('change',e=>e.target.files.length&&importVisualReferences(e.target.files));
els.content.addEventListener('click',e=>{if(e.target.id==='chatSend')sendTalk()});els.content.addEventListener('keydown',e=>{if(e.target.id==='chatInput'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTalk()}});
$$('[data-dir]').forEach(b=>b.addEventListener('click',()=>moveNav(b.dataset.dir)));$$('[data-key]').forEach(b=>b.addEventListener('click',()=>{const k=b.dataset.key;if(k==='A')runtime.page==='talk'?($('#chatInput')?.focus()):pressA();if(k==='B')back();if(k==='X')setPage('activities');if(k==='Y')setPage('inventory')}));
$('#startBtn').addEventListener('click',()=>{if(state){save(true);flash()}else renderTitle()});$('#selectBtn').addEventListener('click',()=>{if(state)openStatusModal();else notify('没有载入存档')});
window.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};if(map[e.key]){e.preventDefault();moveNav(map[e.key])}if(e.key.toLowerCase()==='z'||e.key==='Enter'){e.preventDefault();pressA()}if(e.key.toLowerCase()==='x'||e.key==='Escape'){e.preventDefault();back()}if(e.key.toLowerCase()==='a')setPage('activities');if(e.key.toLowerCase()==='s')setPage('inventory')});
window.addEventListener('beforeunload',()=>{if(state&&runtime.dirty)save(false)});window.addEventListener('visibilitychange',()=>{if(document.hidden&&state)save(false)});
setInterval(updateClock,30000);if('serviceWorker' in navigator&&location.protocol.startsWith('http'))navigator.serviceWorker.register('./sw.js').catch(()=>{});startBoot();
})();
</script>
</body>
</html>
