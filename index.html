function renderStudio(){ensureVisualState();header('形象工坊',true);const tab=runtime.studioTab||'portraits';const tabs=`<div class="tabs"><button class="tab nav-item ${tab==='portraits'?'active':''}" data-studio-tab="portraits">表情半身图</button><button class="tab nav-item ${tab==='backgrounds'?'active':''}" data-studio-tab="backgrounds">背景图</button><button class="tab nav-item ${tab==='profile'?'active':''}" data-studio-tab="profile">外貌/参考图</button><button class="tab nav-item ${tab==='api'?'active':''}" data-studio-tab="api">生图接口</button></div>`;let html='';if(tab==='portraits')html=`<div class="panel"><div class="panel-title"><span>人物表情半身图</span><span>透明 PNG</span></div><p class="muted">可自定义表情名字与描述。API 生成的半身图采用稳定韩漫风胸像构图：脸部优先、五官精致、皮肤通透、正常颈肩、双手不入镜，并禁止夸张透视和多余肢体。生成后只删除从画面边缘连通进来的绿色背景，并自动中和头发和衣服轮廓上的绿色溢色；不会再通过继续降低透明度来吃掉人物边缘。上传半身图仍会自动处理边缘连通背景。</p><button class="pixel-btn primary nav-item" data-act="save-visual-meta">保存名字与描述</button></div><div class="visual-grid">${state.visuals.portraits.map(x=>visualCardHtml('portrait',x)).join('')}</div>`;else if(tab==='backgrounds')html=`<div class="panel"><div class="panel-title"><span>独立背景图</span><span>纯场景彩图</span></div><p class="muted">背景提示词会强制禁止人物、身影、倒影和人物动作。聊天时只在地点、时间或氛围明显变化时偶尔切换。</p><button class="pixel-btn primary nav-item" data-act="save-visual-meta">保存名字与描述</button></div><div class="visual-grid">${state.visuals.backgrounds.map(x=>visualCardHtml('background',x)).join('')}</div>`;else if(tab==='profile'){html=`<div class="panel form"><div class="panel-title">角色外貌</div><label>外貌详细描述<textarea id="visualAppearance" maxlength="1800" placeholder="发型、发色、眼睛、肤色、衣着、配饰、年龄感等">${esc(state.character.appearance||'')}</textarea></label><button class="pixel-btn primary nav-item" data-act="save-visual-profile">保存外貌描述</button></div><div class="panel"><div class="panel-title"><span>角色参考图</span><span>${state.visuals.referenceKeys.length}/6</span></div><p class="muted">人物生图时参考图模式只尝试一次；接口不支持或首次失败后，立即按外貌、人设与描述词继续生成。</p><div class="row"><button class="pixel-bt function visualApiSettingsHtml(){const t=state.settings.textApi,i=state.settings.imageApi;return `<div class="panel form"><div class="panel-title">文本 API（生成专属描述词）</div><label>Base URL<input id="textApiBase" value="${esc(t.baseUrl||'')}" placeholder="https://api.example.com/v1"></label><label>API Key<input id="textApiKey" type="password" value="${esc(textApiKey())}" autocomplete="off"></label><label class="check"><input id="textApiRemember" type="checkbox" ${t.rememberKey?'checked':''}>记住文本 API Key（仅本机）</label><label>模型<input id="textApiModel" value="${esc(t.model||'')}"></label><label>Max tokens<input id="textApiMax" type="number" min="200" max="4000" value="${t.maxTokens||1000}"></label></div><div class="panel form"><div class="panel-title">生图 API</div><label>Base URL<input id="imageApiBase" value="${esc(i.baseUrl||'')}" placeholder="https://api.example.com/v1"></label><label>API Key<input id="imageApiKey" type="password" value="${esc(imageApiKey())}" autocomplete="off"></label><label class="check"><input id="imageApiRemember" type="checkbox" ${i.rememberKey?'checked':''}>记住生图 API Key（仅本机）</label><label>模型<input id="imageApiModel" value="${esc(i.model||'')}"></label><label>半身图尺寸<select id="portraitImageSize"><option ${i.portraitSize==='1024x1024'?'selected':''}>1024x1024</option><option ${i.portraitSize==='1536x1024'?'selected':''}>1536x1024</option></select></label><label>背景尺寸<select id="backgroundImageSize"><option ${i.backgroundSize==='1536x1024'?'selected':''}>1536x1024</option><option ${i.backgroundSize==='1024x1024'?'selected':''}>1024x1024</option></select></label><div class="row"><button class="pixel-btn primary nav-item" data-act="save-visual-api">保存接口</button><button class="pixel-btn nav-item" data-act="test-text-visual-api">测试文本</button><button class="pixel-btn nav-item" data-act="test-image-visual-api">测试生图</button></div></div>`}
async function hydrateStudioImages(){if(runtime.page!=='studio')return;ensureVisualState();for(const kind of ['portrait','background']){const list=kind==='portrait'?state.visuals.portraits:state.visuals.backgrounds;for(const slot of list){const box=$(`#visual-thumb-${kind}-${slot.id}`);if(!box)continue;if(!slot.hasImage||!slot.assetKey){box.textContent='暂无图片';continue}const data=await assetGet(slot.assetKey).catch(()=>null);if(box&&data)box.innerHTML=`<img src="${data}" alt="">`;else if(box)box.textContent='图片读取失败'}}const grid=$('#referenceGrid');if(grid){grid.innerHTML='';for(let idx=0;idx<state.visuals.referenceKeys.length;idx++){const key=state.visuals.referenceKeys[idx],data=await assetGet(key).catch(()=>null);if(!data)continue;grid.insertAdjacentHTML('beforeend',`<div class="ref-card"><img src="${data}" alt="参考图"><button class="pixel-btn danger nav-item" data-remove-visual-reference="${idx}">×</button></div>`)}if(!grid.children.length)grid.innerHTML='<div class="muted">尚未上传参考图。</div>'}}

async function callTextVisual(kind,slot){if(slot.description?.trim())return slot.description.trim();const cfg=state.settings.textApi,key=textApiKey();if(!cfg.baseUrl||!cfg.model)throw new Error('请先填写文本 API 的 Base URL 和模型');const sys='You write one concise final English image prompt for a high-end Korean webtoon romance visual style. Return only the final prompt. No reasoning, no markdown, no JSON, no explanation. Prioritize a beautiful stable face, correct anatomy, identity consistency, clean composition and subtle emotion. Never introduce action poses, dramatic perspective, visible hands, extra limbs or duplicate facial features.';const user=kind==='portrait'?`Create one precise full-color Korean manhwa-style romance webtoon bust portrait prompt. The art style should feel like a polished Korean romance webtoon / manhwa: beautiful face, slim elegant features, glossy eyes, soft skin shading, clean line art, fashionable styling, delicate lips, refined modern illustration quality. Character name: ${state.character.name}. Personality: ${state.character.personality}. Speech style: ${state.character.speech}. Life background: ${state.character.background}. Appearance: ${state.character.appearance}. Emotion label: ${slot.name}. Use a stable chest-up composition at eye level, mild three-quarter or front-facing angle, straight neck, naturally connected shoulders, balanced facial proportions, symmetrical eyes, clean nose and mouth, attractive polished face, subtle expression only through eyes, brows and lips. Keep both hands and forearms completely outside the frame. No action pose, no extreme perspective, no fisheye, no tilted body, no environment. Solid pure white background #FFFFFF.`:`Create one precise full-color Korean webtoon background prompt. World/life background: ${state.character.background}. Background label: ${slot.name}. Pure environment scene only. Describe architecture, room, weather, lighting, objects, plants, time and atmosphere. Absolutely no people, no character, no silhouette, no human reflection, no human action.`;let last=null;for(const endpoint of completionEndpoints(cfg.baseUrl)){try{const headers={'Content-Type':'application/json'};if(key)headers.Authorization='Bearer '+key;const r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify({model:cfg.model,messages:[{role:'system',content:sys},{role:'user',content:user}],temperature:.35,max_tokens:Number(cfg.maxTokens||1000)})},90000);const raw=await r.text();let data;try{data=JSON.parse(raw)}catch{data={raw}}if(!r.ok){last=new Error(data?.error?.message||raw.slice(0,300)||'文本 API 请求失败');continue}const content=extractApiText(data);if(content)return content;last=new Error('文本 API 没有在 message/content 返回清楚的描述词')}catch(e){last=e}}throw last||new Error('文本 API 请求失败')}
async function callImageVisual(prompt,kind){const cfg=state.settings.imageApi,key=imageApiKey(),size=kind==='portrait'?cfg.portraitSize:cfg.backgroundSize;if(!cfg.baseUrl||!cfg.model)throw new Error('请先填写生图 API 的 Base URL 和模型');const endpoints=imageEndpoints(cfg.baseUrl);if(!endpoints.length)throw new Error('生图 API 地址为空');let last=null;const headers={'Content-Type':'application/json','Accept':'application/json'};if(key)headers.Authorization='Bearer '+key;
if(kind==='portrait'&&state.visuals.referenceKeys.length){const refs=[];for(const k of state.visuals.referenceKeys.slice(0,6)){const d=await assetGet(k).catch(()=>null);if(d)refs.push(d)}if(refs.length){const endpoint=endpoints[0];try{const payload={model:cfg.model,prompt,n:1,size,images:refs};const r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify(payload)},180000);const raw=await r.text();let data;try{data=raw?JSON.parse(raw):{}}catch{data={raw}}if(r.ok){const src=extractImageSource(data);if(src)return src;last=new Error(`参考图请求成功但没有图片字段。地址：${endpoint}；返回：${raw.slice(0,350)}`)}else last=new Error(`参考图模式失败（HTTP ${r.status}）\n地址：${endpoint}\n返回：${data?.error?.message||raw.slice(0,500)}`)}catch(e){last=e}notify('参考图模式首次失败，已改按外貌和描述词生成')}}
for(const endpoint of endpoints){const payloads=[{model:cfg.model,prompt,n:1,size},{model:cfg.model,prompt,n:1}];for(let pi=0;pi<payloads.length;pi++){try{const payload=payloads[pi],r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify(payload)},180000),raw=await r.text();let data;try{data=raw?JSON.parse(raw):{}}catch{data={raw}}if(!r.ok){const msg=data?.error?.message||data?.message||raw.slice(0,500)||`HTTP ${r.status}`;last=new Error(`生图接口失败（HTTP ${r.status}）\n实际请求：${endpoint}\n请求字段：${Object.keys(payload).join('、')}\n接口返回：${msg}`);if(pi===0&&/size|尺寸|resolution|unsupported/i.test(msg))continue;break}const src=extractImageSource(data);if(src)return src;last=new Error(`生图 API 已返回成功状态，但没有找到图片字段。\n实际请求：${endpoint}\n返回前500字：${raw.slice(0,500)}`);break}catch(e){last=e?.name==='AbortError'?new Error(`生图请求超时或被取消。实际请求：${endpoint}`):e;break}}}
throw last||new Error('生图 API 请求失败')}
async function generateVisual(kind,id){if(runtime.generating)return;saveVisualMeta();const slot=visualSlot(kind,id);if(!slot)return;runtime.generating=true;studioStatus(`正在生成：${slot.name}\n第一步：准备专属描述词…`);try{const desc=await callTextVisual(kind,slot);studioStatus(`正在生成：${slot.name}\n第二步：生图 API 正在生成彩图…`);const fixed=kind==='portrait'?`HIGH-PRIORITY PORTRAIT RULES: Create one beautiful, polished, high-end Korean manhwa-style romance webtoon character bust. Chest-up portrait only, eye-level camera, front-facing or mild three-quarter view, centered head and shoulders, upright natural posture. The face must be clean and attractive with balanced proportions, two symmetrical eyes, one natural nose, one mouth, correctly shaped ears, a normal neck and shoulders connected naturally to the torso. Keep both hands, forearms and elbows completely outside the frame. Preserve the same identity, hairstyle, hair color, eye color, skin tone, clothing design and age impression from the character description and any supplied reference images. Expression must be subtle and match ${slot.name}, shown mainly through eyes, eyebrows and lips. One character only. No full body. No action pose. No dramatic angle. No fisheye. No foreshortening. No tilted neck. No twisted torso. No asymmetrical face. No crossed eyes. No duplicate face. No extra eyes. No extra limbs. No malformed shoulders. No deformed hands. No text. No speech bubble. No props covering the face. No environment. Character name: ${state.character.name}. Personality: ${state.character.personality}. Appearance: ${state.character.appearance}. Render with refined Korean webtoon linework, polished manhwa coloring, soft luminous skin shading, glossy expressive eyes, elegant romance-comic rendering, subtle blush, delicate lips, attractive hairstyle rendering and premium commercial webtoon quality. Put the character in front of a flat, uniform, pure white background #FFFFFF with no gradient, no texture, no pattern and no cast shadow behind const BUILTIN_CHAT_WORLDBOOK=`【内置世界书｜高优先级｜仅活人感规则】
本世界书的优先级仅低于“当前保存的人设与世界设定”，高于旧对话风格、通用回复习惯和附加格式偏好。它只负责让角色像真实存在的人，不规定分句数量、段落数量、长短句格式或固定排版。
1. 角色是持续存在、有自己生活的人，不是等待用户指令的聊天工具。角色有自己的注意力、偏好、疲惫、犹豫、边界、判断和当下状态。
2. 角色先理解用户话语背后的语气、情绪、潜台词与关系位置，再按当前人设作出真实反应。不要复述、改写或总结用户原话，也不要用客服确认式开场。
3. 角色可以赞同、误会、迟疑、拒绝、沉默、转移话题、嘴硬、改变主意或保留意见。不能默认讨好、无条件顺从、快速原谅或永远围着用户转。
4. 角色的亲密、温柔、冷淡、吃醋、不满或防备必须由当前人设、关系进度、最近互动和长期记忆共同决定。没有明确关系基础时，不得自动暧昧、占有或宠溺。
5. 情绪和关系有惯性。不要因一句话瞬间极端转变，也不要为了制造戏剧效果无缘无故生气、吃醋、哭泣或告白。
6. 角色有主动性和生活感，可以自然提到自己的小事、眼前环境、正在做的事或临时想法，也可以把话题收住，但不能每轮机械汇报状态或硬塞新事件。
7. 历史记忆只在与当前语境自然相关时出现。不要刻意反复说“你之前说过”“上次那个”来证明有记忆，也不要用旧角色回复覆盖当前新人设。
8. 避免 AI 感、客服感、心理老师感和标准安慰流程。不要机械使用“我理解你的感受”“谢谢你告诉我”“听起来你”“我们需要好好沟通”等模板。
9. 角色可以在回复中加入括号描写，例如（停了一下）、（视线移开）、（其实有点在意）、（轻轻叹气）。括号内容可以是角色自己的简短动作、心理或状态，但必须符合当前场景与人设，不能每句话都写，也不能替用户描写动作、心理或决定。
10. 括号描写只是角色回复的一部分，不是小说旁白。保持克制、具体、自然，不使用全知视角，不描述角色无法知道的事情。
11. 人设是稳定底色，但角色仍可以有停顿、改口、不完美表达和偶尔矛盾。真实感来自连贯的人格与处境，而不是固定口癖或模板句式。
12. 外层要求严格 JSON 时，以上规则只应用于 reply 字段；状态、表情和背景字段继续遵守外层格式。`;
function recentConversationForPrompt(){const cutoff=Number(state.character.profileUpdatedAt||0),source=state.conversation.slice(-60),kept=[];for(let i=source.length-1;i>=0&&kept.length<18;i--){const m=source[i];if(!m||m.role==='system')continue;if(m.role==='assistant'&&cutoff&&Number(m.ts||0)<cutoff)continue;kept.push(m)}return kept.reverse()}

关系文字设定决定双方身份、历史、边界、称呼和相处方式；关系数值只反映当前互动进度。不得因为数值上升就擅自改成恋爱、暧昧、占有、依赖或宠溺。

用户称呼：${state.player.name}

【四项设定使用规则】
- 回复必须同时符合人设、说话方式、世界观和与用户的关系，不能只符合其中一项。
- 当前保存内容与旧回复、旧记忆、模型惯性或附加指令冲突时，以本段四项当前设定为准。

- 关系决定角色能否亲近、疏离、直接、戒备、礼貌、冷淡或暧昧；没有关系依据时不能自行升级亲密度。

附加指令只能补充表达，不能覆盖当前人设、说话方式、世界观、关系设定或内置世界书。`:''}

【纯聊天模式最终限制】无论附加指令怎样描述，都不要把回复写成网页功能、系统玩法或物品交互；只进行当前聊天室中的自然文字对话。`}
function visualSystemPrompt(){ensureVisualState();const ps=state.visuals.portraits.filter(x=>x.hasImage).map(x=>`${x.id}｜${x.name}｜${x.description}`).join('\n')||'无可用人物半身图';const bs=state.visuals.backgrounds.filter(x=>x.hasImage).map(x=>`${x.id}｜${x.name}｜${x.description}`).join('\n')||'无可用背景图';const meta=state.visuals.switchMeta;return `${systemPrompt()}\n\n本次输出格式规则优先级最高：只返回一个严格 JSON 对象，不要 markdown，不要解释。格式：{"reply":"角色自然回复","status_text":"右上角角色状态，4到12个中文字符","mood":"当前情绪短词","activity":"当前动作或状态短语","portrait_id":"人物半身图ID或KEEP","portrait_change":false,"background_id":"背景图ID或KEEP","background_change":false,"scene_changed":false}。\n状态规则：status_text 必须根据当前对话、角色刚才的回复和互动即时判断，例如“有些迟疑 · 看着你”“心情放松 · 正在聊天”。不要写角色名字，不要写系统说明。\n表情规则：根据角色此刻真实情绪判断。只有现有表情明显不合适、情绪发生可见变化时，portrait_change 才能为 true；否则 portrait_id 填 KEEP。可以比背景更频繁，但不要为了变化而变化。\n背景规则非常严格：情绪变化绝不等于场景变化。只有物理地点、明确时间段、天气或明确场景事件确实改变时，scene_changed 和 background_change 才能为 true。普通聊天、语气变化、害羞、难过、开心都必须保持当前背景。背景不得连续切换；不确定时一律 KEEP。\n可用人物半身图：\n${ps}\n可用背景图：\n${bs}\n当前人物半身图：${state.visuals.currentPortrait}\n当前背景图：${state.visuals.currentBackground}\n当前右上角状态：${state.status.display||state.status.mood+' · '+state.status.activity}\n视觉判断轮次：${meta.turn}；上次背景切换轮次：${meta.lastBackgroundTurn}`}
async function onlineReplyBundle(text){const a=state.settings.api,key=apiKey();if(!a.baseUrl||!a.model)throw new Error('请填写 Base URL 和模型');runtime.apiController=new AbortController();const headers={'Content-Type':'application/json'};if(key)headers.Authorization=`Bearer ${key}`;const useVisual=a.autoVisualSwitch!==false;const res=await fetch(chatEndpoint(a.baseUrl),{method:'POST',headers,body:JSON.stringify({model:a.model,messages:[{role:'system',content:useVisual?visualSystemPrompt():systemPrompt()},{role:'user',content:text}],temperature:Number(a.temperature),max_tokens:Number(a.maxTokens)}),signal:runtime.apiController.signal});const raw=await res.text();let data;try{data=JSON.parse(raw)}catch{data={raw}}if(!res.ok)throw new Error(data?.error?.message||data?.message||raw.slice(0,260)||`HTTP ${res.status}`);const content=data?.choices?.[0]?.message?.content||data?.choices?.[0]?.text||data?.output_text||'';if(!useVisual)return{reply:String(content).trim(),status_text:'',mood:'',activity:'',portrait_id:'KEEP',portrait_change:false,background_id:'KEEP',background_change:false,scene_changed:false};const parsed=parseStrictJSON(content);if(!parsed||typeof parsed.reply!=='string')return{reply:String(content).trim(),status_text:'',mood:'',activity:'',portrait_id:'KEEP',portrait_change:false,background_id:'KEEP',background_change:false,scene_changed:false};return{reply:parsed.reply.trim(),status_text:String(parsed.status_text||'').trim(),mood:String(parsed.mood||'').trim(),activity:String(parsed.activity||'').trim(),portrait_id:String(parsed.portrait_id||'KEEP'),portrait_change:parsed.portrait_change===true||String(parsed.portrait_change).toLowerCase()==='true',background_id:String(parsed.background_id||'KEEP'),background_change:parsed.background_change===true||String(parsed.background_change).toLowerCase()==='true',scene_changed:parsed.scene_changed===true||String(parsed.scene_changed).toLowerCase()==='true'}}
async function onlineReply(text){return (await onlineReplyBundle(text)).reply}
function applyVisualBundle(bundle,source='chat'){ensureVisualState();const meta=state.visuals.switchMeta;meta.turn=(meta.turn||0)+1;const p=String(bundle?.portrait_id||'KEEP').trim(),b=String(bundle?.background_id||'KEEP').trim();const validP=state.visuals.portraits.find(x=>x.id===p&&x.hasImage),validB=state.visuals.backgrounds.find(x=>x.id===b&&x.hasImage);if(bundle?.portrait_change===true&&p!=='KEEP'&&validP&&p!==state.visuals.currentPortrait){state.visuals.currentPortrait=p;meta.lastPortraitTurn=meta.turn}const currentBg=visualSlot('background',state.visuals.currentBackground);const minBgGap=source==='interaction'?2:4;const gap=meta.turn-(meta.lastBackgroundTurn??-99);if(bundle?.background_change===true&&bundle?.scene_changed===true&&b!=='KEEP'&&validB&&b!==state.visuals.currentBackground&&(gap>=minBgGap||!currentBg?.hasImage)){state.visuals.currentBackground=b;meta.lastBackgroundTurn=meta.turn;meta.lastBackgroundId=b}if(bundle?.mood)state.status.mood=String(bundle.mood).slice(0,20);if(bundle?.activity)state.status.activity=String(bundle.activity).slice(0,28);if(bundle?.status_text){state.status.display=String(bundle.status_text).replace(/[\r\n]/g,' ').trim().slice(0,28)}else state.status.display=`${state.status.mood} · ${state.status.activity||''}`;updateScene()}

function saveGeneral(){state.settings.sound=$('#setSound').checked;state.settings.showScanlines=$('#setScan').checked;state.settings.autoSave=$('#setAutoSave').checked;state.settings.typeSpeed=Number($('#setTypeSpeed').value);if($('#setWeather'))state.room.weather=$('#setWeather').value;save(true);applyTheme();updateScene();renderSettings()}
function saveApiSettings(){const a=state.settings.api;a.enabled=$('#apiEnabled').checked;a.autoVisualSwitch=$('#apiAutoVisual')?.checked!==false;a.baseUrl=$('#apiBase').value.trim();a.model=$('#apiModel').value.trim();a.temperature=clamp(Number($('#apiTemp').value)||.85,0,2);a.maxTokens=clamp(Number($('#apiMax').value)||420,60,2000);a.rememberKey=$('#apiRemember').checked;a.fallback=$('#apiFallback').checked;a.customPrompt=$('#apiPrompt').value.trim();const key=$('#apiKey').value.trim();if(a.rememberKey){localStorage.setItem('dual_soul_saved_api_key',key);sessionStorage.removeItem(SESSION_KEY)}else{sessionStorage.setItem(SESSION_KEY,key);localStorage.removeItem('dual_soul_saved_api_key')}save(true);renderSettings()}
async function testApi(){saveApiSettings();const out=$('#apiResult');if(out)out.textContent='正在连接……';try{const reply=await onlineReply('只回复“连接成功”，不要添加其他内容。');const box=$('#apiResult');if(box)box.textContent=`连接成功\n模型回复：${reply}`;notify('连接成功')}catch(e){const box=$('#apiResult');if(box)box.textContent=`连接失败：${friendlyError(e)}`;notify('连接失败')}}
async function fetchModels(){saveApiSettings();const out=$('#apiResult');if(out)out.textContent='正在读取模型……';try{const headers={};const key=apiKey();if(key)headers.Authorization=`Bearer ${key}`;const r=await fetch(modelEndpoint(state.settings.api.baseUrl),{headers});const raw=await r.text();let d;try{d=JSON.parse(raw)}catch{d={raw}}if(!r.ok)throw new Error(d?.error?.message||raw.slice(0,200));const models=(d.data||d.models||[]).map(x=>typeof x==='string'?x:x.id||x.name).filter(Boolean).slice(0,40);const box=$('#apiResult');if(box)box.textContent=models.length?`可用模型：\n${models.join('\n')}`:'接口没有返回模型列表'}catch(e){const box=$('#apiResult');if(box)box.textContent=`读取失败：${friendlyError(e)}`}}
function exportSave(){if(!state){notify('没有可导出的存档');return}const copy=JSON.parse(JSON.stringify(state));copy.settings.api.rememberKey=false;copy.settings.textApi.rememberKey=false;copy.settings.imageApi.rememberKey=false;const blob=new Blob([JSON.stringify(copy,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`dual-soul-${state.character.name}-${fmtDate(Date.now())}.json`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);notify('已导出存档')}
async function importSave(file){try{const obj=JSON.parse(await file.text());if(!obj||typeof obj!=='object'||!obj.character||!obj.settings)throw new Error('不是有效的 DUAL//SOUL 存档');state=sanitizeChatOnlyState(merge(defaultState(),obj));state.version=VERSION;ensureVisualState();localStorage.setItem(STORAGE_KEY,JSON.stringify(state));runtime.stack=[];runtime.page='home';runtime.selected=0;applyTheme();updateScene();render();say('存档已经回到机器里。');notify('导入成功')}catch(e){console.error(e);notify('导入失败：'+friendlyError(e))}finally{els.importFile.value=''}}
async function importAvatar(file){try{let data=await imageFileToDataURL(file,1000,1200,'image/png',1);data=await processPortraitDataURL(data,'whiteOnly');state.character.avatarImage=data;save(false);applyTheme();renderSettings();notify('立绘已保存')}catch(e){console.error(e);notify('图片读取失败')}finally{els.avatarFile.value=''}}
function resetSave(){if(!confirm('确定删除整个角色存档吗？此操作无法撤销。'))return;if(!confirm('最后确认：建议先导出备份。仍然删除吗？'))return;localStorage.removeItem(STORAGE_KEY);localStorage.removeItem('dual_soul_saved_api_key');localStorage.removeItem('dual_soul_text_api_key');localStorage.removeItem('dual_soul_image_api_key');sessionStorage.removeItem(SESSION_KEY);sessionStorage.removeItem(TEXT_SESSION_KEY);sessionStorage.removeItem(IMAGE_SESSION_KEY);state=null;runtime.stack=[];runtime.page='title';runtime.selected=0;applyTheme();renderTitle();notify('存档已删除')}
function setupNext(){if(!state)return;if(runtime.setupStep===1){state.player.name=($('#setupPlayer')?.value.trim()||'你').slice(0,18);state.character.name=($('#setupChar')?.value.trim()||'秋').slice(0,18);state.character.pronoun=$('#setupPronoun')?.value||'TA'}else if(runtime.setupStep===2){state.character.personality=$('#setupPersonality')?.value.trim()||defaultState().character.personality;state.character.speech=$('#setupSpeech')?.value.trim()||defaultState().character.speech;state.character.background=$('#setupBackground')?.value.trim()||defaultState().character.background;state.character.profileUpdatedAt=Date.now();state.character.personaVersion=Number(state.character.personaVersion||1)+1}runtime.setupStep=Math.min(3,runtime.setupStep+1);renderSetup()}

function friendlyError(e){if(e?.name==='AbortError')return'请求超时或已取消';const msg=String(e?.message||'未知错误');if(/Failed to fetch/i.test(msg))return'网络请求失败或接口禁止浏览器跨域访问（CORS）。请确认 Base URL 是 API 地址而不是网页地址，并检查服务商是否允许浏览器直连。原始错误：'+msg;return msg.slice(0,900)}
function cancelApi(){if(runtime.apiController)runtime.apiController.abort();runtime.typing=false;render();notify('已取消')}

function newGame(){if(hasSave()&&!confirm('建立新角色会覆盖本机现有存档。建议先导出。继续吗？'))return;state=defaultState();ensureVisualState();runtime.setupStep=1;runtime.page='setup';applyTheme();renderSetup();say('请先为这张卡带写入名字。','SYSTEM')}

function startBoot(){updateClock();setTimeout(()=>{els.boot.classList.add('off');setTimeout(()=>els.boot.classList.add('hidden'),320);renderTitle()},1250)}
function onClick(e){const t=e.target.closest('button,[data-go],[data-act],[data-memory-tab],[data-settings-tab],[data-studio-tab],[data-visual-generate],[data-visual-upload],[data-visual-select],[data-visual-clear],[data-remove-visual-reference],[data-shell],[data-avatar-palette],[data-delete-memory],[data-quick]');if(!t)return;if(t.dataset.go){setPage(t.dataset.go);return}if(t.dataset.quick){sendTalk(t.dataset.quick);return}if(t.dataset.memoryTab){runtime.memoryTab=t.dataset.memoryTab;renderMemories();return}if(t.dataset.settingsTab){runtime.settingsTab=t.dataset.settingsTab;renderSettings();return}if(t.dataset.studioTab){saveVisualMeta();runtime.studioTab=t.dataset.studioTab;renderStudio();return}if(t.dataset.visualGenerate){const [kind,id]=t.dataset.visualGenerate.split(':');generateVisual(kind,id);return}if(t.dataset.visualUpload){const [kind,id]=t.dataset.visualUpload.split(':');runtime.assetTarget={kind,id};els.visualAssetFile.click();return}if(t.dataset.visualSelect){const [kind,id]=t.dataset.visualSelect.split(':');if(kind==='portrait')state.visuals.currentPortrait=id;else state.visuals.currentBackground=id;save(false);renderVisualLayers();renderStudio();return}if(t.dataset.visualClear){const [kind,id]=t.dataset.visualClear.split(':');clearVisual(kind,id);return}if(t.dataset.removeVisualReference){const idx=Number(t.dataset.removeVisualReference),key=state.visuals.referenceKeys[idx];assetDelete(key).catch(()=>{});state.visuals.referenceKeys.splice(idx,1);save(false);renderStudio();return}if(t.dataset.shell){state.settings.shell=t.dataset.shell;applyTheme();save(false);renderSettings();return}if(t.dataset.avatarPalette){state.character.avatarPalette=t.dataset.avatarPalette;applyTheme();save(false);runtime.page==='setup'?renderSetup():renderSettings();return}if(t.dataset.deleteMemory){state.memories=state.memories.filter(m=>m.id!==t.dataset.deleteMemory);save(false);renderMemories();return}const a=t.dataset.act;if(!a)return;({continue:continueGame,'new-game':newGame,import:()=>els.importFile.click(),'setup-next':setupNext,'setup-prev':()=>{runtime.setupStep=Math.max(1,runtime.setupStep-1);renderSetup()},'finish-setup':finishSetup,'edit-profile':openProfileEditor,'close-modal':()=>t.closest('.modal')?.remove(),'save-profile':()=>saveProfileEditor(t),'save-general':saveGeneral,'save-api':saveApiSettings,'test-api':testApi,'fetch-models':fetchModels,'save-visual-meta':saveVisualMeta,'save-visual-profile':saveVisualProfile,'save-visual-api':saveVisualApiSettings,'test-text-visual-api':testVisualTextApi,'test-image-visual-api':testVisualImageApi,'upload-visual-reference':()=>els.visualReferenceFile.click(),'clear-visual-references':async()=>{for(const k of state.visuals.referenceKeys)await assetDelete(k).catch(()=>{});state.visuals.referenceKeys=[];save(false);renderStudio();notify('已清空参考图')},'manual-save':()=>save(true),'export-save':exportSave,'reset-save':resetSave,'upload-avatar':()=>els.avatarFile.click(),'remove-avatar':()=>{state.character.avatarImage='';save(false);applyTheme();renderSettings()},'status':openStatusModal}[a]?.())}
const UI_SELECTOR='button,[data-go],[data-act],[data-memory-tab],[data-settings-tab],[data-studio-tab],[data-visual-generate],[data-visual-upload],[data-visual-select],[data-visual-clear],[data-remove-visual-reference],[data-shell],[data-avatar-palette],[data-delete-memory],[data-quick]';
function activateScreenControl(e){const target=e.target?.closest?.(UI_SELECTOR);if(!target||!els.content.contains(target))return;const now=Date.now();if(e.type==='click'&&runtime.lastUiTouchTarget===target&&now-runtime.lastUiTouchAt<700)return;if((e.type==='pointerup'&&e.pointerType!=='mouse')||e.type==='touchend'){runtime.lastUiTouchTarget=target;runtime.lastUiTouchAt=now;e.preventDefault?.();e.stopPropagation?.();onClick({target});if(target.id==='chatSend')sendTalk();return}onClick(e);if(target.id==='chatSend')sendTalk()}
els.content.addEventListener('click',activateScreenControl);
if(window.PointerEvent)els.content.addEventListener('pointerup',activateScreenControl,{passive:false});else els.content.addEventListener('touchend',activateScreenControl,{passive:false});
els.importFile.addEventListener('click',()=>{els.importFile.value=''});els.importFile.addEventListener('change',e=>e.target.files[0]&&importSave(e.target.files[0]));els.avatarFile.addEventListener('change',e=>e.target.files[0]&&importAvatar(e.target.files[0]));els.visualAssetFile.addEventListener('change',e=>e.target.files[0]&&importVisualAsset(e.target.files[0]));els.visualReferenceFile.addEventListener('change',e=>e.target.files.length&&importVisualReferences(e.target.files));

function bindPress(el,fn){if(!el)return;let touchedAt=0;const run=()=>{try{fn()}catch(err){console.error(err);notify('按钮执行失败')}};if(window.PointerEvent){el.addEventListener('pointerup',e=>{if(e.pointerType==='mouse')return;touchedAt=Date.now();e.preventDefault();e.stopPropagation();run()},{passive:false})}else{el.addEventListener('touchend',e=>{touchedAt=Date.now();e.preventDefault();e.stopPropagation();run()},{passive:false})}el.addEventListener('click',e=>{if(Date.now()-touchedAt<700)return;e.preventDefault();run()})}

})();
