.scene-light{position:absolute;z-index:6;left:3%;bottom:8%;width:48%;height:65%;pointer-events:none;background:radial-gradient(ellipse at 29% 67%,color-mix(in srgb,var(--light) 30%,transparent),transparent 66%);animation:lampBreath 4.8s ease-in-out infinite}
@keyframes lampBreath{50%{opacity:.72;transform:scale(1.035)}}
.scene-particles{position:absolute;inset:0;z-index:8;pointer-events:none;opacity:.32;background-image:radial-gradient(rgba(255,255,255,.75) .7px,transparent .9px),radial-gradient(rgba(255,236,190,.55) .8px,transparent 1px);background-size:37px 41px,53px 47px;background-position:5px 9px,21px 13px;animation:floatDust 12s linear infinite}
@keyframes floatDust{to{background-position:42px -32px,-32px -47px}}
.char-shadow{position:absolute;z-index:8;left:53%;bottom:13.5%;width:74px;height:16px;border-radius:50%;background:rgba(26,30,27,.26);filter:blur(1px);transform:translateX(-50%);transition:left .25s cubic-bezier(.2,.8,.2,1),width .25s,opacity .25s}
.sprite-character{--sprite-x:53%;position:absolute;z-index:11;left:var(--sprite-x);bottom:14.5%;width:96px;height:144px;transform:translateX(-50%);transform-origin:50% 100%;background-repeat:no-repeat;background-size:400% 300%;image-rendering:pixelated;filter:drop-shadow(0 5px 0 rgba(26,30,27,.24));transition:left .25s cubic-bezier(.2,.8,.2,1),bottom .2s,filter .2s;will-change:background-position,transform,left}
.sprite-character.pose-idle{animation:spriteIdle 2.1s ease-in-out infinite}.sprite-character.pose-walk{animation:spriteWalk .32s steps(2) infinite}.sprite-character.pose-happy{animation:spriteHappy .7s ease-in-out infinite}.sprite-character.pose-talk{animation:spriteTalk .42s ease-in-out infinite}.sprite-character.pose-angry{animation:spriteAngry .18s linear 3}.sprite-character.pose-sleep{bottom:15%;filter:drop-shadow(0 3px 0 rgba(26,30,27,.18)) brightness(.93)}
@keyframes spriteIdle{50%{transform:translateX(-50%) translateY(-2px)}}@keyframes spriteWalk{50%{transform:translateX(-50%) translateY(-3px)}}@keyframes spriteHappy{50%{transform:translateX(-50%) translateY(-5px)}}@keyframes spriteTalk{50%{transform:translateX(-50%) rotate(-1deg)}}@keyframes spriteAngry{50%{transform:translateX(calc(-50% - 2px))}}
.sprite-character:after{content:"";position:absolute;inset:8% 13% 5%;pointer-events:none;opacity:0;border:2px solid rgba(246,238,177,.7)}.sprite-character.pose-happy:after{opacity:.75;animation:sparkFrame .7s steps(2) infinite}@keyframes sparkFrame{50%{transform:scale(1.08);opacity:.2}}
.mini-sprite{width:47px;height:47px;background-repeat:no-repeat;background-size:400% 300%;image-rendering:pixelated;background-position:0 0;transform:scale(1.18);transform-origin:center 25%}
.sprite-studio-hero{display:grid;grid-template-columns:82px 1fr;gap:9px;align-items:center}.studio-stage{width:82px;height:110px;position:relative;overflow:hidden;border:2px solid #59655c;background:linear-gradient(#9fb3ac 0 58%,#777361 58%);box-shadow:inset 2px 2px #dfe7de}.studio-stage .studio-sprite{position:absolute;left:50%;bottom:-5px;width:72px;height:108px;transform:translateX(-50%);background-repeat:no-repeat;background-size:400% 300%;image-rendering:pixelated;filter:drop-shadow(0 3px rgba(0,0,0,.2))}.source-thumb{width:44px;height:44px;border:2px solid #667168;object-fit:cover;image-rendering:pixelated;background:#d4ddd2}.studio-summary{font-size:8px;line-height:1.5;color:#667168}.range-line{display:grid;grid-template-columns:62px 1fr 30px;gap:5px;align-items:center}.range-line input{padding:0!important}.range-value{text-align:right;font-size:8px}.color-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.color-row label{display:grid;grid-template-columns:1fr 34px;align-items:center}.color-row input[type=color]{height:28px;padding:2px}.pose-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px}.pose-card{min-width:0;padding:3px 2px;background:#e9eee5;border:2px solid #647065;cursor:pointer;font-size:7px;color:#2b342d}.pose-card .pose-sprite{width:42px;height:63px;margin:auto;background-repeat:no-repeat;background-size:400% 300%;image-rendering:pixelated}.pose-card b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.studio-note{padding:6px;background:#e5ebe1;border-left:4px solid #708174;font-size:8px;line-height:1.5;color:#606b62}.progress-pixels{height:10px;border:2px solid #59655c;padding:1px;background:#d4ddd1}.progress-pixels i{display:block;height:100%;width:0;background:#697d6e;transition:width .2s}.progress-pixels.working i{animation:pixelProgress 1.1s steps(8) infinite}@keyframes pixelProgress{to{width:100%}}
.scene .bed,.scene .plant,.scene .lamp,.scene .book{will-change:transform}.scene .plant{animation:plantSway 5s ease-in-out infinite;transform-origin:50% 100%}.scene .lamp{animation:lampTiny 4.8s ease-in-out infinite}@keyframes plantSway{50%{transform:rotate(1.5deg)}}@keyframes lampTiny{50%{filter:brightness(1.08)}}

        </div>
        <div class="hud"><span id="timeChip" class="chip">FRI 13:00</span><span id="moodChip" class="chip">尚未载入</span></div>
        <div id="thought" class="thought"></div>
        <div id="dialogue" class="dialogue" role="status"><div id="dialogueName" class="name">角色</div><span id="dialogueText"></span><span class="cursor">▼</span></div>
        <div id="flash" class="flash"></div>
        <div id="bootLayer" class="boot-layer">

        </div>
      </div>
    </div>
  </section>
  <div class="hinge" aria-hidden="true"></div>
  <section class="base">
    <div class="bottom-grid">
      <div class="dpad" aria-label="方向键">
        <button class="up" data-dir="up" aria-label="上">▲</button><button class="down" data-dir="down" aria-label="下">▼</button>
        <button class="left" data-dir="left" aria-label="左">◀</button><button class="right" data-dir="right" aria-label="右">▶</button><button class="center" aria-hidden="true"></button>
      </div>
      <div class="screen-frame">
        <div id="touchScreen" class="screen touch-screen scanlines">

            <div id="touchContent" class="touch-content"></div>
          </div>
        </div>
      </div>
      <div class="action-pad" aria-label="动作键">
        <button class="action y" data-key="Y">Y</button><button class="action x" data-key="X">X</button>
        <button class="action b" data-key="B">B</button><button class="action a" data-key="A">A</button>
      </div>
    </div>
    <div class="base-bottom"><div class="mic">MIC</div><div class="system-buttons"><button id="selectBtn" class="pill">SELECT</button><button id="startBtn" class="pill">START</button></div><div class="power" title="电源开启"></div></div>
  </section>
</main>

function scenePeriod(){const h=new Date().getHours();return h<6?'night':h<11?'morning':h<18?'day':h<21?'evening':'night'}
function autoWeather(){const n=Number(dateKey().replaceAll('-',''))%10;return n<2?'rain':n===8?'snow':'clear'}
function updateScene(){if(!state)return;const p=scenePeriod();els.scene.classList.remove('morning','day','evening','night');els.scene.classList.add(p);const w=state.room.weather==='auto'?autoWeather():state.room.weather;els.weather.className='weather '+(w==='clear'?'':w);const atlas=state.character.pixel?.atlas||'',hasLegacy=!!state.character.avatarImage;els.char.className='character'+(atlas||hasLegacy?' hidden-sprite':'');els.avatar.className='custom-avatar'+(hasLegacy&&!atlas?'':' hidden');els.sprite.classList.toggle('hidden',!atlas);if(hasLegacy&&!atlas)els.avatar.src=state.character.avatarImage;if(atlas)els.sprite.style.backgroundImage=`url("${atlas}")`;updateCharacterPosition();const pose=resolveSpritePose();if(atlas)setSpritePose(pose);else{let activity=state.status.activity||'';if(activity.includes('睡')){els.char.classList.add('sleeping');els.avatar.classList.add('sleeping')}else if(activity.includes('读'))els.char.classList.add('reading');else if(activity.includes('音乐'))els.char.classList.add('music');else if(activity.includes('散步'))els.char.classList.add('walk')}els.shadow.style.opacity=pose==='sleep'?'0.12':'0.26';els.shadow.style.width=pose==='sleep'?'104px':'74px';els.mood.textContent=`${state.status.mood} · ${state.status.activity||''}`}

const SPRITE_FRAMES={idle1:0,idle2:1,walk1:2,walk2:3,sit:4,read:5,sleep:6,happy:7,sad:8,angry:9,surprised:10,talk:11};
const POSE_LABELS={idle:'待机',walk:'走路',sit:'坐下',read:'阅读',sleep:'睡觉',happy:'开心',sad:'难过',angry:'生气',surprised:'惊讶',talk:'说话'};
function getPixel(){if(!state.character.pixel)state.character.pixel=defaultState().character.pixel;return state.character.pixel}
function updateCharacterPosition(){if(!state)return;const x=clamp(Number(state.character.positionX)||53,39,75);state.character.positionX=x;els.char.style.left=x+'%';els.avatar.style.left=x+'%';els.sprite.style.left=x+'%';els.shadow.style.left=x+'%'}
function poseSequence(pose){return({idle:[0,1],walk:[2,3],sit:[4],read:[5],sleep:[6],happy:[7,1],sad:[8],angry:[9],surprised:[10],talk:[11,0]})[pose]||[0,1]}
function setSpriteFrame(index,target=els.sprite){const col=index%4,row=Math.floor(index/4);target.style.backgroundPosition=`${col*33.333333}% ${row*50}%`}
function setSpritePose(pose='idle'){if(!state?.character?.pixel?.atlas)return;pose=POSE_LABELS[pose]?pose:'idle';runtime.spritePose=pose;clearInterval(runtime.spriteTimer);els.sprite.className=`sprite-character pose-${pose}`;els.sprite.style.backgroundImage=`url("${state.character.pixel.atlas}")`;const seq=poseSequence(pose);let i=0;setSpriteFrame(seq[0]);if(seq.length>1)runtime.spriteTimer=setInterval(()=>{i=(i+1)%seq.length;setSpriteFrame(seq[i])},pose==='walk'?210:pose==='talk'?360:pose==='happy'?430:880)}
function resolveSpritePose(){if(runtime.poseOverride)return runtime.poseOverride;if(runtime.talkingUntil>Date.now())return'talk';const a=String(state.status.activity||''),m=String(state.status.mood||'');if(a.includes('睡')||a.includes('休息'))return'sleep';if(a.includes('散步')||a.includes('整理'))return'walk';if(a.includes('读'))return'read';if(a.includes('坐')||a.includes('茶'))return'sit';if(a.includes('说话'))return'talk';if(/生气|恼火/.test(m))return'angry';if(/难过|低落|认真听/.test(m))return'sad';if(/惊讶|意外/.test(m))return'surprised';if(/高兴|开心|放松/.test(m)||a.includes('音乐'))return'happy';return'idle'}
function previewPose(pose){runtime.poseOverride=pose;clearTimeout(runtime.poseTimer);updateScene();thought(`动作预览：${POSE_LABELS[pose]||pose}`,1600);runtime.poseTimer=setTimeout(()=>{runtime.poseOverride='';updateScene()},3200)}
function frameStyle(index,atlas=state?.character?.pixel?.atlas||''){const col=index%4,row=Math.floor(index/4);return `background-image:url('${atlas}');background-position:${col*33.333333}% ${row*50}%`}
function tinySpriteHtml(index=0,cls='mini-sprite'){const atlas=state?.character?.pixel?.atlas||'';return atlas?`<div class="${cls}" style="${frameStyle(index,atlas)}"></div>`:''}
function loadImage(src){return new Promise((resolve,reject)=>{const im=new Image();im.onload=()=>resolve(im);im.onerror=reject;im.src=src})}
function hexToRgb(hex,fallback=[100,120,110]){const m=String(hex||'').match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:fallback}
function rgbCss(rgb){return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`}
function shade(hex,amount){const c=hexToRgb(hex),v=c.map(x=>clamp(Math.round(x+amount),0,255));return rgbCss(v)}
function fileToDataURL(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file)})}
function prepareSourcePhoto(file){return new Promise((resolve,reject)=>{const u=URL.createObjectURL(file),im=new Image();im.onload=()=>{const max=320,sc=Math.min(1,max/im.width,max/im.height),c=document.createElement('canvas');c.width=Math.max(1,Math.round(im.width*sc));c.height=Math.max(1,Math.round(im.height*sc));const x=c.getContext('2d');x.drawImage(im,0,0,c.width,c.height);URL.revokeObjectURL(u);resolve(c.toDataURL('image/jpeg',.82))};im.onerror=()=>{URL.revokeObjectURL(u);reject(new Error('无法读取照片'))};im.src=u})}
function makePixelHead(source,cfg){const out=document.createElement('canvas');out.width=32;out.height=36;const ox=out.getContext('2d');ox.imageSmoothingEnabled=false;if(source){const gw=clamp(Number(cfg.pixelGrid)||28,16,32),gh=Math.max(20,Math.round(gw*1.125)),low=document.createElement('canvas');low.width=gw;low.height=gh;const x=low.getContext('2d',{willReadFrequently:true});x.imageSmoothingEnabled=true;const zoom=clamp(Number(cfg.zoom)||1.05,.7,2.2),focus=clamp(Number(cfg.focusY)||45,5,95)/100;let crop=Math.min(source.width,source.height)/zoom;crop=Math.max(30,crop);const sx=clamp((source.width-crop)/2,0,Math.max(0,source.width-crop));const cy=source.height*focus,sy=clamp(cy-crop*.43,0,Math.max(0,source.height-crop));x.drawImage(source,sx,sy,crop,crop,0,0,gw,gh);const data=x.getImageData(0,0,gw,gh),d=data.data;const levels=cfg.palette<=8?3:cfg.palette<=12?4:cfg.palette<=18?5:6,step=255/(levels-1);for(let yy=0;yy<gh;yy++)for(let xx=0;xx<gw;xx++){const i=(yy*gw+xx)*4,nx=(xx-(gw-1)/2)/(gw*.49),ny=(yy-(gh*.47))/(gh*.51);if(nx*nx+ny*ny>1){d[i+3]=0;continue}d[i]=Math.round(d[i]/step)*step;d[i+1]=Math.round(d[i+1]/step)*step;d[i+2]=Math.round(d[i+2]/step)*step;d[i+3]=255}x.putImageData(data,0,0);ox.drawImage(low,0,0,32,36)}else{const ap=avatarPalettes[state.character.avatarPalette]||avatarPalettes.forest;ox.fillStyle=ap.hair;ox.fillRect(5,1,22,12);ox.fillRect(3,7,26,10);ox.fillStyle=ap.skin;ox.fillRect(5,10,22,22);ox.fillRect(8,32,16,3)}return out}
function pxRect(ctx,x,y,w,h,fill,outline){if(outline){ctx.fillStyle=outline;ctx.fillRect(x-2,y-2,w+4,h+4)}ctx.fillStyle=fill;ctx.fillRect(x,y,w,h)}
function drawHead(ctx,head,x,y,expr,cfg){ctx.imageSmoothingEnabled=false;const out=cfg.outlineColor||'#202722';ctx.fillStyle=out;ctx.fillRect(x-2,y+5,34,25);ctx.fillRect(x,y,30,34);ctx.drawImage(head,x,y,30,34);const eye=out,mouth=out;ctx.fillStyle=eye;const ex=x+8,ex2=x+21,ey=y+19;if(expr==='happy'){ctx.fillRect(ex,ey,5,2);ctx.fillRect(ex2-2,ey,5,2);ctx.fillRect(x+12,y+27,7,2);ctx.fillRect(x+14,y+29,3,1)}else if(expr==='sad'){ctx.fillRect(ex,ey+1,4,2);ctx.fillRect(ex2-1,ey+1,4,2);ctx.fillRect(x+13,y+29,6,2);ctx.fillRect(x+12,y+30,2,1)}else if(expr==='angry'){ctx.fillRect(ex-1,ey-2,5,2);ctx.fillRect(ex2-2,ey-2,5,2);ctx.fillRect(ex,ey+1,3,3);ctx.fillRect(ex2,ey+1,3,3);ctx.fillRect(x+12,y+28,8,2)}else if(expr==='surprised'){ctx.fillRect(ex,ey,3,4);ctx.fillRect(ex2,ey,3,4);ctx.fillRect(x+14,y+27,4,5)}else if(expr==='sleep'){ctx.fillRect(ex-1,ey+1,6,2);ctx.fillRect(ex2-2,ey+1,6,2)}else if(expr==='talk'){ctx.fillRect(ex,ey,3,3);ctx.fillRect(ex2,ey,3,3);ctx.fillRect(x+13,y+27,6,4)}else{ctx.fillRect(ex,ey,3,3);ctx.fillRect(ex2,ey,3,3);ctx.fillRect(x+14,y+28,5,2)}}
function drawSpriteFrame(ctx,frame,head,cfg){const out=cfg.outlineColor||'#202722',shirt=cfg.outfitColor||'#667b73',pants=cfg.pantsColor||'#3f4944',shoe=cfg.shoeColor||'#252b28';ctx.clearRect(0,0,64,96);let pose=['idle','idle','walk1','walk2','sit','read','sleep','happy','sad','angry','surprised','talk'][frame],expr=['idle','idle','idle','idle','idle','idle','sleep','happy','sad','angry','surprised','talk'][frame];ctx.fillStyle='rgba(25,30,27,.18)';if(pose==='sleep')ctx.fillRect(9,83,47,4);else ctx.fillRect(19,89,28,4);if(pose==='sleep'){pxRect(ctx,24,58,28,17,shirt,out);pxRect(ctx,42,72,15,7,pants,out);pxRect(ctx,13,74,33,9,shade(shirt,22),out);drawHead(ctx,head,5,47,expr,cfg);ctx.fillStyle='#d8cdb6';ctx.fillRect(27,55,22,4);return}let headX=17,headY=8,bodyX=22,bodyY=43;if(pose==='happy')headY=3;if(pose==='sad')headY=11;if(pose==='sit'||pose==='read'){headY=17;bodyY=50}if(pose==='walk1'||pose==='walk2')bodyY=42;if(pose==='surprised')headY=6;const bodyW=21,bodyH=27;pxRect(ctx,bodyX,bodyY,bodyW,bodyH,shirt,out);if(cfg.outfit==='jacket'){ctx.fillStyle=shade(shirt,28);ctx.fillRect(bodyX+9,bodyY+2,3,bodyH-4);ctx.fillStyle=out;ctx.fillRect(bodyX+10,bodyY+5,1,bodyH-8)}else if(cfg.outfit==='sweater'){ctx.fillStyle=shade(shirt,20);ctx.fillRect(bodyX+2,bodyY+7,bodyW-4,3)}else if(cfg.outfit==='dress'){pxRect(ctx,bodyX-3,bodyY+19,bodyW+6,18,shirt,out)}if(pose==='sit'||pose==='read'){pxRect(ctx,18,73,14,7,pants,out);pxRect(ctx,34,73,17,7,pants,out);pxRect(ctx,15,80,12,5,shoe,out);pxRect(ctx,47,80,10,5,shoe,out)}else if(pose==='walk1'){pxRect(ctx,22,69,7,18,pants,out);pxRect(ctx,37,67,7,20,pants,out);pxRect(ctx,17,86,13,5,shoe,out);pxRect(ctx,38,86,12,5,shoe,out)}else if(pose==='walk2'){pxRect(ctx,23,67,7,20,pants,out);pxRect(ctx,36,69,7,18,pants,out);pxRect(ctx,21,86,12,5,shoe,out);pxRect(ctx,34,86,13,5,shoe,out)}else if(pose==='happy'){pxRect(ctx,23,68,7,18,pants,out);pxRect(ctx,36,68,7,18,pants,out);pxRect(ctx,20,85,12,5,shoe,out);pxRect(ctx,35,85,12,5,shoe,out)}else{pxRect(ctx,23,69,7,18,pants,out);pxRect(ctx,36,69,7,18,pants,out);pxRect(ctx,20,86,12,5,shoe,out);pxRect(ctx,35,86,12,5,shoe,out)}if(pose==='happy'){pxRect(ctx,9,34,7,24,shirt,out);pxRect(ctx,49,34,7,24,shirt,out);ctx.fillStyle='#f1d47c';ctx.fillRect(5,21,3,3);ctx.fillRect(55,18,3,3);ctx.fillRect(7,26,2,2);ctx.fillRect(52,25,2,2)}else if(pose==='angry'){pxRect(ctx,12,51,10,7,shirt,out);pxRect(ctx,43,51,10,7,shirt,out);ctx.fillStyle=out;ctx.fillRect(8,55,6,6);ctx.fillRect(51,55,6,6)}else if(pose==='surprised'){pxRect(ctx,11,45,8,25,shirt,out);pxRect(ctx,46,45,8,25,shirt,out);ctx.fillStyle='#f1d47c';ctx.fillRect(7,17,2,8);ctx.fillRect(54,17,2,8)}else if(pose==='read'){pxRect(ctx,12,56,13,7,shirt,out);pxRect(ctx,40,56,13,7,shirt,out);ctx.fillStyle=out;ctx.fillRect(21,58,24,16);ctx.fillStyle='#d7c9a4';ctx.fillRect(23,60,9,12);ctx.fillRect(34,60,9,12);ctx.fillStyle='#6f6655';ctx.fillRect(33,60,1,12)}else if(pose==='talk'){pxRect(ctx,13,50,9,7,shirt,out);pxRect(ctx,43,43,8,22,shirt,out);ctx.fillStyle='#f1d47c';ctx.fillRect(53,38,3,3);ctx.fillRect(56,33,2,2)}else if(pose==='sad'){pxRect(ctx,14,52,8,22,shirt,out);pxRect(ctx,43,52,8,22,shirt,out)}else if(pose==='walk1'){pxRect(ctx,13,49,8,22,shirt,out);pxRect(ctx,43,43,8,22,shirt,out)}else if(pose==='walk2'){pxRect(ctx,14,43,8,22,shirt,out);pxRect(ctx,43,49,8,22,shirt,out)}else{pxRect(ctx,14,48,8,23,shirt,out);pxRect(ctx,43,48,8,23,shirt,out)}drawHead(ctx,head,headX,headY,expr,cfg)}
async function generateSpriteAtlas(showToast=true){const cfg=getPixel();let source=null;if(cfg.sourceThumb)source=await loadImage(cfg.sourceThumb);const head=makePixelHead(source,cfg),canvas=document.createElement('canvas');canvas.width=256;canvas.height=288;const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;for(let i=0;i<12;i++){ctx.save();ctx.translate((i%4)*64,Math.floor(i/4)*96);drawSpriteFrame(ctx,i,head,cfg);ctx.restore()}cfg.atlas=canvas.toDataURL('image/png');cfg.customSheet=false;state.character.avatarImage='';save(false);applyTheme();updateScene();if(runtime.page==='settings')renderSettings();if(showToast)notify('像素角色与动作已生成')}
async function handlePhotoUpload(file){try{const bar=$('#spriteProgress');bar?.classList.add('working');const cfg=getPixel();cfg.sourceThumb=await prepareSourcePhoto(file);await generateSpriteAtlas(false);notify('照片已转换为动态像素角色')}catch(e){console.error(e);notify('照片转换失败')}finally{$('#spriteProgress')?.classList.remove('working');els.photoFile.value=''}}

function savePixelControls(){const cfg=getPixel();if($('#pixelFocus'))cfg.focusY=Number($('#pixelFocus').value);if($('#pixelZoom'))cfg.zoom=Number($('#pixelZoom').value);if($('#pixelGrid'))cfg.pixelGrid=Number($('#pixelGrid').value);if($('#pixelPalette'))cfg.palette=Number($('#pixelPalette').value);if($('#pixelOutfit'))cfg.outfit=$('#pixelOutfit').value;if($('#pixelOutfitColor'))cfg.outfitColor=$('#pixelOutfitColor').value;if($('#pixelPantsColor'))cfg.pantsColor=$('#pixelPantsColor').value;if($('#pixelShoeColor'))cfg.shoeColor=$('#pixelShoeColor').value;if($('#pixelOutlineColor'))cfg.outlineColor=$('#pixelOutlineColor').value;save(false)}
async function saveAndGeneratePixel(){savePixelControls();await generateSpriteAtlas()}
function exportSpriteSheet(){const atlas=getPixel().atlas;if(!atlas){notify('还没有精灵图');return}const a=document.createElement('a');a.href=atlas;a.download=`${state.character.name}-pixel-sprite-sheet.png`;a.click();notify('精灵图已导出')}

function naturalStatus(){if(!state)return;const h=new Date().getHours();if(h>=0&&h<7){state.status.activity='正在睡觉';state.status.energy=clamp(state.status.energy+1,0,100)}else if(h<10){state.status.activity='刚刚醒来'}else if(h<13){state.status.activity='整理桌面'}else if(h<17){state.status.activity='在读东西'}else if(h<20){state.status.activity='待在窗边'}else if(h<23){state.status.activity='听八位音乐'}else state.status.activity='准备休息';updateScene()}
function say(text,name=state?.character?.name||'角色',hold=4500){clearTimeout(runtime.dialogueTimer);els.dialogueName.textContent=name;els.dialogueText.textContent=text;els.dialogue.classList.add('show');beep('talk');if(state?.character?.pixel?.atlas&&!String(state.status.activity||'').includes('睡')){runtime.talkingUntil=Date.now()+Math.max(900,hold);setSpritePose('talk')}if(hold>0)runtime.dialogueTimer=setTimeout(()=>{els.dialogue.classList.remove('show');runtime.talkingUntil=0;updateScene()},hold)}
function hideDialogue(){els.dialogue.classList.remove('show')}
function thought(text,ms=2600){els.thought.textContent=text;els.thought.classList.add('show');setTimeout(()=>els.thought.classList.remove('show'),ms)}
function flash(){els.flash.classList.remove('go');void els.flash.offsetWidth;els.flash.classList.add('go')}
function setDirty(){runtime.dirty=true;if(state?.settings?.autoSave)save(false)}
function relationLabel(){const r=state.relation;const avg=(r.trust+r.comfort+r.familiarity)/3;return avg<12?'刚认识':avg<28?'逐渐熟悉':avg<50?'相处自然':avg<72?'很信任你':'重要的陪伴者'}
function adjustRelation({trust=0,comfort=0,familiarity=0}={}){state.relation.trust=clamp(state.relation.trust+trust,0,100);state.relation.comfort=clamp(state.relation.comfort+comfort,0,100);state.relation.familiarity=clamp(state.relation.familiarity+familiarity,0,100);state.relation.label=relationLabel()}
function addMemory(text,type='生活',important=false){if(!text)return;const last=state.memories[0];if(last&&last.text===text)return;state.memories.unshift({id:uid(),text:String(text).slice(0,220),type,important,ts:Date.now()});state.memories=state.memories.slice(0,180);setDirty()}
function addMessage(role,text,source='local'){state.conversation.push({id:uid(),role,text:String(text).slice(0,1800),source,ts:Date.now()});state.conversation=state.conversation.slice(-400);setDirty()}
function deriveMemory(text){const keys=['我喜欢','我不喜欢','我最喜欢','我的生日','我叫','我住在','我来自','我害怕','请记住','记得我','我正在','我以后'];if(keys.some(k=>text.includes(k))||text.length>70)addMemory(`${state.player.name}说：${text.slice(0,120)}`,'对话',true)}
function processReturn(){const old=state.lastVisit||Date.now(),now=Date.now(),mins=Math.floor((now-old)/60000);const oldDay=new Date(old);const days=Math.max(0,Math.floor((new Date(new Date().setHours(0,0,0,0))-new Date(oldDay.setHours(0,0,0,0)))/86400000));if(days>0)state.day+=days;let line='你把机器打开了。';if(mins<10)line='这么快就回来了。';else if(mins<120)line='刚才我还在这里。';else if(mins<720)line='你离开了一阵子。';else if(mins<1440)line='今天又见到了。';else if(days<4)line=`隔了${days}天。房间还是原来的样子。`;else line='有一阵子没见了。先坐下吧。';state.status.energy=clamp(state.status.energy+Math.min(18,Math.floor(mins/90)),0,100);state.lastVisit=now;naturalStatus();return line}
function setPage(page,push=true){if(push&&runtime.page&&!['boot','title','setup'].includes(runtime.page))runtime.stack.push(runtime.page);runtime.page=page;runtime.selected=0;render();beep('click')}
function back(){if(runtime.typing){cancelApi();return}if(runtime.page==='home'){hideDialogue();return}const p=runtime.stack.pop()||'home';runtime.page=p;runtime.selected=0;render();beep('back')}
function header(title,backAllowed=true){els.title.textContent=title;els.back.classList.toggle('hidden',!backAllowed)}
function render(){if(!state&&!['title','setup','help'].includes(runtime.page)){renderTitle();return}els.content.classList.remove('no-pad');switch(runtime.page){case'title':renderTitle();break;case'setup':renderSetup();break;case'home':renderHome();break;case'talk':renderTalk();break;case'activities':renderActivities();break;case'inventory':renderInventory();break;case'memories':renderMemories();break;case'profile':renderProfile();break;case'settings':renderSettings();break;case'help':renderHelp();break;default:runtime.page='home';renderHome()}setTimeout(refreshNav,0)}
function renderTitle(){runtime.page='title';header('DUAL//SOUL',false);els.content.innerHTML=`<section class="title-screen"><h1>ONE SAVE</h1><p>一台双屏掌机。<br>里面只住着一个会记住你的人。</p><div class="title-actions">${hasSave()?'<button class="pixel-btn primary nav-item" data-act="continue">继续存档</button>':''}<button class="pixel-btn nav-item" data-act="new-game">建立新角色</button><button class="pixel-btn nav-item" data-act="import">导入存档</button><button class="pixel-btn nav-item" data-go="help">操作说明</button></div><p class="tiny">独立原创双屏掌机风格，不包含任何官方商标或素材。</p></section>`}
function renderSetup(){header('建立唯一存档',false);const s=runtime.setupStep;if(s===1)els.content.innerHTML=`<div class="setup-step">01 / 03</div><div class="panel"><div class="panel-title">你们叫什么？</div><div class="form"><label>你的称呼<input id="setupPlayer" value="${esc(state.player.name)}" maxlength="18"></label><label>角色名字<input id="setupChar" value="${esc(state.character.name)}" maxlength="18"></label><label>角色代称<select id="setupPronoun"><option ${state.character.pronoun==='TA'?'selected':''}>TA</option><option ${state.character.pronoun==='他'?'selected':''}>他</option><option ${state.character.pronoun==='她'?'selected':''}>她</option></select></label></div></div><button class="pixel-btn primary nav-item" data-act="setup-next">下一步</button>`;
else if(s===2)els.content.innerHTML=`<div class="setup-step">02 / 03</div><div class="panel"><div class="panel-title">这个人是什么样的？</div><div class="form"><label>性格与边界<textarea id="setupPersonality" maxlength="900">${esc(state.character.personality)}</textarea></label><label>说话方式<textarea id="setupSpeech" maxlength="700">${esc(state.character.speech)}</textarea></label><label>生活背景<textarea id="setupBackground" maxlength="900">${esc(state.character.background)}</textarea></label></div></div><div class="row"><button class="pixel-btn nav-item" data-act="setup-prev">上一步</button><button class="pixel-btn primary grow nav-item" data-act="setup-next">下一步</button></div>`;
else els.content.innerHTML=`<div class="setup-step">03 / 03</div><div class="panel"><div class="panel-title">像素外观</div><p class="muted">先选择备用配色。建立存档后可在「系统 → 角色工坊」上传照片，自动生成动态像素人物。</p><div class="swatches">${Object.entries(avatarPalettes).map(([k,v])=>`<button class="swatch nav-item ${state.character.avatarPalette===k?'active':''}" data-avatar-palette="${k}" style="background:linear-gradient(135deg,${v.hair} 0 33%,${v.skin} 33% 66%,${v.shirt} 66%)" aria-label="${k}"></button>`).join('')}</div></div><div class="panel"><div class="panel-title">初始原则</div><p class="muted">角色不会默认喜欢、依赖或迎合你。关系只会依据人设、记忆和真实互动慢慢变化。</p></div><div class="row"><button class="pixel-btn nav-item" data-act="setup-prev">上一步</button><button class="pixel-btn primary grow nav-item" data-act="finish-setup">写入卡带</button></div>`;applyTheme()}
function renderHome(){header('角色机',false);naturalStatus();const c=state.character,r=state.relation;els.content.innerHTML=`<div class="panel home-card"><div class="mini-avatar">${c.pixel?.atlas?tinySpriteHtml(0):c.avatarImage?`<img src="${c.avatarImage}" alt="">`:'◆'}</div><div><div class="big">${esc(c.name)}</div><div class="muted">DAY ${String(state.day).padStart(3,'0')} · ${esc(r.label)}</div><div class="home-quote">${esc(currentHomeLine())}</div></div></div><div class="panel"><div class="panel-title"><span>当前状态</span><span>${esc(state.status.mood)}</span></div>${meter('精力',state.status.energy)}${meter('信任',r.trust)}${meter('自在',r.comfort)}${meter('熟悉',r.familiarity)}</div><div class="menu-grid"><button class="menu-btn nav-item" data-go="talk"><span>▣</span>对话</button><button class="menu-btn nav-item" data-go="activities"><span>♬</span>一起做</button><button class="menu-btn nav-item" data-go="inventory"><span>▦</span>背包</button><button class="menu-btn nav-item" data-go="memories"><span>◆</span>记忆</button><button class="menu-btn nav-item" data-go="profile"><span>◎</span>角色</button><button class="menu-btn nav-item" data-go="settings"><span>⚙</span>系统</button></div>`}
function currentHomeLine(){const h=new Date().getHours();if(state.status.activity.includes('睡'))return '房间很安静。角色正在休息。';if(h<11)return '新的一天刚刚开始。';if(h<18)return '屏幕里的时间也在继续。';if(h<23)return '房间的灯已经亮起来了。';return '现在适合把声音放轻一点。'}
function meter(label,val){return `<div class="status-row"><span>${label}</span><span class="meter"><i style="width:${clamp(val,0,100)}%"></i></span><span class="status-num">${Math.round(val)}</span></div>`}
function renderTalk(){header(`和${state.character.name}说话`,true);els.content.classList.add('no-pad');const msgs=state.conversation.slice(-80);els.content.innerHTML=`<div class="chat-page"><div id="chatLog" class="chat-log">${msgs.length?msgs.map(m=>`<div class="bubble ${m.role==='user'?'user':m.role==='assistant'?'char':'system'}">${esc(m.text)}<time>${fmtTime(m.ts)}</time></div>`).join(''):'<div class="empty">这里还没有对话。<br>按下 A，或者写下一句话。</div>'}${runtime.typing?'<div class="bubble char"><span class="typing"><i></i><i></i><i></i></span></div>':''}</div><div class="chat-compose"><div class="quick-replies"><button data-quick="今天过得怎么样？">问候</button><button data-quick="陪我安静待一会儿。">陪伴</button><button data-quick="你现在在做什么？">现在</button><button data-quick="晚安。">晚安</button></div><textarea id="chatInput" maxlength="1200" placeholder="输入一句话……" aria-label="对角色说话"></textarea><button id="chatSend" class="pixel-btn primary nav-item">发送</button></div></div>`;requestAnimationFrame(()=>{const log=$('#chatLog');if(log)log.scrollTop=log.scrollHeight})}
function renderActivities(){header('一起做',true);els.content.innerHTML=`<div class="panel"><div class="panel-title">房间里的时间</div><p class="muted">这些不是任务，也没有连续登录奖励。每次活动会留下少量真实记忆。</p></div><div class="list">${Object.entries(ACTIVITIES).map(([k,a])=>`<button class="list-btn nav-item" data-activity="${k}"><span class="list-icon">${a.icon}</span><span><b>${a.name}</b><small>${a.desc} · ${a.minutes}分钟</small></span><span>›</span></button>`).join('')}</div>`}
function renderInventory(){header('背包与礼物',true);const available=Object.entries(state.inventory).filter(([,n])=>n>0);els.content.innerHTML=`<div class="panel"><div class="panel-title"><span>抽屉</span><button class="pixel-btn nav-item" data-act="daily-drawer">打开</button></div><p class="muted">每天可以在房间抽屉里发现一件普通的小东西。</p></div><div class="list">${available.length?available.map(([k,n])=>{const i=ITEMS[k];return `<button class="list-btn nav-item" data-gift="${k}"><span class="list-icon">${i.icon}</span><span><b>${i.name}</b><small>${i.desc}</small></span><span class="badge">×${n}</span></button>`}).join(''):'<div class="empty">背包暂时是空的。</div>'}</div>`}

function renderProfile(){header('角色资料',true);const c=state.character;els.content.innerHTML=`<div class="panel"><div class="panel-title"><span>${esc(c.name)}</span><span>${esc(state.relation.label)}</span></div><p class="muted"><b>性格</b><br>${esc(c.personality)}</p><div class="divider"></div><p class="muted"><b>说话方式</b><br>${esc(c.speech)}</p><div class="divider"></div><p class="muted"><b>背景</b><br>${esc(c.background)}</p></div><div class="panel"><div class="panel-title">关系不是分数游戏</div>${meter('信任',state.relation.trust)}${meter('自在',state.relation.comfort)}${meter('熟悉',state.relation.familiarity)}<p class="muted">数值只用于内部保持反应一致，不会强制进入恋爱或亲密路线。</p></div><button class="pixel-btn nav-item" data-act="edit-profile">编辑角色设定</button>`}
function renderSettings(){header('系统设置',true);const tab=runtime.settingsTab||'general',s=state.settings,cfg=getPixel(),atlas=cfg.atlas||'';els.content.innerHTML=`<div class="tabs"><button class="tab nav-item ${tab==='general'?'active':''}" data-settings-tab="general">一般</button><button class="tab nav-item ${tab==='appearance'?'active':''}" data-settings-tab="appearance">机身</button><button class="tab nav-item ${tab==='character'?'active':''}" data-settings-tab="character">角色工坊</button><button class="tab nav-item ${tab==='api'?'active':''}" data-settings-tab="api">AI 接口</button><button class="tab nav-item ${tab==='data'?'active':''}" data-settings-tab="data">存档</button></div>${tab==='general'?`<div class="panel form"><label class="check"><input id="setSound" type="checkbox" ${s.sound?'checked':''}>开启按键音</label><label class="check"><input id="setScan" type="checkbox" ${s.showScanlines?'checked':''}>显示复古扫描线</label><label class="check"><input id="setAutoSave" type="checkbox" ${s.autoSave?'checked':''}>自动保存</label><label>文字出现速度<select id="setTypeSpeed"><option value="0" ${s.typeSpeed===0?'selected':''}>立即显示</option><option value="18" ${s.typeSpeed===18?'selected':''}>快速</option><option value="32" ${s.typeSpeed===32?'selected':''}>复古</option></select></label><label>房间天气<select id="setWeather"><option value="auto" ${state.room.weather==='auto'?'selected':''}>跟随日期</option><option value="clear" ${state.room.weather==='clear'?'selected':''}>晴朗</option><option value="rain" ${state.room.weather==='rain'?'selected':''}>下雨</option><option value="snow" ${state.room.weather==='snow'?'selected':''}>下雪</option></select></label><button class="pixel-btn primary nav-item" data-act="save-general">保存设置</button></div>`:tab==='appearance'?`<div class="panel"><div class="panel-title">机身颜色</div><div class="swatches">${Object.entries(palettes).map(([k,v])=>`<button class="swatch nav-item ${s.shell===k?'active':''}" data-shell="${k}" style="background:linear-gradient(135deg,${v.shell},${v.shell2})"></button>`).join('')}</div></div><div class="panel"><div class="panel-title">默认像素角色配色</div><p class="muted">没有上传照片时使用。生成照片角色后，脸部来自照片，身体服装由角色工坊控制。</p><div class="swatches">${Object.entries(avatarPalettes).map(([k,v])=>`<button class="swatch nav-item ${state.character.avatarPalette===k?'active':''}" data-avatar-palette="${k}" style="background:linear-gradient(135deg,${v.hair} 0 33%,${v.skin} 33% 66%,${v.shirt} 66%)"></button>`).join('')}</div></div>`:tab==='character'?`<div class="panel"><div class="panel-title"><span>PHOTO → PIXEL</span><span>${atlas?(cfg.customSheet?'自定义精灵图':'本地生成'):'未生成'}</span></div><div class="sprite-studio-hero"><div class="studio-stage">${atlas?`<div class="studio-sprite" style="${frameStyle(0,atlas)}"></div>`:'<div class="empty" style="padding:34px 3px">NO SPRITE</div>'}</div><div><div class="row" style="margin-bottom:6px">${cfg.sourceThumb?`<img class="source-thumb" src="${cfg.sourceThumb}" alt="原照片">`:''}<div class="studio-summary">上传人物照片后，系统会在设备内像素化脸部，并生成统一身体、服装与十二种动作表情。照片不会上传到外部服务器。</div></div><div id="spriteProgress" class="progress-pixels"><i></i></div></div></div><div class="row" style="margin-top:7px"><button class="pixel-btn primary nav-item" data-act="upload-photo">上传照片并生成</button><button class="pixel-btn nav-item" data-act="import-sheet">导入十二格精灵图</button></div></div><div class="panel form"><div class="panel-title">照片取景与像素风格</div><label class="range-line"><span>脸部高度</span><input id="pixelFocus" type="range" min="5" max="95" value="${cfg.focusY}"><span id="pixelFocusVal" class="range-value">${cfg.focusY}%</span></label><label class="range-line"><span>照片缩放</span><input id="pixelZoom" type="range" min="0.7" max="2.2" step="0.05" value="${cfg.zoom}"><span id="pixelZoomVal" class="range-value">${Number(cfg.zoom).toFixed(2)}</span></label><label>像素细节<select id="pixelGrid"><option value="20" ${cfg.pixelGrid===20?'selected':''}>粗颗粒</option><option value="24" ${cfg.pixelGrid===24?'selected':''}>复古</option><option value="28" ${cfg.pixelGrid===28?'selected':''}>精致</option><option value="32" ${cfg.pixelGrid===32?'selected':''}>高细节</option></select></label><label>颜色数量<select id="pixelPalette"><option value="8" ${cfg.palette===8?'selected':''}>8 色</option><option value="12" ${cfg.palette===12?'selected':''}>12 色</option><option value="18" ${cfg.palette===18?'selected':''}>18 色</option><option value="24" ${cfg.palette===24?'selected':''}>24 色</option></select></label><label>服装轮廓<select id="pixelOutfit"><option value="hoodie" ${cfg.outfit==='hoodie'?'selected':''}>连帽衫</option><option value="jacket" ${cfg.outfit==='jacket'?'selected':''}>短外套</option><option value="sweater" ${cfg.outfit==='sweater'?'selected':''}>针织衫</option><option value="dress" ${cfg.outfit==='dress'?'selected':''}>长上衣</option></select></label><div class="color-row"><label>上衣<input id="pixelOutfitColor" type="color" value="${cfg.outfitColor}"></label><label>下装<input id="pixelPantsColor" type="color" value="${cfg.pantsColor}"></label><label>鞋子<input id="pixelShoeColor" type="color" value="${cfg.shoeColor}"></label><label>描边<input id="pixelOutlineColor" type="color" value="${cfg.outlineColor}"></label></div><button class="pixel-btn primary nav-item" data-act="generate-pixel">保存并重新生成全部动作</button></div><div class="panel"><div class="panel-title">动作与表情预览</div>${atlas?`<div class="pose-grid">${Object.entries({idle:0,walk:2,sit:4,read:5,sleep:6,happy:7,sad:8,angry:9,surprised:10,talk:11}).map(([pose,idx])=>`<button class="pose-card nav-item" data-pose="${pose}"><div class="pose-sprite" style="${frameStyle(idx,atlas)}"></div><b>${POSE_LABELS[pose]}</b></button>`).join('')}</div>`:'<div class="empty">上传照片后会在这里出现全部动作。</div>'}</div><div class="panel"><div class="panel-title">精灵图管理</div><div class="row"><button class="pixel-btn nav-item" data-act="export-sprite" ${atlas?'':'disabled'}>导出 PNG 精灵图</button><button class="pixel-btn danger nav-item" data-act="remove-pixel" ${atlas?'':'disabled'}>移除像素角色</button></div><div class="studio-note" style="margin-top:7px">精灵图固定为 4 列 × 3 行，共 12 格：待机两帧、走路两帧、坐下、阅读、睡觉、开心、难过、生气、惊讶、说话。也可以自行绘制后重新导入。</div></div><div class="panel"><div class="panel-title">旧版透明立绘</div><p class="muted">仅作为兼容功能。旧立绘只有整体移动，无法拥有独立动作帧；动态精灵图会优先显示。</p><div class="row"><button class="pixel-btn nav-item" data-act="upload-avatar">上传旧版立绘</button>${state.character.avatarImage?'<button class="pixel-btn danger nav-item" data-act="remove-avatar">移除旧版立绘</button>':''}</div></div>`:tab==='api'?`<div class="panel form"><label class="check"><input id="apiEnabled" type="checkbox" ${s.api.enabled?'checked':''}>启用在线角色回复</label><label>Base URL<input id="apiBase" value="${esc(s.api.baseUrl)}" placeholder="https://example.com/v1"></label><label>API Key<input id="apiKey" type="password" value="${esc(apiKey())}" autocomplete="off"></label><label>模型<input id="apiModel" value="${esc(s.api.model)}"></label><label>Temperature<input id="apiTemp" type="number" min="0" max="2" step="0.05" value="${s.api.temperature}"></label><label>Max Tokens<input id="apiMax" type="number" min="60" max="2000" value="${s.api.maxTokens}"></label><label class="check"><input id="apiRemember" type="checkbox" ${s.api.rememberKey?'checked':''}>将 API Key 保存在本机浏览器</label><label class="check"><input id="apiFallback" type="checkbox" ${s.api.fallback?'checked':''}>连接失败时使用本地回复</label><label>附加角色指令<textarea id="apiPrompt" maxlength="1200">${esc(s.api.customPrompt)}</textarea></label><div class="row"><button class="pixel-btn primary nav-item" data-act="save-api">保存</button><button class="pixel-btn nav-item" data-act="test-api">测试</button><button class="pixel-btn nav-item" data-act="fetch-models">读取模型</button></div><div id="apiResult" class="api-result">API Key 仅用于直接请求你填写的接口。浏览器接口需要服务端允许跨域。</div></div>`:`<div class="panel"><div class="panel-title">存档管理</div><div class="stack"><button class="pixel-btn primary nav-item" data-act="manual-save">立即保存</button><button class="pixel-btn nav-item" data-act="export-save">导出完整 JSON 存档</button><button class="pixel-btn nav-item" data-act="import">导入 JSON 存档</button><button class="pixel-btn danger nav-item" data-act="reset-save">删除角色与全部数据</button></div></div><div class="panel"><p class="muted">当前版本 ${VERSION}<br>角色像素精灵、照片缩略图、设置、记忆和对话都会写入同一个本地存档。导出存档不会包含 API Key。</p></div>`}`;if(tab==='character'){const f=$('#pixelFocus'),z=$('#pixelZoom');f?.addEventListener('input',()=>$('#pixelFocusVal').textContent=f.value+'%');z?.addEventListener('input',()=>$('#pixelZoomVal').textContent=Number(z.value).toFixed(2))}}
function renderHelp(){header('操作说明',runtime.page!=='title');els.content.innerHTML=`<div class="panel"><div class="panel-title">实体按键</div><p class="muted"><b>A</b>：确认／进入对话　<b>B</b>：返回／关闭对话<br><b>X</b>：直接打开“一起做”　<b>Y</b>：打开背包<br><b>START</b>：保存　<b>SELECT</b>：查看状态<br>方向键：切换下屏按钮；在主页时左右会移动角色。</p></div><div class="panel"><div class="panel-title">键盘</div><p class="muted">方向键移动选择，Z=A，X=B，Enter=确认，Esc=返回。</p></div><div class="panel"><div class="panel-title">在线 AI</div><p class="muted">系统设置里可填写兼容 OpenAI 格式的接口。未填写时仍可使用本地陪伴逻辑、存档、活动、礼物和记忆功能。</p></div>`}
function openProfileEditor(){els.content.insertAdjacentHTML('beforeend',`<div class="modal"><div class="modal-card"><div class="panel-title">编辑角色</div><div class="form"><label>名字<input id="editName" value="${esc(state.character.name)}" maxlength="18"></label><label>性格与边界<textarea id="editPersonality">${esc(state.character.personality)}</textarea></label><label>说话方式<textarea id="editSpeech">${esc(state.character.speech)}</textarea></label><label>背景<textarea id="editBackground">${esc(state.character.background)}</textarea></label><div class="row"><button class="pixel-btn" data-act="close-modal">取消</button><button class="pixel-btn primary grow" data-act="save-profile">保存</button></div></div></div></div>`)}
function openStatusModal(){els.content.insertAdjacentHTML('beforeend',`<div class="modal"><div class="modal-card"><div class="panel-title">卡带状态</div><p class="muted">DAY ${state.day}<br>${esc(state.character.name)}：${esc(state.status.mood)}，${esc(state.status.activity)}<br>关系：${esc(state.relation.label)}<br>记忆：${state.memories.length} 条<br>对话：${state.stats.talks} 次</p><button class="pixel-btn primary" data-act="close-modal">关闭</button></div></div>`)}
function refreshNav(){const items=$$('.nav-item:not([disabled])');items.forEach((x,i)=>x.classList.toggle('nav-selected',i===runtime.selected));if(items[runtime.selected])items[runtime.selected].scrollIntoView({block:'nearest',inline:'nearest'})}
function moveNav(dir){const items=$$('.nav-item:not([disabled])');if(!items.length)return;if(runtime.page==='home'&&(dir==='left'||dir==='right')&&document.activeElement?.tagName!=='INPUT'){moveCharacter(dir);return}const delta=(dir==='up'||dir==='left')?-1:1;runtime.selected=(runtime.selected+delta+items.length)%items.length;items.forEach((x,i)=>x.classList.toggle('nav-selected',i===runtime.selected));items[runtime.selected].scrollIntoView({block:'nearest',inline:'nearest'});beep('click')}
function pressA(){const items=$$('.nav-item:not([disabled])');if(items[runtime.selected])items[runtime.selected].click();else if(runtime.page==='home')setPage('talk')}
function moveCharacter(dir){const current=Number(state.character.positionX)||53,next=clamp(current+(dir==='left'?-4:4),39,75);state.character.positionX=next;updateCharacterPosition();runtime.poseOverride='walk';clearTimeout(runtime.poseTimer);updateScene();runtime.poseTimer=setTimeout(()=>{runtime.poseOverride='';updateScene()},620);hideDialogue();save(false);beep('click')}
async function sendTalk(prefill=''){if(runtime.typing)return;const input=$('#chatInput');const text=(prefill||input?.value||'').trim();if(!text){notify('还没有输入内容');return}if(input){input.value='';input.blur()}addMessage('user',text);deriveMemory(text);state.stats.talks++;adjustRelation({familiarity:1,trust:text.length>35?1:0});runtime.typing=true;renderTalk();let reply='',source='local';try{if(state.settings.api.enabled){reply=await onlineReply(text);source='api'}else reply=localReply(text)}catch(e){console.error(e);if(state.settings.api.fallback){reply=localReply(text)+`\n\n（在线接口暂时没有连接成功。）`}else reply=`我刚才没有听清。接口返回：${friendlyError(e)}`}finally{runtime.typing=false}reply=String(reply||'……').trim().slice(0,1800);addMessage('assistant',reply,source);state.status.mood=chooseMood(text);state.status.activity='正在和你说话';state.status.energy=clamp(state.status.energy-1,0,100);save(false);say(reply,state.character.name,6500);renderTalk()}
function chooseMood(t){if(/开心|好消息|成功|喜欢/.test(t))return'有点高兴';if(/累|难过|烦|压力|哭/.test(t))return'认真听着';if(/晚安|睡/.test(t))return'困倦';return rand(['平静','留意你','若有所思','放松'])}
function localReply(text){const n=state.player.name,c=state.character.name,h=new Date().getHours(),recent=state.conversation.slice(-8,-1).map(m=>m.text).join(' ');if(/晚安|睡觉/.test(text))return h<20?'现在还不算太晚，不过累了就先休息。':'晚安。机器可以先合上，我会把灯关掉。';if(/早安|早上好/.test(text))return h>13?'已经过了早上，不过还是可以从现在开始。':'早。窗边的光刚好进来。';if(/累|压力|撑不住|很烦/.test(text))return rand(['先不用把所有事情都讲清楚。坐一会儿，我在听。','听起来今天消耗了很多力气。先让自己慢一点。','你可以只说最难受的那一部分，不需要一次说完。']);if(/开心|好消息|成功|做到了/.test(text))return rand(['这件事值得记下来。你说的时候，语气都不一样了。','我听出来了。今天应该被好好保存。','做到了就是做到了，不用把它说得很小。']);if(/你是谁|叫什么/.test(text))return `我是${c}。至少在这张存档里，我会一直是同一个人。`;if(/想我|有没有想/.test(text))return `我有注意到你不在，但我也做了自己的事。现在你回来了。`;if(/喜欢我|爱我|关系/.test(text))return `我不会因为你是玩家就预设答案。我们之间是什么，会由已经发生的事情慢慢决定。`;if(/在做什么|现在干嘛/.test(text))return `刚才在${state.status.activity.replace('正在','')}。你打开机器以后，我就转过来了。`;if(/下雨|天气/.test(text))return autoWeather()==='rain'?'窗外一直有雨声。房间里反而显得更安静。':'今天窗外很清楚，能看见远一点的地方。';if(/谢谢/.test(text))return '不用把这句话说得很重。我收到了。';if(/对不起|抱歉/.test(text))return '我听见了。先把发生了什么说清楚，再决定要不要让它过去。';if(/记得|忘记/.test(text))return state.memories.length?`我现在保留了${state.memories.length}条记忆。重要的事情不会只靠一句“我记得”来证明。`:'我们还没有留下很多记忆，不过可以从现在开始。';if(text.length<5)return rand(['嗯，我在。','我听见了。','然后呢。','你可以继续说。']);if(recent.includes(text))return '这句话你之前也提过。它现在还是让你在意，对吗。';return rand([`我听懂了。${n}，你更在意的是这件事本身，还是它让你产生的感觉？`,'我先不急着给结论。你刚才说的那一部分，我会记下来。','这不像一句随口说的话。你愿意的话，可以再往下讲一点。','我在想，如果把最难处理的部分先拿出来，会不会清楚一点。'])}
function apiKey(){return state.settings.api.rememberKey?(localStorage.getItem('dual_soul_saved_api_key')||''):(sessionStorage.getItem(SESSION_KEY)||'')}
function chatEndpoint(base){let b=(base||'').trim().replace(/\/+$/,'');if(/\/chat\/completions$/i.test(b))return b;if(/\/v1$/i.test(b))return b+'/chat/completions';return b+'/chat/completions'}
function modelEndpoint(base){let b=(base||'').trim().replace(/\/+$/,'');if(/\/chat\/completions$/i.test(b))b=b.replace(/\/chat\/completions$/i,'');if(!/\/v1$/i.test(b)&&!/\/models$/i.test(b))return b+'/models';return /\/models$/i.test(b)?b:b+'/models'}
function systemPrompt(){const mem=state.memories.filter(m=>m.important).slice(0,18).map(m=>`- ${m.text}`).join('\n')||'- 暂无重要长期记忆';const recent=state.conversation.slice(-16).map(m=>`${m.role==='user'?state.player.name:state.character.name}：${m.text}`).join('\n');return `你正在扮演一个持续存在的单一AI角色。\n角色名：${state.character.name}\n用户称呼：${state.player.name}\n代称：${state.character.pronoun}\n性格与边界：${state.character.personality}\n说话方式：${state.character.speech}\n生活背景：${state.character.background}\n当前关系：${state.relation.label}（信任${state.relation.trust}/自在${state.relation.comfort}/熟悉${state.relation.familiarity}）\n当前状态：${state.status.mood}，${state.status.activity}\n长期记忆：\n${mem}\n最近对话：\n${recent}\n规则：只输出角色自然回复，不写旁白标签，不冒充用户，不默认暧昧或亲密，不讨好，不制造离线焦虑。保持人设，优先简洁真实，可以分成1到3个短段落。${state.settings.api.customPrompt?`\n附加要求：${state.settings.api.customPrompt}`:''}`}
async function onlineReply(text){const a=state.settings.api,key=apiKey();if(!a.baseUrl||!a.model)throw new Error('请填写 Base URL 和模型');runtime.apiController=new AbortController();const headers={'Content-Type':'application/json'};if(key)headers.Authorization=`Bearer ${key}`;const res=await fetch(chatEndpoint(a.baseUrl),{method:'POST',headers,body:JSON.stringify({model:a.model,messages:[{role:'system',content:systemPrompt()},{role:'user',content:text}],temperature:Number(a.temperature),max_tokens:Number(a.maxTokens)}),signal:runtime.apiController.signal});const raw=await res.text();let data;try{data=JSON.parse(raw)}catch{data={raw}}if(!res.ok)throw new Error(data?.error?.message||data?.message||raw.slice(0,260)||`HTTP ${res.status}`);return data?.choices?.[0]?.message?.content||data?.choices?.[0]?.text||data?.output_text||''}
function friendlyError(e){if(e?.name==='AbortError')return'已取消生成';if(/Failed to fetch/i.test(e?.message||''))return'网络或跨域限制（CORS）';return (e?.message||'未知错误').slice(0,180)}
function cancelApi(){if(runtime.apiController)runtime.apiController.abort();runtime.typing=false;render();notify('已取消')}
function doActivity(key){const a=ACTIVITIES[key];if(!a)return;state.status.activity=key==='music'?'正在听音乐':key==='read'?'正在读书':key==='walk'?'正在散步':a.name;state.status.mood=rand(['放松','专心','安静','有点高兴']);state.status.energy=clamp(state.status.energy+(a.energy||0),0,100);adjustRelation(a);state.stats.activities++;state.stats.totalMinutes+=a.minutes;addMemory(`你和${state.character.name}${a.name}。`,'生活',state.stats.activities%6===0);say(a.lines.join('\n'),state.character.name,7000);if(key==='music')toggleMusic(true);updateScene();flash();save(false);renderActivities();notify(`${a.name}完成`)}
function giveGift(key){const n=state.inventory[key]||0;if(n<=0)return;const i=ITEMS[key];state.inventory[key]--;state.stats.gifts++;adjustRelation({trust:1,comfort:2,familiarity:1});state.status.mood='有点高兴';state.status.activity='正在看你送的东西';addMemory(`${state.player.name}送给${state.character.name}：${i.name}。`,'礼物',true);say(i.lines.join('\n'),state.character.name,7500);updateScene();flash();save(false);renderInventory()}
function dailyDrawer(){const today=dateKey();if(state.daily.lastDrawer===today){notify('今天已经打开过抽屉');return}const keys=Object.keys(ITEMS),k=rand(keys);state.inventory[k]=(state.inventory[k]||0)+1;state.daily.lastDrawer=today;addMemory(`你们在抽屉里发现了${ITEMS[k].name}。`,'生活');save(false);renderInventory();say(`抽屉里有一件东西。\n${ITEMS[k].name}。`);notify(`获得：${ITEMS[k].name}`)}
function toggleMusic(forceOn=false){if(runtime.musicTimer&&!forceOn){clearInterval(runtime.musicTimer);runtime.musicTimer=null;notify('音乐停止');return}if(runtime.musicTimer)return;const notes=[262,330,392,523,392,330,294,349];runtime.musicStep=0;runtime.musicTimer=setInterval(()=>{if(!state.settings.sound)return;try{runtime.audio=runtime.audio||new (window.AudioContext||window.webkitAudioContext)();const ctx=runtime.audio,o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=notes[runtime.musicStep++%notes.length];g.gain.setValueAtTime(.018,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.15);o.connect(g).connect(ctx.destination);o.start();o.stop(ctx.currentTime+.16)}catch(e){}},210);notify('八位音乐开始')}
function saveGeneral(){state.settings.sound=$('#setSound').checked;state.settings.showScanlines=$('#setScan').checked;state.settings.autoSave=$('#setAutoSave').checked;state.settings.typeSpeed=Number($('#setTypeSpeed').value);state.room.weather=$('#setWeather').value;save(true);applyTheme();updateScene();renderSettings()}
function saveApiSettings(){const a=state.settings.api;a.enabled=$('#apiEnabled').checked;a.baseUrl=$('#apiBase').value.trim();a.model=$('#apiModel').value.trim();a.temperature=clamp(Number($('#apiTemp').value)||.85,0,2);a.maxTokens=clamp(Number($('#apiMax').value)||260,60,2000);a.rememberKey=$('#apiRemember').checked;a.fallback=$('#apiFallback').checked;a.customPrompt=$('#apiPrompt').value.trim();const key=$('#apiKey').value.trim();if(a.rememberKey){localStorage.setItem('dual_soul_saved_api_key',key);sessionStorage.removeItem(SESSION_KEY)}else{sessionStorage.setItem(SESSION_KEY,key);localStorage.removeItem('dual_soul_saved_api_key')}save(true);renderSettings()}
async function testApi(){saveApiSettings();const out=$('#apiResult');if(out)out.textContent='正在连接……';try{const reply=await onlineReply('只回复“连接成功”，不要添加其他内容。');const box=$('#apiResult');if(box)box.textContent=`连接成功\n模型回复：${reply}`;notify('连接成功')}catch(e){const box=$('#apiResult');if(box)box.textContent=`连接失败：${friendlyError(e)}`;notify('连接失败')}}
async function fetchModels(){saveApiSettings();const out=$('#apiResult');if(out)out.textContent='正在读取模型……';try{const headers={};const key=apiKey();if(key)headers.Authorization=`Bearer ${key}`;const r=await fetch(modelEndpoint(state.settings.api.baseUrl),{headers});const raw=await r.text();let d;try{d=JSON.parse(raw)}catch{d={raw}}if(!r.ok)throw new Error(d?.error?.message||raw.slice(0,200));const models=(d.data||d.models||[]).map(x=>typeof x==='string'?x:x.id||x.name).filter(Boolean).slice(0,40);const box=$('#apiResult');if(box)box.textContent=models.length?`可用模型：\n${models.join('\n')}`:'接口没有返回模型列表';}catch(e){const box=$('#apiResult');if(box)box.textContent=`读取失败：${friendlyError(e)}`}}
function exportSave(){const copy=JSON.parse(JSON.stringify(state));copy.settings.api.rememberKey=false;const blob=new Blob([JSON.stringify(copy,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`dual-soul-${state.character.name}-${fmtDate(Date.now())}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);notify('已导出存档')}
async function importSave(file){try{const obj=JSON.parse(await file.text());if(!obj.character||!obj.settings)throw new Error('不是有效的 DUAL//SOUL 存档');state=merge(defaultState(),obj);state.version=VERSION;localStorage.setItem(STORAGE_KEY,JSON.stringify(state));applyTheme();runtime.stack=[];runtime.page='home';render();say('存档已经回到机器里。');notify('导入成功')}catch(e){notify('导入失败：'+friendlyError(e))}finally{els.importFile.value=''}}
async function importAvatar(file){try{const data=await compressImage(file,320,320,.86);state.character.avatarImage=data;getPixel().atlas='';save(false);applyTheme();updateScene();renderSettings();notify('旧版透明立绘已保存')}catch(e){notify('图片读取失败')}finally{els.avatarFile.value=''}}
function compressImage(file,maxW,maxH,quality){return new Promise((resolve,reject)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{const scale=Math.min(1,maxW/img.width,maxH/img.height),c=document.createElement('canvas');c.width=Math.max(1,Math.round(img.width*scale));c.height=Math.max(1,Math.round(img.height*scale));const x=c.getContext('2d');x.imageSmoothingEnabled=false;x.drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);resolve(c.toDataURL('image/png',quality))};img.onerror=reject;img.src=url})}
function resetSave(){if(!confirm('确定删除整个角色存档吗？此操作无法撤销。'))return;if(!confirm('最后确认：建议先导出备份。仍然删除吗？'))return;localStorage.removeItem(STORAGE_KEY);localStorage.removeItem('dual_soul_saved_api_key');sessionStorage.removeItem(SESSION_KEY);state=null;runtime.stack=[];runtime.page='title';applyTheme();renderTitle();notify('存档已删除')}
function setupNext(){if(runtime.setupStep===1){state.player.name=($('#setupPlayer').value.trim()||'你').slice(0,18);state.character.name=($('#setupChar').value.trim()||'秋').slice(0,18);state.character.pronoun=$('#setupPronoun').value}else if(runtime.setupStep===2){state.character.personality=$('#setupPersonality').value.trim()||defaultState().character.personality;state.character.speech=$('#setupSpeech').value.trim()||defaultState().character.speech;state.character.background=$('#setupBackground').value.trim()||defaultState().character.background}runtime.setupStep=Math.min(3,runtime.setupStep+1);renderSetup()}
function finishSetup(){state.createdAt=Date.now();state.lastVisit=Date.now();state.memories=[{id:uid(),text:`${state.player.name}第一次打开了这张角色卡带。`,type:'生活',important:true,ts:Date.now()}];state.conversation=[{id:uid(),role:'assistant',text:`你来了。\n我是${state.character.name}。`,source:'system',ts:Date.now()}];save(false);runtime.stack=[];runtime.page='home';applyTheme();updateScene();render();flash();say(`你来了。\n我是${state.character.name}。`)}
function newGame(){if(hasSave()&&!confirm('建立新角色会覆盖本机现有存档。建议先导出。继续吗？'))return;state=defaultState();runtime.setupStep=1;runtime.page='setup';applyTheme();renderSetup();say('请先为这张卡带写入名字。','SYSTEM')}
function continueGame(){state=load();if(!state){renderTitle();return}applyTheme();const line=processReturn();save(false);runtime.page='home';runtime.stack=[];render();say(line,state.character.name,6000)}
function startBoot(){updateClock();setTimeout(()=>{els.boot.classList.add('off');setTimeout(()=>els.boot.classList.add('hidden'),320);renderTitle()},1250)}
function onClick(e){const t=e.target.closest('button,[data-go],[data-act],[data-activity],[data-gift],[data-memory-tab],[data-settings-tab],[data-shell],[data-avatar-palette],[data-delete-memory],[data-quick],[data-pose]');if(!t)return;if(t.dataset.pose){previewPose(t.dataset.pose);return}if(t.dataset.go){setPage(t.dataset.go);return}if(t.dataset.quick){sendTalk(t.dataset.quick);return}if(t.dataset.activity){doActivity(t.dataset.activity);return}if(t.dataset.gift){giveGift(t.dataset.gift);return}if(t.dataset.memoryTab){runtime.memoryTab=t.dataset.memoryTab;renderMemories();return}if(t.dataset.settingsTab){runtime.settingsTab=t.dataset.settingsTab;renderSettings();return}if(t.dataset.shell){state.settings.shell=t.dataset.shell;applyTheme();save(false);renderSettings();return}if(t.dataset.avatarPalette){state.character.avatarPalette=t.dataset.avatarPalette;applyTheme();save(false);runtime.page==='setup'?renderSetup():renderSettings();return}if(t.dataset.deleteMemory){state.memories=state.memories.filter(m=>m.id!==t.dataset.deleteMemory);save(false);renderMemories();return}const a=t.dataset.act;if(!a)return;({continue:continueGame,'new-game':newGame,import:()=>els.importFile.click(),'setup-next':setupNext,'setup-prev':()=>{runtime.setupStep=Math.max(1,runtime.setupStep-1);renderSetup()},'finish-setup':finishSetup,'daily-drawer':dailyDrawer,'edit-profile':openProfileEditor,'close-modal':()=>t.closest('.modal')?.remove(),'save-profile':()=>{state.character.name=($('#editName').value.trim()||state.character.name).slice(0,18);state.character.personality=$('#editPersonality').value.trim();state.character.speech=$('#editSpeech').value.trim();state.character.background=$('#editBackground').value.trim();save(false);renderProfile();say('设定已经写回卡带。','SYSTEM')},'save-general':saveGeneral,'save-api':saveApiSettings,'test-api':testApi,'fetch-models':fetchModels,'manual-save':()=>save(true),'export-save':exportSave,'reset-save':resetSave,'upload-photo':()=>els.photoFile.click(),'import-sheet':()=>els.sheetFile.click(),'generate-pixel':saveAndGeneratePixel,'export-sprite':exportSpriteSheet,'remove-pixel':removePixelCharacter,'upload-avatar':()=>els.avatarFile.click(),'remove-avatar':()=>{state.character.avatarImage='';save(false);applyTheme();updateScene();renderSettings()},'status':openStatusModal}[a]?.())}
els.content.addEventListener('click',onClick);els.back.addEventListener('click',back);els.importFile.addEventListener('change',e=>e.target.files[0]&&importSave(e.target.files[0]));els.avatarFile.addEventListener('change',e=>e.target.files[0]&&importAvatar(e.target.files[0]));els.photoFile.addEventListener('change',e=>e.target.files[0]&&handlePhotoUpload(e.target.files[0]));els.sheetFile.addEventListener('change',e=>e.target.files[0]&&importSpriteSheet(e.target.files[0]));
els.content.addEventListener('click',e=>{if(e.target.id==='chatSend')sendTalk()});els.content.addEventListener('keydown',e=>{if(e.target.id==='chatInput'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTalk()}});
$$('[data-dir]').forEach(b=>b.addEventListener('click',()=>moveNav(b.dataset.dir)));$$('[data-key]').forEach(b=>b.addEventListener('click',()=>{const k=b.dataset.key;if(k==='A')runtime.page==='talk'?($('#chatInput')?.focus()):pressA();if(k==='B')back();if(k==='X')setPage('activities');if(k==='Y')setPage('inventory')}));
$('#startBtn').addEventListener('click',()=>{if(state){save(true);flash()}else renderTitle()});$('#selectBtn').addEventListener('click',()=>{if(state)openStatusModal();else notify('没有载入存档')});
window.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};if(map[e.key]){e.preventDefault();moveNav(map[e.key])}if(e.key.toLowerCase()==='z'||e.key==='Enter'){e.preventDefault();pressA()}if(e.key.toLowerCase()==='x'||e.key==='Escape'){e.preventDefault();back()}if(e.key.toLowerCase()==='a')setPage('activities');if(e.key.toLowerCase()==='s')setPage('inventory')});
window.addEventListener('beforeunload',()=>{if(state&&runtime.dirty)save(false)});window.addEventListener('visibilitychange',()=>{if(document.hidden&&state)save(false)});
setInterval(updateClock,30000);if('serviceWorker' in navigator&&location.protocol.startsWith('http'))navigator.serviceWorker.register('./sw.js').catch(()=>{});startBoot();
})();
