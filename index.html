  const leading=/^((?:(?:（[^）]*）|\([^)]*\)|【[^】]*】|\[[^\]]*\]|〔[^〕]*〕|〈[^〉]*〉|《[^》]*》)\s*)+)/.exec(text);
  const prefix=leading?leading[1]:'';
  let speech=leading?text.slice(leading[0].length).trim():text;
  speech=speech
    .replace(/^[“”"「」『』]+/,'')
    .replace(/[“”"「」『』]+$/,'')
    .trim();

  if(!speech)return text;
  return prefix+'“'+speech+'”';
}

function splitRoleReply(text){
  const input=String(text??'').replace(/\r/g,'').trim();
  if(!input)return['……'];

  const parts=[];
  let buffer='',depth=0;
  const opens=new Set(['（','(','【','[','《','〈','「','『','“','‘']);
  const closes=new Set(['）',')','】',']','》','〉','」','』','”','’']);
  const flush=()=>{
    const value=buffer.replace(/\s+/g,' ').trim();
    if(value)parts.push(value);
    buffer='';
  };

  for(let i=0;i<input.length;i++){
    const ch=input[i];

    if(ch==='\n'&&depth===0){
      flush();
      continue;
    }

    buffer+=ch;

    if(opens.has(ch)){
      depth++;
      continue;
    }

    if(closes.has(ch)){
      depth=Math.max(0,depth-1);
      if(ch==='”'&&depth===0)flush();
      continue;
    }

    if(depth!==0)continue;

    let ended=/[。！？!?]/.test(ch);
    if(ch==='…'&&input[i+1]==='…'){
      buffer+=input[++i];
      const next=input[i+1]||'';
      ended=!next||next==='\n'||/[”’"'）】》〉」』]/.test(next);
    }
    if(!ended)continue;

    while(
      i+1<input.length&&
      /[”’"'）】》〉」』]/.test(input[i+1])
    )buffer+=input[++i];

    flush();
  }

  flush();
  return parts.length?parts:['……'];
}

      message=data?.error?.message||data?.detail||data?.message||data?.error||message;
    }catch(_){}
    throw new Error(provider+' 返回的不是音频：'+message);
  }
  const mime=dsDetectAudioMime(bytes);
  if(mime)return new Blob([buffer],{type:mime});
  if(type.startsWith('audio/'))return new Blob([buffer],{type});
  throw new Error(provider+' 请求成功，但返回内容不是可识别音频');
}

async function dsValidatePlayableBlob(blob,provider='TTS',timeoutMs=12000){
  const url=URL.createObjectURL(blob);
  const audio=new Audio();
  audio.preload='auto';
  audio.muted=true;
  audio.src=url;

  try{
    const duration=await new Promise((resolve,reject)=>{
      let done=false;
      const cleanup=()=>{
        clearTimeout(timer);
        audio.removeEventListener('loadeddata',onReady);
        audio.removeEventListener('canplay',onReady);
        audio.removeEventListener('error',onError);
        audio.removeEventListener('abort',onAbort);
      };
      const finish=(ok,value)=>{
        if(done)return;
        done=true;
        cleanup();
        ok?resolve(value):reject(value);
      };
      const verify=()=>{
        const d=Number(audio.duration);
        if(audio.readyState<2)return;
        if(!Number.isFinite(d)||d<=0){
          finish(false,new Error(provider+' 音频已经返回，但浏览器解析出的时长无效'));
          return;
        }
        finish(true,d);
      };
      const onReady=()=>verify();
      const onError=()=>finish(false,new Error(provider+' 返回的文件无法被当前浏览器解码播放'));
      const onAbort=()=>finish(false,new Error(provider+' 音频解码被浏览器中止'));
      const timer=setTimeout(
        ()=>finish(false,new Error(provider+' 音频在 '+Math.round(timeoutMs/1000)+' 秒内未完成浏览器解码')),
        timeoutMs
      );
      audio.addEventListener('loadeddata',onReady,{once:true});
      audio.addEventListener('canplay',onReady,{once:true});
      audio.addEventListener('error',onError,{once:true});
      audio.addEventListener('abort',onAbort,{once:true});
      audio.load();
    });

    return {
      blob,
      duration,
      mime:blob.type||'application/octet-stream',
      size:blob.size
    };
  }finally{
    try{audio.pause()}catch(_){}
    try{audio.removeAttribute('src');audio.load()}catch(_){}
    URL.revokeObjectURL(url);
  }
}

async function dsWaitAudioReady(audio,timeoutMs=9000){
  if(audio.readyState>=2)return;
  await new Promise((resolve,reject)=>{
    let done=false;
    const finish=(ok,error)=>{
      if(done)return;
      done=true;
      clearTimeout(timer);
      audio.removeEventListener('loadedmetadata',ready);
      audio.removeEventListener('canplay',ready);
      audio.removeEventListener('error',failed);
      ok?resolve():reject(error||new Error('浏览器无法解码这段语音'));
    };
    const ready=()=>finish(true);
    const failed=()=>finish(false,new Error('音频文件无法播放，可能是接口返回格式与设置不一致'));
    const timer=setTimeout(()=>finish(false,new Error('音频载入超时')),timeoutMs);
    audio.addEventListener('loadedmetadata',ready,{once:true});
    audio.addEventListener('canplay',ready,{once:true});
    audio.addEventListener('error',failed,{once:true});
    audio.load();
  });
}

function dsJsonPath(obj,path){
  return String(path||'').split('.').filter(Boolean).reduce((v,k)=>v&&v[k],obj);
}
function dsMiniMaxEndpoints(cfg){
  const out=[];
  const add=url=>{if(url&&!out.includes(url))out.push(url)};
  let custom=String(cfg.minimaxBaseUrl||'').trim().replace(/\/+$/,'');
  if(custom)add(/\/v1\/t2a_v2$/i.test(custom)?custom:custom+'/v1/t2a_v2');
  const group=String(cfg.minimaxGroupId||'').trim();
  const version=cfg.minimaxVersion||'global';
  if(version==='global'||version==='official'){
    add('https://api.minimax.io/v1/t2a_v2');
    add('https://api-uw.minimax.io/v1/t2a_v2');
  }
  if((version==='cn'||version==='official')&&group){
    add('https://api.minimax.chat/v1/t2a_v2?GroupId='+encodeURIComponent(group));
    add('https://api.minimaxi.com/v1/t2a_v2?GroupId='+encodeURIComponent(group));
  }
  if(version==='global'&&group)add('https://api.minimax.chat/v1/t2a_v2?GroupId='+encodeURIComponent(group));
  if(version==='cn'&&!group)add('https://api.minimax.io/v1/t2a_v2');
  if(!out.length)add('https://api.minimax.io/v1/t2a_v2');
  return out;
}
async function dsCallMiniMax(text,cfg,voiceId){
  const key=String(cfg.minimaxKey||'').replace(/^Bearer\s+/i,'').trim();
  if(!key)throw new Error('MiniMax API Key 未配置');
  if(!voiceId)throw new Error('MiniMax Voice ID 未配置');
  const langMap={
    zh:'Chinese','zh-cn':'Chinese','zh-tw':'Chinese',yue:'Yue Chinese',
    en:'English',ja:'Japanese',ko:'Korean',fr:'French',de:'German',
    es:'Spanish',ru:'Russian',pt:'Portuguese'
  };
  const body={
    model:cfg.minimaxModel||'speech-02-hd',
    text,stream:false,output_format:'hex',
    language_boost:langMap[String(cfg.language||'').toLowerCase()]||'auto',
    voice_setting:{voice_id:voiceId,speed:Number(cfg.speed||1),vol:1,pitch:0},
    audio_setting:{sample_rate:32000,bitrate:128000,format:'mp3',channel:1}
  };
  let last='';
  for(const url of dsMiniMaxEndpoints(cfg)){
    try{
      const response=await dsFetchTimeout(url,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify(body)
      });
      const raw=await response.text();
      let data;try{data=JSON.parse(raw)}catch(_){data={raw}}
      const status=data?.base_resp?.status_code??data?.base_resp?.statusCode??data?.status_code??0;
      if(!response.ok||status){
        last=data?.base_resp?.status_msg||data?.status_msg||data?.error?.message||raw.slice(0,240)||('HTTP '+response.status);
        continue;
      }
      const audio=data?.data?.audio??data?.audio;
      if(!audio){last='MiniMax 没有返回 audio';continue}
      return /^[0-9a-fA-F]+$/.test(String(audio).replace(/^0x/,''))?dsHexBlob(audio):dsBase64Blob(audio);
    }catch(e){
      last=e?.name==='AbortError'?'MiniMax 请求超时':String(e?.message||e);
    }
  }
  throw new Error(last||'MiniMax 语音生成失败');
}

}

async function dsCallOpenAI(text,cfg,voiceId){
  const key=String(cfg.openaiKey||'').replace(/^Bearer\s+/i,'').trim();
  if(!key)throw new Error('OpenAI／兼容 TTS API Key 未配置');
  let base=String(cfg.openaiBaseUrl||'https://api.openai.com').replace(/\/+$/,'');
  let url;
  if(/\/v1\/audio\/speech$/i.test(base))url=base;
  else{
    base=base.replace(/\/v1$/i,'');
    url=base+'/v1/audio/speech';
  }
  const response=await dsFetchTimeout(url,{
    method:'POST',
    headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
    body:JSON.stringify({
      model:cfg.openaiModel||'gpt-4o-mini-tts',
      input:text,
      voice:voiceId||'alloy',
      response_format:cfg.openaiFormat||'mp3',
      speed:Number(cfg.speed||1)
    })
  });
  if(!response.ok)throw new Error('OpenAI／兼容 TTS HTTP '+response.status+'：'+(await response.text()).slice(0,220));
  return response.blob();
}
async function dsCallCustom(text,cfg,voiceId){
  const url=String(cfg.customUrl||'').trim();
  if(!url)throw new Error('自定义 TTS URL 未配置');
  let headers={'Content-Type':'application/json'};
  try{headers={...headers,...JSON.parse(cfg.customHeaders||'{}')}}
  catch(_){throw new Error('自定义 Headers 不是有效 JSON')}
  if(cfg.customKey&&!headers.Authorization&&!headers['x-api-key'])headers.Authorization='Bearer '+cfg.customKey;
  const bodyText=String(cfg.customBody||'{"text":"{{text}}"}')
    .replaceAll('{{text}}',String(text).replace(/\\/g,'\\\\').replace(/"/g,'\\"'))
    .replaceAll('{{voice_id}}',String(voiceId||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"'))
    .replaceAll('{{speed}}',String(Number(cfg.speed||1)));
  let body;
  try{body=JSON.parse(bodyText)}catch(_){throw new Error('自定义 Body 模板生成后不是有效 JSON')}
  const response=await dsFetchTimeout(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!response.ok)throw new Error('自定义 TTS HTTP '+response.status+'：'+(await response.text()).slice(0,220));
  if(cfg.customResponseType==='json'){
    const data=await response.json();
    const audio=dsJsonPath(data,cfg.customJsonPath||'audio');
    if(!audio)throw new Error('自定义 TTS JSON 中没有找到音频字段');
    if(/^https?:/i.test(String(audio))){
      const audioResponse=await fetch(audio);
      if(!audioResponse.ok)throw new Error('自定义音频 URL 无法读取');
      return audioResponse.blob();
    }
    return dsBase64Blob(audio);
  }
  return response.blob();
}
async function dsSynthesize(rawText,force=false){
  const cfg=dsTtsConfig();
  if(!cfg.enabled&&!force)return null;
  const spokenText=dsCleanSpokenText(rawText);
  if(!spokenText)return{ttsStatus:'skipped',spokenText:''};
  const voiceId=dsVoiceId(cfg);
  let blob;
  if(cfg.provider==='elevenlabs')blob=await dsCallElevenLabs(spokenText,cfg,voiceId);
  else if(cfg.provider==='camb')blob=await dsCallCamb(spokenText,cfg,voiceId);
  else if(cfg.provider==='openai')blob=await dsCallOpenAI(spokenText,cfg,voiceId);
  else if(cfg.provider==='custom')blob=await dsCallCustom(spokenText,cfg,voiceId);
  else blob=await dsCallMiniMax(spokenText,cfg,voiceId);
  const stored=await dsStoreAudio(blob,cfg.provider||'TTS');
  return{
    audioKey:stored.audioKey,
    spokenText,
    ttsProvider:cfg.provider,
    ttsStatus:'ready',
    ttsDuration:stored.duration,
    ttsMime:stored.mime,
    ttsSize:stored.size,
    browserDecoded:true
  };
}
async function dsPlayVoice(key,button,force=false){
  if(!key)return;
  if(!force&&!dsTtsConfig().enabled)throw new Error('语音播放已关闭');
  try{
    if(button){button.classList.add('loading');button.textContent='载入中…'}
    const url=await dsGetAudioUrl(key);
    if(dsttsPlayer){try{dsttsPlayer.pause()}catch(_){}}
    const audio=new Audio();
    audio.preload='auto';
    audio.src=url;
    dsttsPlayer=audio;
    await dsWaitAudioReady(audio);
    if(button){button.classList.remove('loading');button.classList.add('playing');button.textContent='■ 播放中'}
    audio.onended=()=>{if(button){button.classList.remove('playing');button.textContent='▶ 重播'}};
    audio.onerror=()=>{if(button){button.classList.remove('playing');button.textContent='▶ 重播'}};
    await audio.play();
  }catch(e){
    if(button){button.classList.remove('loading','playing');button.textContent='▶ 重播'}
    throw e;
  }
}

async function dsGenerateVerifiedVoice(rawText,force=false){
  const voice=await dsSynthesize(rawText,force);
  if(!voice)return null;
  if(voice.ttsStatus==='skipped')return voice;
  if(
    !voice.audioKey||
    voice.browserDecoded!==true||
    !(Number(voice.ttsDuration)>0)||
    !voice.ttsMime||
    !(Number(voice.ttsSize)>0)
  ){
    throw new Error('语音未通过与测试语音相同的实际可播放验证');
  }
  return {
    ...voice,
    verifiedPipeline:'heart_byte_tts_shared_verified_v1'
  };
}
async function dsPlayVerifiedVoice(key,button,force=false){
  if(!key)throw new Error('没有可播放的语音编号');
  return dsPlayVoice(key,button,force);
}

const DS_TOKEN_PARAM_PREF=Object.create(null);
function dsDefaultTokenParam(model){
  const m=String(model||'').toLowerCase();
  return /(^|[-_.])(gpt-5|o1|o3|o4)([-_.]|$)/.test(m)
    ?'max_completion_tokens'
    :'max_tokens';
}
function dsTokenParamUnsupported(raw,param){
  const t=String(raw||'').toLowerCase();
  const p=String(param||'').toLowerCase();
  return t.includes(p)&&(
    t.includes('unsupported parameter')||
    t.includes('not supported')||
    t.includes('unknown parameter')||
    t.includes('unrecognized parameter')||
    t.includes('unrecognised parameter')||
    t.includes('invalid parameter')||
    t.includes('extra inputs are not permitted')
  );
}
async function dsChatCompletionCompat(endpoint,{
  headers={},
  baseBody={},
  maxTokens=1000,
  timeoutMs=0,
  signal=null,
  scope='chat'
}={}){
  const model=String(baseBody?.model||'');
  const cacheKey=scope+'|'+endpoint+'|'+model;
  const preferred=DS_TOKEN_PARAM_PREF[cacheKey]||dsDefaultTokenParam(model);
  const order=[
    preferred,
    preferred==='max_tokens'?'max_completion_tokens':'max_tokens'
  ];
  let last=null;
  for(let i=0;i<order.length;i++){
    const tokenParam=order[i];
    const options={
      method:'POST',
      headers,
      body:JSON.stringify({
        ...baseBody,
        [tokenParam]:Number(maxTokens)
      }),
      ...(signal?{signal}:{})
    };
    const response=timeoutMs>0
      ?await fetchWithTimeout(endpoint,options,timeoutMs)
      :await fetch(endpoint,options);
    const raw=await response.text();
    let data;
    try{data=JSON.parse(raw)}catch(_){data={raw}}
    last={response,raw,data,tokenParam};
    if(response.ok){
      DS_TOKEN_PARAM_PREF[cacheKey]=tokenParam;
      window.__DS_LAST_TOKEN_PARAM__=tokenParam;
      return last;
    }
    if(i===0&&dsTokenParamUnsupported(raw,tokenParam))continue;
    return last;
  }
  return last;
}

async function callTextVisual(kind,slot){
  if(slot.description?.trim())return slot.description.trim();
  const cfg=state.settings.textApi,key=textApiKey();
  if(!cfg.baseUrl||!cfg.model){
    throw new Error('请先填写文本 API 的 Base URL 和模型');
  }

  const sys='You write one concise final English image prompt for a high-end Korean webtoon romance visual style. Return only the final prompt. No reasoning, no markdown, no JSON, no explanation. Prioritize a beautiful stable face, correct anatomy, identity consistency, clean composition and subtle emotion. Never introduce action poses, dramatic perspective, visible hands, extra limbs or duplicate facial features.';
  const user=kind==='portrait'
    ?`Create one precise full-color Korean manhwa-style romance webtoon bust portrait prompt. The art style should feel like a polished Korean romance webtoon / manhwa: beautiful face, slim elegant features, glossy eyes, soft skin shading, clean line art, fashionable styling, delicate lips, refined modern illustration quality. Character name: ${state.character.name}. Personality: ${state.character.personality}. Speech style: ${state.character.speech}. Life background: ${state.character.background}. Appearance: ${state.character.appearance}. Emotion label: ${slot.name}. Use a stable chest-up composition at eye level, mild three-quarter or front-facing angle, straight neck, naturally connected shoulders, balanced facial proportions, symmetrical eyes, clean nose and mouth, attractive polished face, subtle expression only through eyes, brows and lips. Keep both hands and forearms completely outside the frame. No action pose, no extreme perspective, no fisheye, no tilted body, no environment. Solid pure white background #FFFFFF.`
    :`Create one precise full-color Korean webtoon background prompt. World/life background: ${state.character.background}. Background label: ${slot.name}. Pure environment scene only. Describe architecture, room, weather, lighting, objects, plants, time and atmosphere. Absolutely no people, no character, no silhouette, no human reflection, no human action.`;

  let last=null;
  for(const endpoint of completionEndpoints(cfg.baseUrl)){
    try{
      const headers={'Content-Type':'application/json'};
      if(key)headers.Authorization='Bearer '+key;
      const result=await dsChatCompletionCompat(endpoint,{
        headers,
        baseBody:{
          model:cfg.model,
          messages:[
            {role:'system',content:sys},
            {role:'user',content:user}
          ],
          temperature:.35
        },
        maxTokens:Number(cfg.maxTokens||1000),
        timeoutMs:90000,
        scope:'text-visual'
      });

      const r=result.response,raw=result.raw,data=result.data;
      if(!r.ok){
        last=new Error(
          data?.error?.message||
          data?.message||
          raw.slice(0,320)||
          '文本 API 请求失败'
        );
        continue;
      }

      const content=extractApiText(data);
      if(content)return content;
      last=new Error('文本 API 没有在 message/content 返回清楚的描述词');
    }catch(e){
      last=e;
    }
  }
  throw last||new Error('文本 API 请求失败');
}
async function callImageVisual(prompt,kind){const cfg=state.settings.imageApi,key=imageApiKey(),size=kind==='portrait'?cfg.portraitSize:cfg.backgroundSize;if(!cfg.baseUrl||!cfg.model)throw new Error('请先填写生图 API 的 Base URL 和模型');const endpoints=imageEndpoints(cfg.baseUrl);if(!endpoints.length)throw new Error('生图 API 地址为空');let last=null;const headers={'Content-Type':'application/json','Accept':'application/json'};if(key)headers.Authorization='Bearer '+key;
if(kind==='portrait'&&state.visuals.referenceKeys.length){const refs=[];for(const k of state.visuals.referenceKeys.slice(0,6)){const d=await assetGet(k).catch(()=>null);if(d)refs.push(d)}if(refs.length){const endpoint=endpoints[0];try{const payload={model:cfg.model,prompt,n:1,size,images:refs};const r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify(payload)},180000);const raw=await r.text();let data;try{data=raw?JSON.parse(raw):{}}catch{data={raw}}if(r.ok){const src=extractImageSource(data);if(src)return src;last=new Error(`参考图请求成功但没有图片字段。地址：${endpoint}；返回：${raw.slice(0,350)}`)}else last=new Error(`参考图模式失败（HTTP ${r.status}）\n地址：${endpoint}\n返回：${data?.error?.message||raw.slice(0,500)}`)}catch(e){last=e}notify('参考图模式首次失败，已改按外貌和描述词生成')}}
for(const endpoint of endpoints){const payloads=[{model:cfg.model,prompt,n:1,size},{model:cfg.model,prompt,n:1}];for(let pi=0;pi<payloads.length;pi++){try{const payload=payloads[pi],r=await fetchWithTimeout(endpoint,{method:'POST',headers,body:JSON.stringify(payload)},180000),raw=await r.text();let data;try{data=raw?JSON.parse(raw):{}}catch{data={raw}}if(!r.ok){const msg=data?.error?.message||data?.message||raw.slice(0,500)||`HTTP ${r.status}`;last=new Error(`生图接口失败（HTTP ${r.status}）\n实际请求：${endpoint}\n请求字段：${Object.keys(payload).join('、')}\n接口返回：${msg}`);if(pi===0&&/size|尺寸|resolution|unsupported/i.test(msg))continue;break}const src=extractImageSource(data);if(src)return src;last=new Error(`生图 API 已返回成功状态，但没有找到图片字段。\n实际请求：${endpoint}\n返回前500字：${raw.slice(0,500)}`);break}catch(e){last=e?.name==='AbortError'?new Error(`生图请求超时或被取消。实际请求：${endpoint}`):e;break}}}
throw last||new Error('生图 API 请求失败')}
async function generateVisual(kind,id){if(runtime.generating)return;saveVisualMeta();const slot=visualSlot(kind,id);if(!slot)return;runtime.generating=true;studioStatus(`正在生成：${slot.name}\n第一步：准备专属描述词…`);try{const desc=await callTextVisual(kind,slot);studioStatus(`正在生成：${slot.name}\n第二步：生图 API 正在生成彩图…`);const fixed=kind==='portrait'?`HIGH-PRIORITY PORTRAIT RULES: Create one beautiful, polished, high-end Korean manhwa-style romance webtoon character bust. Chest-up portrait only, eye-level camera, front-facing or mild three-quarter view, centered head and shoulders, upright natural posture. The face must be clean and attractive with balanced proportions, two symmetrical eyes, one natural nose, one mouth, correctly shaped ears, a normal neck and shoulders connected naturally to the torso. Keep both hands, forearms and elbows completely outside the frame. Preserve the same identity, hairstyle, hair color, eye color, skin tone, clothing design and age impression from the character description and any supplied reference images. Expression must be subtle and match ${slot.name}, shown mainly through eyes, eyebrows and lips. One character only. No full body. No action pose. No dramatic angle. No fisheye. No foreshortening. No tilted neck. No twisted torso. No asymmetrical face. No crossed eyes. No duplicate face. No extra eyes. No extra limbs. No malformed shoulders. No deformed hands. No text. No speech bubble. No props covering the face. No environment. Character name: ${state.character.name}. Personality: ${state.character.personality}. Appearance: ${state.character.appearance}. Render with refined Korean webtoon linework, polished manhwa coloring, soft luminous skin shading, glossy expressive eyes, elegant romance-comic rendering, subtle blush, delicate lips, attractive hairstyle rendering and premium commercial webtoon quality. Put the character in front of a flat, uniform, pure white background #FFFFFF with no gradient, no texture, no pattern and no cast shadow behind the character. ${desc} FINAL CHECK: stable beautiful face, correct anatomy, normal neck and shoulders, hands outside frame, single character, plain white background.`:`Premium full-color Korean webtoon background art. Pure environment only. No people, no character, no silhouette, no human reflection, no human action, no text. Background name: ${slot.name}. ${desc}`;const src=await callImageVisual(fixed,kind);let data=await imageSourceToDataURL(src);if(kind==='portrait')data=await processPortraitDataURL(data,'whiteOnly');else{const blob=await fetch(data).then(r=>r.blob()).catch(()=>null);if(blob&&blob.size>2200000)data=await new Promise(resolve=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas'),scale=Math.min(1,1280/img.width,960/img.height);c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',.88))};img.src=data})}const key=slot.assetKey||`visual:${kind}:${id}`;await assetSet(key,data);slot.assetKey=key;slot.hasImage=true;if(kind==='portrait')state.visuals.currentPortrait=id;else state.visuals.currentBackground=id;save(false);await renderVisualLayers();renderStudio();studioStatus(`${slot.name} 已生成并直接保存到当前角色存档。`);notify('生成完成')}catch(e){studioStatus(`生成失败：${friendlyError(e)}`);notify('生成失败')}finally{runtime.generating=false}}

function saveTtsSettings(){
  const cfg=dsReadTtsForm();
  state.settings.tts=cfg;
  dsSaveSharedTts(cfg);
  if(!cfg.enabled&&dsttsPlayer){try{dsttsPlayer.pause()}catch(_){}}
  save(true);
  notify(cfg.enabled?'语音接入已开启':'语音接入已关闭');
  renderSettings();
}
async function testTts(){
  const box=$('#ttsResult');
  if(!box)return;
  try{
    const cfg=dsReadTtsForm();
    state.settings.tts=cfg;
    dsSaveSharedTts(cfg);
    box.textContent='正在生成测试语音……';
    const voice=await dsGenerateVerifiedVoice('“你好，这是角色语音接入测试。”',true);
    if(!voice?.audioKey||voice.browserDecoded!==true||!(Number(voice.ttsDuration)>0)){
      throw new Error('音频没有通过浏览器实际解码检查');
    }
    const seconds=Number(voice.ttsDuration).toFixed(2);
    const sizeKb=Math.max(1,Math.round(Number(voice.ttsSize||0)/1024));
    box.innerHTML=`测试成功｜浏览器已实际解码<br>时长 ${seconds} 秒｜${esc(voice.ttsMime||'audio')}｜${sizeKb} KB<br><button type="button" class="voice-play-btn nav-item" data-tts-action="play" data-tts-force="1" data-voice-key="${esc(voice.audioKey)}">▶ 播放测试语音</button>`;
  }catch(e){
    box.textContent='测试失败：'+friendlyError(e);
  }
}

async function sendTalk(prefill=''){
  if(runtime.typing)return;
  const input=$('#chatInput');
  const text=(prefill||input?.value||'').trim();
  if(!text){notify('还没有输入内容');return}
  if(input){input.value='';input.blur()}

  addMessage('user',text);
  deriveMemory(text);
  state.stats.talks++;
  adjustRelation({familiarity:1,trust:text.length>35?1:0});
  runtime.typing=true;
  renderTalk();

  let reply='',source='local',visual=null;
  try{
    if(state.settings.api.enabled){
      const bundle=await onlineReplyBundle(text);
      reply=bundle.reply;
      visual=bundle;
      source='api';
    }else reply=localReply(text);
  }catch(e){
    console.error(e);
    const err=friendlyError(e);
    if(state.settings.api.fallback){
      reply=`（在线接口没有成功返回内容。为避免错误套用旧的本地默认人设，本次没有生成角色回复。）\n${err}`;
    }else reply=`接口没有成功返回角色回复：${err}`;
  }

  reply=String(reply||'……').trim().slice(0,1800);
  const replyParts=splitRoleReply(reply).map(part=>
    source==='api'?dsEnsureChineseQuotedRoleMessage(part):part
  );
  const prepared=[];
  const ttsCfg=dsTtsConfig();

  const prepareOne=async part=>{
    let meta={};
    if(ttsCfg.enabled){
      try{
        const voice=await dsGenerateVerifiedVoice(part,false);

async function onlineReplyBundle(text){
  const a=state.settings.api,key=apiKey();
  if(!a.baseUrl||!a.model)throw new Error('请填写 Base URL 和模型');

  runtime.apiController=new AbortController();
  const headers={'Content-Type':'application/json'};
  if(key)headers.Authorization=`Bearer ${key}`;
  const useVisual=a.autoVisualSwitch!==false;

  const result=await dsChatCompletionCompat(
    chatEndpoint(a.baseUrl),
    {
      headers,
      baseBody:{
        model:a.model,
        messages:[
          {
            role:'system',
            content:useVisual?visualSystemPrompt():systemPrompt()
          },
          {
            role:'user',
            content:text
          }
        ],
        temperature:Number(a.temperature)
      },
      maxTokens:Number(a.maxTokens),
      signal:runtime.apiController.signal,
      scope:'normal-chat'
    }
  );

  const res=result.response,raw=result.raw,data=result.data;
  if(!res.ok){
    throw new Error(
      data?.error?.message||
      data?.message||
      raw.slice(0,320)||
      `HTTP ${res.status}`
    );
  }

  const content=
    data?.choices?.[0]?.message?.content||
    data?.choices?.[0]?.text||
    data?.output_text||
    '';

  if(!useVisual){
    return{
      reply:String(content).trim(),
      status_text:'',
      mood:'',
      activity:'',
      portrait_id:'KEEP',
      portrait_change:false,
      background_id:'KEEP',
      background_change:false,
      scene_changed:false
    };
  }

  const parsed=parseStrictJSON(content);
  if(!parsed||typeof parsed.reply!=='string'){
    return{
      reply:String(content).trim(),
      status_text:'',
      mood:'',
      activity:'',
      portrait_id:'KEEP',
      portrait_change:false,
      background_id:'KEEP',
      background_change:false,
      scene_changed:false
    };
  }

  return{
    reply:parsed.reply.trim(),
    status_text:String(parsed.status_text||'').trim(),
    mood:String(parsed.mood||'').trim(),
    activity:String(parsed.activity||'').trim(),
    portrait_id:String(parsed.portrait_id||'KEEP'),
    portrait_change:
      parsed.portrait_change===true||
      String(parsed.portrait_change).toLowerCase()==='true',
    background_id:String(parsed.background_id||'KEEP'),
    background_change:
      parsed.background_change===true||
      String(parsed.background_change).toLowerCase()==='true',
    scene_changed:
      parsed.scene_changed===true||
      String(parsed.scene_changed).toLowerCase()==='true'
  };
}

/* 手机端小屏拖动滚动兜底：仅在产生明显纵向拖动时接管，不改变按钮点击功能 */
(function enableTouchScreenDragScroll(){
  const screen=document.getElementById('touchScreen');
  const content=document.getElementById('touchContent');
  if(!screen||!content)return;
  let active=null,startY=0,lastY=0,moved=false;
  const canScroll=el=>el&&el.scrollHeight>el.clientHeight+1;
  const pickScrollTarget=target=>{
    const own=target?.closest?.('.chat-log,.modal-card,.dialogue,.studio-status,.touch-content');
    if(canScroll(own))return own;
    const chat=document.getElementById('chatLog');
    if(canScroll(chat))return chat;
    if(canScroll(content))return content;
    const modal=document.querySelector('.modal-card');
    if(canScroll(modal))return modal;
    return null;
  };
  screen.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    const target=e.target;
    if(target?.closest?.('input,textarea,select,[contenteditable="true"]')){active=null;return;}
    active=pickScrollTarget(target);
    startY=lastY=e.touches[0].clientY;
    moved=false;
  },{passive:true,capture:true});
  screen.addEventListener('touchmove',e=>{
    if(!active||e.touches.length!==1)return;
    const y=e.touches[0].clientY;
    const total=y-startY;
    if(!moved&&Math.abs(total)<5)return;
    moved=true;
    const delta=lastY-y;
    lastY=y;
    const before=active.scrollTop;
    active.scrollTop+=delta;
    if(active.scrollTop!==before||canScroll(active))e.preventDefault();
  },{passive:false,capture:true});
  screen.addEventListener('touchend',e=>{
    if(moved){
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation?.();
    }
    active=null;
    moved=false;
  },{passive:false,capture:true});
  screen.addEventListener('touchcancel',()=>{active=null;moved=false},{passive:true,capture:true});
})();

function createBottomMount(html){const mount=document.createElement('div');mount.className='cartridge-screen-mount';const frame=document.createElement('iframe');frame.className='cartridge-bottom-frame';frame.title='卡带下屏';frame.setAttribute('allow','clipboard-read; clipboard-write');frame.srcdoc=injectBottom(html);mount.appendChild(frame);const mark=document.createElement('span');mark.className='cartridge-running-mark';mark.textContent='CARTRIDGE';mount.appendChild(mark);bottomScreen.appendChild(mount);return{mount,frame}}
function escapeCardText(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function fitHostRouteCards(track){
  if(!track)return;
  const usableH=Math.max(120,Math.min(205,track.clientHeight-12));
  track.querySelectorAll('.cartridge-route-card').forEach(card=>{
    const img=card.querySelector('img');if(!img)return;
    const apply=()=>{
      const ratio=(img.naturalWidth>0&&img.naturalHeight>0)?img.naturalWidth/img.naturalHeight:.704;
      const h=usableH,w=Math.max(76,Math.min(160,Math.round(h*ratio)));
      card.style.height=h+'px';card.style.width=w+'px';card.style.flexBasis=w+'px';
    };
    if(img.complete)apply();else img.addEventListener('load',apply,{once:true});
  });
}
function bindHostRouteTrack(track){
  if(!track||track.dataset.freeRowBound==='1')return;
  track.dataset.freeRowBound='1';
  let active=false,id=null,startX=0,startY=0,startScroll=0,moved=false,horizontal=false;
  const begin=(x,y,pid)=>{active=true;id=pid;startX=x;startY=y;startScroll=track.scrollLeft;moved=false;horizontal=false;track.classList.add('dragging')};
  const move=(x,y,e)=>{if(!active)return;const dx=x-startX,dy=y-startY;if(!horizontal&&Math.abs(dx)>5&&Math.abs(dx)>Math.abs(dy))horizontal=true;if(!horizontal)return;moved=true;track.scrollLeft=startScroll-dx;if(e?.cancelable)e.preventDefault()};
  const end=()=>{if(!active)return;active=false;id=null;track.classList.remove('dragging');if(moved){topView.__routeSwipeLockUntil=Date.now()+450}};
  if(window.PointerEvent){
    track.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse'&&e.button!==0)return;begin(e.clientX,e.clientY,e.pointerId);try{track.setPointerCapture(e.pointerId)}catch(_){}});
    track.addEventListener('pointermove',e=>{if(active&&id===e.pointerId)move(e.clientX,e.clientY,e)},{passive:false});
    track.addEventListener('pointerup',e=>{if(id===e.pointerId)end()});
    track.addEventListener('pointercancel',end);
  }else{
    track.addEventListener('touchstart',e=>{if(e.touches.length===1)begin(e.touches[0].clientX,e.touches[0].clientY,'touch')},{passive:true});
    track.addEventListener('touchmove',e=>{if(active&&e.touches.length===1)move(e.touches[0].clientX,e.touches[0].clientY,e)},{passive:false});
    track.addEventListener('touchend',end,{passive:true});
    track.addEventListener('touchcancel',end,{passive:true});
  }
  fitHostRouteCards(track);
}
function renderRouteSelector(s){
  if(!topView)return;
  const select=topView.querySelector('.cartridge-route-select'),track=select.querySelector('.cartridge-route-track');
  const routes=Array.isArray(s.routes)?s.routes:[],selected=s.selectedRouteId||routes[0]?.id||'';
  const sig=routes.map(r=>r.id).join('|');
  if(track.dataset.sig!==sig){
    track.innerHTML=routes.map(r=>`<button type="button" class="cartridge-route-card ${r.id===selected?'active':''}" data-route-id="${escapeCardText(r.id)}" aria-label="选择 ${escapeCardText(r.name)}"><img src="${r.coverSrc||''}" alt="${escapeCardText(r.name)}"><span class="cartridge-route-info"><b>${escapeCardText(r.name)} · ${escapeCardText(r.age)}</b><small>${escapeCardText(r.archetype)}<br>${escapeCardText(r.occupation)}</small></span></button>`).join('');
    track.dataset.sig=sig;
    requestAnimationFrame(()=>{bindHostRouteTrack(track);fitHostRouteCards(track);track.querySelector(`[data-route-id="${selected}"]`)?.scrollIntoView({behavior:'auto',inline:'nearest',block:'nearest'})});
  }else{
    track.querySelectorAll('.cartridge-route-card').forEach(card=>card.classList.toggle('active',card.dataset.routeId===selected));
  }
  bindHostRouteTrack(track);fitHostRouteCards(track);
  select.hidden=false;

function compactCartridgeDialogueText(value){
  return String(value||'')
    .replace(/\r/g,'')
    .replace(/[ \t]*\n[ \t]*/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}


const cartridgeTopVoiceState={
  key:'',
  url:'',
  audio:null,
  sourceReady:false,
  error:'',
  requestedAt:0
};

function clearCartridgeTopVoiceAudio(){
  const state=cartridgeTopVoiceState;

  if(state.audio){
    try{state.audio.pause()}catch(_){}
    try{
      state.audio.removeAttribute('src');
      state.audio.remove();
    }catch(_){}
  }

  if(state.url){
    try{URL.revokeObjectURL(state.url)}catch(_){}
  }

  state.key='';
  state.url='';
  state.audio=null;
  state.sourceReady=false;
  state.error='';
  state.requestedAt=0;
}

function cartridgeTopVoiceButton(){
  return topView?.querySelector?.('.cartridge-top-voice')||null;
}

function requestCurrentCartridgeVoice(){
  const now=Date.now();
  if(now-Number(cartridgeTopVoiceState.requestedAt||0)<450)return;
  cartridgeTopVoiceState.requestedAt=now;

  bottomFrame?.contentWindow?.postMessage({
    type:'HB_CARTRIDGE_COMMAND',
    command:'requestCurrentVoice'
  },'*');
}

function updateCartridgeTopVoiceButton(button,key,status,error=''){
  if(!button)return;

  button.dataset.voiceKey=key||'';
  button.dataset.audioReady=status==='ready'?'1':'0';

  if(status==='ready'){
    button.hidden=false;
    button.disabled=false;
    button.textContent='▶ 播放';
    button.classList.remove('loading','playing');
    button.title='点击播放角色语音';
  }else if(status==='waiting'){
    button.hidden=false;
    button.disabled=true;
    button.textContent='语音同步中…';
    button.classList.add('loading');
    button.classList.remove('playing');
    button.title='正在从卡带接收当前角色语音';
  }else if(status==='error'){
    button.hidden=false;
    button.disabled=true;
    button.textContent='语音同步失败';
    button.classList.remove('loading','playing');
    button.title=error||'没有收到可播放音频';
  }else{
    button.hidden=true;
    button.disabled=true;
    button.textContent='▶ 播放';
    button.classList.remove('loading','playing');
    button.title='';
  }
}

function installCartridgeTopVoiceSource(button,key,voice={}){
  key=String(key||'');
  if(!button||!key)return false;

  let blob=null;
  const buffer=voice.audioBuffer;
  const transferredBlob=voice.audioBlob;
  const mime=String(
    voice.ttsMime||
    transferredBlob?.type||
    'audio/mpeg'
  );

  if(buffer instanceof ArrayBuffer){
    blob=new Blob([buffer],{type:mime});
  }else if(ArrayBuffer.isView(buffer)){
    blob=new Blob(
      [buffer.buffer.slice(
        buffer.byteOffset,
        buffer.byteOffset+buffer.byteLength
      )],
      {type:mime}
    );
  }else if(
    transferredBlob&&
    typeof transferredBlob.size==='number'&&
    transferredBlob.size>0
  ){
    blob=transferredBlob;
  }

  if(!blob||blob.size<16){
    updateCartridgeTopVoiceButton(
      button,
      key,
      'waiting'
    );
    requestCurrentCartridgeVoice();
    return false;
  }

  clearCartridgeTopVoiceAudio();

  const url=URL.createObjectURL(blob);
  const audio=document.createElement('audio');
  audio.preload='none';
  audio.playsInline=true;
  audio.setAttribute('playsinline','');
  audio.setAttribute('webkit-playsinline','');
  audio.style.position='fixed';
  audio.style.width='1px';
  audio.style.height='1px';
  audio.style.opacity='0';
  audio.style.pointerEvents='none';
  audio.src=url;
  document.body.appendChild(audio);

  cartridgeTopVoiceState.key=key;
  cartridgeTopVoiceState.url=url;
  cartridgeTopVoiceState.audio=audio;
  cartridgeTopVoiceState.sourceReady=true;
  cartridgeTopVoiceState.error='';
  cartridgeTopVoiceState.requestedAt=0;

  audio.addEventListener('error',()=>{
    cartridgeTopVoiceState.error='浏览器无法读取这段角色语音';
  });

  updateCartridgeTopVoiceButton(
    button,
    key,
    'ready'
  );
  return true;
}

function playPreparedCartridgeTopVoice(button){
  const state=cartridgeTopVoiceState;
  const key=String(button?.dataset?.voiceKey||'');

  if(
    !button||
    !key||
    state.key!==key||
    !state.sourceReady||
    !state.audio
  ){
    notify('这条语音仍在同步，请稍等一下');
    requestCurrentCartridgeVoice();
    return;
  }

  const audio=state.audio;

  if(dsttsPlayer&&dsttsPlayer!==audio){
    try{dsttsPlayer.pause()}catch(_){}
  }
  dsttsPlayer=audio;

  try{
    audio.muted=false;
    audio.volume=1;

    if(!audio.paused||audio.currentTime>0){
      audio.pause();
      try{audio.currentTime=0}catch(_){}
    }

    button.classList.remove('loading');
    button.classList.add('playing');
    button.textContent='■ 播放中';

    audio.onended=()=>{
      button.classList.remove('playing');
      button.textContent='▶ 重播';
    };

    audio.onerror=()=>{
      button.classList.remove('playing');
      button.textContent='▶ 重播';
      notify(
        '播放失败：'+(
          state.error||
          '浏览器无法播放这段角色语音'
        )
      );
    };

    // No await, no IndexedDB and no pre-decode step.
    // audio.play() runs synchronously in the user's tap event.
    const playPromise=audio.play();

    if(
      playPromise&&
      typeof playPromise.then==='function'
    ){
      playPromise.then(()=>{
        button.classList.add('playing');
      }).catch(error=>{
        button.classList.remove('playing');
        button.textContent='▶ 重播';

        const name=String(error?.name||'');
        if(name==='NotAllowedError'){
          notify('播放被 iPhone 拦截，请再点击一次播放按钮');
        }else if(name==='NotSupportedError'){
          notify('播放失败：当前浏览器不支持这段音频格式');
        }else{
          notify('播放失败：'+friendlyError(error));
        }
      });
    }
  }catch(error){
    button.classList.remove('playing');
    button.textContent='▶ 重播';
    notify('播放失败：'+friendlyError(error));
  }
}
function applySnapshot(s){
  if(!topView||!s)return;
  const cover=topView.querySelector('.cartridge-top-cover');
  const bg=topView.querySelector('.cartridge-top-bg');
  const portrait=topView.querySelector('.cartridge-top-portrait');
  const select=topView.querySelector('.cartridge-route-select');
  const dialogue=topView.querySelector('.cartridge-top-dialogue');
  const voiceButton=dialogue.querySelector('.cartridge-top-voice');

  if(s.mode==='routeSelect'){
    cover.hidden=true;
    bg.hidden=true;
    portrait.hidden=true;
    dialogue.classList.add('hidden');
    voiceButton.hidden=true;
    voiceButton.dataset.voiceKey='';
    renderRouteSelector(s);
    topView.querySelector('.route').textContent='选择攻略男主';
    topView.querySelector('.status').textContent='左右滑动 · 点击选择';
    return;
  }

  select.hidden=true;
  if(s.mode==='cover'){
    cover.src=s.coverSrc||'';
    cover.style.objectFit='contain';
    cover.style.objectPosition='center top';
    cover.style.background='#171923';
    cover.hidden=false;
    bg.hidden=true;
    portrait.hidden=true;
  }else{
    bg.src=s.bgSrc||'';
    portrait.src=s.portraitSrc||'';
    cover.hidden=true;
    bg.hidden=false;
    portrait.hidden=false;
  }

  topView.querySelector('.route').textContent=s.routeChip||'';
  topView.querySelector('.status').textContent=s.statusChip||'';
  dialogue.classList.toggle('hidden',!s.dialogue?.show);
  dialogue.querySelector('b').textContent=s.dialogue?.name||'';
  dialogue.querySelector('.text').textContent=compactCartridgeDialogueText(s.dialogue?.text||'');
  dialogue.querySelector('.cartridge-top-arrow')
    .classList.toggle('end',!s.dialogue?.hasMore);

  const audioKey=String(s.dialogue?.audioKey||'');
  const canPlay=!!(
    s.dialogue?.show&&
    s.dialogue?.ttsEnabled!==false&&
    audioKey
  );

  voiceButton.dataset.ttsProvider=s.dialogue?.ttsProvider||'';
  voiceButton.dataset.ttsDuration=String(Number(s.dialogue?.ttsDuration||0));

  if(canPlay){
    if(
      cartridgeTopVoiceState.key===audioKey&&
      cartridgeTopVoiceState.sourceReady&&
      cartridgeTopVoiceState.audio
    ){
      updateCartridgeTopVoiceButton(
        voiceButton,
        audioKey,
        'ready'
      );
    }else{
      updateCartridgeTopVoiceButton(
        voiceButton,
        audioKey,
        'waiting'
      );
      requestCurrentCartridgeVoice();
    }
  }else{
    if(cartridgeTopVoiceState.key){
      clearCartridgeTopVoiceAudio();
    }
    updateCartridgeTopVoiceButton(
      voiceButton,
      '',
      'hidden'
    );
  }
}
function applyCartridgeVoiceReady(voice){
  if(!topView||!voice?.audioKey)return;
  const dialogue=topView.querySelector('.cartridge-top-dialogue');
  const button=dialogue?.querySelector('.cartridge-top-voice');
  if(!dialogue||!button)return;
  if(voice.ttsEnabled===false){
    button.hidden=true;
    button.dataset.voiceKey='';
    return;
  }

  const currentName=dialogue.querySelector('b')?.textContent||'';
  const currentText=compactCartridgeDialogueText(dialogue.querySelector('.text')?.textContent||'');
  if(voice.name&&currentName&&voice.name!==currentName)return;
  if(voice.text&&currentText&&compactCartridgeDialogueText(voice.text)!==currentText)return;

  button.dataset.ttsProvider=voice.ttsProvider||'';
  button.dataset.ttsDuration=String(Number(voice.ttsDuration||0));
  button.dataset.voiceSyncVersion=String(voice.voiceSyncVersion||3);

  const installed=installCartridgeTopVoiceSource(
    button,
    String(voice.audioKey),
    voice
  );

  if(!installed){
    console.warn(
      '卡带语音事件没有包含可用二进制，将请求重新发送'
    );
  }
}

async function openCard(html){
  if(typeof html!=='string'){
    const stored=await ensureCache();
    html=stored.html;
  }
  if(!html){await showMenu();return}
  try{parseMeta(html)}
  catch(e){alert(e.message||'卡带无法启动');return}

  closeCard(false);
  topMount=createTopMount();
  topView=topMount.querySelector('.cartridge-top-view');
  const b=createBottomMount(html);
  bottomMount=b.mount;
  bottomFrame=b.frame;
  running=true;
  hideMenu();
  btn.textContent='■ 退出卡带';
  btn.classList.add('running');

  const mirroredDialogue=topView.querySelector('.cartridge-top-dialogue');
  const mirroredVoiceButton=mirroredDialogue.querySelector('.cartridge-top-voice');
  let topDialogueTouchAt=0;
  let topVoiceTouchAt=0;

  const playMirroredVoice=e=>{
    if(e.type==='click'&&Date.now()-topVoiceTouchAt<700)return;
    if(e.type==='pointerup'&&e.pointerType!=='mouse'){
      topVoiceTouchAt=Date.now();
      e.preventDefault();
    }
    e.stopPropagation();
    e.stopImmediatePropagation?.();

    const key=mirroredVoiceButton.dataset.voiceKey;
    if(!key){
      notify('这条角色信息暂时没有可播放语音');
      return;
    }

    playPreparedCartridgeTopVoice(mirroredVoiceButton);
  };

  if(window.PointerEvent){
    mirroredVoiceButton.addEventListener(
      'pointerup',
      playMirroredVoice,
      {passive:false}
    );
  }
  mirroredVoiceButton.addEventListener('click',playMirroredVoice);

  const handleMirroredDialogue=e=>{
    if(e.target.closest?.('.cartridge-top-voice'))return;
    if(e.type==='click'&&Date.now()-topDialogueTouchAt<650)return;
    if(e.type==='pointerup'&&e.pointerType!=='mouse'){
      topDialogueTouchAt=Date.now();
      e.preventDefault();
      e.stopPropagation();
    }

    bottomFrame?.contentWindow?.postMessage({
      type:'HB_CARTRIDGE_COMMAND',
      command:'advanceDialogue'
    },'*');
  };

  if(window.PointerEvent){
    mirroredDialogue.addEventListener(
      'pointerup',
      handleMirroredDialogue,
      {passive:false}
    );
  }
  mirroredDialogue.addEventListener('click',handleMirroredDialogue);

  topView.addEventListener('click',e=>{
    const card=e.target.closest?.('.cartridge-route-card');
    if(!card)return;
    if(Date.now()<(topView.__routeSwipeLockUntil||0))return;
    bottomFrame?.contentWindow?.postMessage({
      type:'HB_CARTRIDGE_COMMAND',
      command:'selectRoute',
      routeId:card.dataset.routeId
    },'*');
  });

  let previewTimer=0;
  topView.addEventListener('scroll',e=>{
    const track=e.target.closest?.('.cartridge-route-track');
    if(!track)return;
    clearTimeout(previewTimer);
    previewTimer=setTimeout(()=>{
      const cards=[...track.querySelectorAll('.cartridge-route-card')];
      if(!cards.length)return;
      const center=track.getBoundingClientRect().left+track.clientWidth/2;
      let best=cards[0],dist=Infinity;
      for(const c of cards){
        const r=c.getBoundingClientRect();
        const d=Math.abs((r.left+r.right)/2-center);
        if(d<dist){dist=d;best=c}
      }
      cards.forEach(c=>c.classList.toggle('active',c===best));
      bottomFrame?.contentWindow?.postMessage({
        type:'HB_CARTRIDGE_COMMAND',
        command:'previewRoute',
        routeId:best.dataset.routeId
      },'*');
    },140);
  },{capture:true,passive:true});

  bottomFrame.addEventListener('load',()=>{
    setTimeout(()=>{
      bottomFrame?.contentWindow?.postMessage({
        type:'HB_CARTRIDGE_COMMAND',
        command:'syncTop'
      },'*');
    },80);
  },{once:true});
}
function closeCard(update=true){
  clearCartridgeTopVoiceAudio();
  if(topMount)topMount.remove();
  if(bottomMount)bottomMount.remove();
  topMount=bottomMount=bottomFrame=topView=null;
  running=false;
  btn.classList.remove('running');
  if(update)refreshMenu();
}function choose(){input.value='';input.click()}
btn.addEventListener('click',()=>running?closeCard():showMenu());closeMenu.addEventListener('click',hideMenu);start.addEventListener('click',()=>openCard());importBtn.addEventListener('click',choose);
eject.addEventListener('click',async()=>{if(!confirm('弹出并删除当前插入的卡带吗？卡带自己的路线存档仍保存在浏览器中。'))return;closeCard(false);await clearStored();await refreshMenu()});
input.addEventListener('change',async()=>{const file=input.files&&input.files[0];if(!file)return;try{info.textContent='正在读取并写入大容量卡槽…';importBtn.disabled=true;start.disabled=true;const text=await file.text(),m=parseMeta(text);await saveStored(text,m);await refreshMenu();await openCard(text)}catch(err){console.error(err);alert('卡带导入失败：'+friendlyStorageError(err));await refreshMenu()}finally{importBtn.disabled=false;start.disabled=false;input.value=''}});
window.addEventListener('message',e=>{
  const data=e.data||{};
  if(!running||e.source!==bottomFrame?.contentWindow)return;
  if(data.type==='HB_CARTRIDGE_TOP_SNAPSHOT'){
    applySnapshot(data.snapshot);
  }else if(data.type==='HB_CARTRIDGE_VOICE_READY'){
    applyCartridgeVoiceReady(data.voice);
  }else if(data.type==='HB_CARTRIDGE_EXIT'){
    closeCard();
  }
});
document.addEventListener('click',e=>{if(!running)return;const dir=e.target.closest?.('[data-dir]')?.dataset.dir,key=e.target.closest?.('[data-key]')?.dataset.key;let commandKey=dir||key;if(e.target.closest?.('#startBtn'))commandKey='START';if(e.target.closest?.('#selectBtn'))commandKey='SELECT';if(!commandKey)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation?.();bottomFrame?.contentWindow?.postMessage({type:'HB_CARTRIDGE_COMMAND',command:'key',key:commandKey},'*')},true);
window.addEventListener('keydown',e=>{if(!running)return;const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',Enter:'A',Escape:'B'},key=map[e.key]||(e.key.toLowerCase()==='z'?'A':e.key.toLowerCase()==='x'?'B':'');if(!key)return;e.preventDefault();e.stopImmediatePropagation?.();bottomFrame?.contentWindow?.postMessage({type:'HB_CARTRIDGE_COMMAND',command:'key',key},'*')},true);refreshMenu();
})();
